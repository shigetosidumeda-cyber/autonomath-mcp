<!DOCTYPE html>
<!--
  Artifact viewer (主商品 = 会社フォルダ作成パック). G13 minimal.
  URL ?id=<pack_id> から /v1/artifacts/<pack_id> を fetch して JSON を
  section-by-section に render する client-side ページ。 SSR / Cloudflare
  Pages Function 化は今後対応予定。 fetch 失敗時は demo data を
  fallback として描画し、 画面が空白にならないように。
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<title>Artifact Viewer — jpcite</title>
<meta name="description" content="jpcite 会社フォルダ作成パック artifact viewer。pack_id ベースで baseline / decision insights / copy-paste parts / work queue / source receipts / known gaps / followup を一画面に表示。">
<meta name="robots" content="index, follow">

<link rel="canonical" href="https://jpcite.com/artifact">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/assets/favicon-v2.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "jpcite Artifact Viewer",
  "description": "会社フォルダ作成パック artifact (pack_id ベース) を baseline / insights / parts / queue / receipts / gaps / followup の 7 section で表示する client-side viewer。",
  "author": {"@type": "Organization", "name": "Bookyou 株式会社"},
  "publisher": {"@type": "Organization", "name": "jpcite", "url": "https://jpcite.com/"},
  "mainEntityOfPage": "https://jpcite.com/artifact"
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "jpcite", "item": "https://jpcite.com/"},
    {"@type": "ListItem", "position": 2, "name": "Artifact", "item": "https://jpcite.com/artifact"}
  ]
}
</script>

<style>
  :root { --text:#111; --muted:#666; --border:#e5e5e5; --bg:#fafafa; --warn-bg:#fff7e6; --warn-bd:#f5b94a; --ok:#2a7a2a; --ng:#b13a3a; --tier-S:#7a4cb1; --tier-A:#2a7a2a; --tier-B:#1f6fb0; --tier-C:#888; --radius:8px; }
  * { box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; color:var(--text); margin:0; line-height:1.6; background:#fff; }
  header.site { border-bottom:1px solid var(--border); padding:12px 24px; font-size:14px; }
  header.site a { color:var(--muted); text-decoration:none; }
  main { max-width:980px; margin:0 auto; padding:24px; }
  h1 { font-size:22px; margin:0 0 4px; font-weight:700; }
  h2 { font-size:16px; margin:24px 0 12px; padding:6px 0; border-bottom:2px solid var(--text); }
  .meta { color:var(--muted); font-size:13px; margin-bottom:12px; }
  .badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; font-weight:600; color:#fff; margin-right:6px; }
  .tier-S { background:var(--tier-S); } .tier-A { background:var(--tier-A); } .tier-B { background:var(--tier-B); } .tier-C { background:var(--tier-C); }
  .warn { background:var(--warn-bg); border:1px solid var(--warn-bd); border-radius:var(--radius); padding:12px 16px; margin:12px 0; font-size:14px; }
  section { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; margin-bottom:16px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  td, th { padding:6px 8px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; }
  th { color:var(--muted); font-weight:500; width:30%; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
  .card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:12px; font-size:13px; }
  .card h3 { font-size:14px; margin:0 0 6px; }
  .gauge { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin:6px 0; }
  .gauge-fill { height:100%; background:var(--ok); }
  .tabs { display:flex; gap:4px; margin-bottom:8px; }
  .tab { padding:6px 12px; background:#fff; border:1px solid var(--border); border-radius:var(--radius) var(--radius) 0 0; cursor:pointer; font-size:13px; }
  .tab.active { background:var(--bg); border-bottom-color:var(--bg); font-weight:600; }
  .pane { display:none; }
  .pane.active { display:block; }
  pre { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:12px; font-size:12px; overflow-x:auto; font-family:"JetBrains Mono", ui-monospace, monospace; white-space:pre-wrap; }
  .copy-btn, .action-btn { padding:6px 14px; font-size:13px; background:#fff; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; margin-right:6px; }
  .copy-btn:hover, .action-btn:hover { background:var(--bg); }
  ul.queue { list-style:none; padding:0; margin:0; font-size:13px; }
  ul.queue li { padding:6px 0; border-bottom:1px solid var(--border); }
  ul.queue input { margin-right:8px; }
  .total { font-size:14px; font-weight:600; margin-top:8px; }
  .receipts { font-family:"JetBrains Mono", monospace; font-size:12px; word-break:break-all; }
  .actions { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
  footer.site { margin-top:32px; padding:16px 24px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); }
  .demo-note { background:#eef; border-left:3px solid #88a; padding:8px 12px; font-size:12px; margin-bottom:12px; }
</style>
</head>
<body>

<header class="site"><a href="/">jpcite</a> &rsaquo; <span>Artifact</span></header>

<main>
  <div id="root" aria-live="polite"><p class="meta">読み込み中…</p></div>

  <div class="actions">
    <button class="action-btn" data-act="pdf">PDF</button>
    <button class="action-btn" data-act="json">JSON</button>
    <button class="action-btn" data-act="embed">embed</button>
    <button class="action-btn" data-act="regen">再生成</button>
    <button class="action-btn" data-act="watch">watch</button>
  </div>
</main>

<footer class="site">
  発行: Bookyou 株式会社 (T8010001213708) &middot;
  本 artifact は一次資料の取得時点情報を機械的に集約したもので、税理士法・弁護士法・行政書士法の業法に抵触する助言ではありません。最終判断は士業へ。
</footer>

<script>
(function () {
  "use strict";
  var DEMO = {
    pack_id: "demo-pack-0001",
    created_at: "2026-05-11T09:00:00+09:00",
    tier: "B",
    billable_units_consumed: 42,
    human_review_required: true,
    company_public_baseline: {
      name: "デモ合同会社",
      corp_number: "9999999999999",
      address: "東京都文京区小日向2-22-1",
      established: "2024-06-01",
      capital_jpy: 1000000,
      directors: 1
    },
    decision_insights: [
      {title: "IT導入補助金 2026 通常枠", fit_pct: 78, deadline: "2026-06-30", amount_jpy: 4500000, source_url: "https://www.it-hojo.jp/2026/"},
      {title: "ものづくり補助金 第18次", fit_pct: 52, deadline: "2026-07-15", amount_jpy: 12500000, source_url: "https://portal.monodukuri-hojo.jp/"},
      {title: "小規模事業者持続化補助金", fit_pct: 41, deadline: "2026-08-01", amount_jpy: 500000, source_url: "https://r3.jizokukahojokin.info/"}
    ],
    copy_paste_parts: {
      proposal: "【提案書 雛形】\n貴社の事業内容に照らし、IT導入補助金 2026 通常枠 の申請を推奨します。…",
      dd: "【デューデリ チェック】\n- 履歴事項全部証明書: 取得済 (2026-05-10)\n- 直近3期決算: 未取得\n- 役員構成: 1 名 (代表 1)…",
      questionnaire: "【ヒアリング票】\nQ1. 直近12 ヶ月のEC月商レンジは?\nQ2. 既存の販促ツールは?…"
    },
    work_queue: [
      {task: "履歴事項全部証明書 取得", units: 3, done: true},
      {task: "直近3期 決算書 PDF 取得", units: 5, done: false},
      {task: "代表者 個人保証 意向 確認", units: 2, done: false}
    ],
    source_receipts: [
      {url: "https://www.houjin-bangou.nta.go.jp/", fetched_at: "2026-05-11T08:55:12+09:00", content_hash: "sha256:7c1a…f3"},
      {url: "https://www.it-hojo.jp/2026/", fetched_at: "2026-05-11T08:56:04+09:00", content_hash: "sha256:9b8e…21"}
    ],
    known_gaps: [
      "直近3期 決算書 が未取得。 financial fit_pct は暫定。",
      "代表者 個人保証 / 第三者保証人 の意向 が空。 融資系 insight は要再評価。"
    ],
    recommended_followup: [
      {action: "税理士へ決算書取得 escalate", trigger: "決算書 PDF 未取得 が 5 営業日 継続"},
      {action: "行政書士へ補助金 申請 escalate", trigger: "fit_pct >= 70 かつ deadline <30 日"}
    ]
  };

  function $ (sel, root) { return (root || document).querySelector(sel); }
  function el (tag, cls, txt) { var e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; }
  function esc (s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }
  function yen (n) { if (n == null) return "—"; return "¥" + Number(n).toLocaleString("ja-JP"); }

  function render (a, isDemo) {
    var root = $("#root"); root.innerHTML = "";

    if (isDemo) {
      var note = el("div", "demo-note", "fetch 失敗のため demo data を表示しています (pack_id=" + esc(a.pack_id) + ")。");
      root.appendChild(note);
    }

    var hero = el("div");
    var h1 = el("h1", null, "Artifact: " + a.pack_id);
    hero.appendChild(h1);
    var meta = el("p", "meta");
    meta.innerHTML =
      '<span class="badge tier-' + esc(a.tier) + '">tier ' + esc(a.tier) + "</span>" +
      "created_at " + esc(a.created_at) + " &middot; " +
      "billable_units " + esc(a.billable_units_consumed);
    hero.appendChild(meta);
    if (a.human_review_required) {
      hero.appendChild(el("div", "warn", "⚠ human_review_required = true — 士業 確認が必要です。"));
    }
    root.appendChild(hero);

    // section: baseline
    var s1 = el("section"); s1.id = "baseline"; s1.appendChild(el("h2", null, "1. company_public_baseline"));
    var tbl = el("table"); var base = a.company_public_baseline || {};
    Object.keys(base).forEach(function (k) {
      var tr = el("tr");
      tr.appendChild(el("th", null, k));
      var td = el("td", null, k.indexOf("jpy") >= 0 ? yen(base[k]) : String(base[k]));
      tr.appendChild(td);
      tbl.appendChild(tr);
    });
    s1.appendChild(tbl); root.appendChild(s1);

    // section: insights
    var s2 = el("section"); s2.id = "insights"; s2.appendChild(el("h2", null, "2. decision_insights"));
    var cards = el("div", "cards");
    (a.decision_insights || []).forEach(function (it) {
      var c = el("div", "card");
      c.appendChild(el("h3", null, it.title));
      var pct = Math.max(0, Math.min(100, Number(it.fit_pct) || 0));
      var g = el("div", "gauge"); var gf = el("div", "gauge-fill"); gf.style.width = pct + "%"; g.appendChild(gf);
      c.appendChild(el("div", null, "fit_pct: " + pct + "%"));
      c.appendChild(g);
      c.appendChild(el("div", null, "締切: " + esc(it.deadline)));
      c.appendChild(el("div", null, "金額: " + yen(it.amount_jpy)));
      var a2 = el("a"); a2.href = it.source_url; a2.target = "_blank"; a2.rel = "noopener"; a2.textContent = "一次資料 ↗"; c.appendChild(a2);
      cards.appendChild(c);
    });
    s2.appendChild(cards); root.appendChild(s2);

    // section: parts (tabs)
    var s3 = el("section"); s3.id = "parts"; s3.appendChild(el("h2", null, "3. copy_paste_parts"));
    var tabs = el("div", "tabs");
    ["proposal", "dd", "questionnaire"].forEach(function (key, i) {
      var t = el("button", "tab" + (i === 0 ? " active" : ""), key);
      t.dataset.target = "pane-" + key;
      t.addEventListener("click", function () {
        s3.querySelectorAll(".tab").forEach(function (x) { x.classList.remove("active"); });
        s3.querySelectorAll(".pane").forEach(function (x) { x.classList.remove("active"); });
        t.classList.add("active");
        $("#pane-" + key, s3).classList.add("active");
      });
      tabs.appendChild(t);
    });
    s3.appendChild(tabs);
    var parts = a.copy_paste_parts || {};
    ["proposal", "dd", "questionnaire"].forEach(function (key, i) {
      var p = el("div", "pane" + (i === 0 ? " active" : "")); p.id = "pane-" + key;
      var pre = el("pre", null, parts[key] || "(empty)");
      var btn = el("button", "copy-btn", "コピー");
      btn.addEventListener("click", function () {
        if (navigator.clipboard) navigator.clipboard.writeText(parts[key] || "");
        btn.textContent = "コピー済";
        setTimeout(function () { btn.textContent = "コピー"; }, 1500);
      });
      p.appendChild(btn); p.appendChild(pre); s3.appendChild(p);
    });
    root.appendChild(s3);

    // section: queue
    var s4 = el("section"); s4.id = "queue"; s4.appendChild(el("h2", null, "4. work_queue"));
    var ul = el("ul", "queue"); var totalUnits = 0;
    (a.work_queue || []).forEach(function (q) {
      var li = el("li");
      var cb = el("input"); cb.type = "checkbox"; cb.checked = !!q.done; li.appendChild(cb);
      li.appendChild(document.createTextNode(q.task + "  (units=" + q.units + ")"));
      ul.appendChild(li);
      totalUnits += Number(q.units) || 0;
    });
    s4.appendChild(ul);
    s4.appendChild(el("div", "total", "合計 units: " + totalUnits));
    root.appendChild(s4);

    // section: receipts
    var s5 = el("section"); s5.id = "receipts"; s5.appendChild(el("h2", null, "5. source_receipts"));
    (a.source_receipts || []).forEach(function (r) {
      var row = el("div", "receipts");
      row.textContent = r.url + "  |  fetched_at=" + r.fetched_at + "  |  " + r.content_hash;
      s5.appendChild(row);
    });
    root.appendChild(s5);

    // section: gaps
    var s6 = el("section"); s6.id = "gaps"; s6.style.background = "var(--warn-bg)"; s6.style.borderColor = "var(--warn-bd)";
    s6.appendChild(el("h2", null, "6. known_gaps"));
    var gul = el("ul");
    (a.known_gaps || []).forEach(function (g) { gul.appendChild(el("li", null, g)); });
    s6.appendChild(gul); root.appendChild(s6);

    // section: followup
    var s7 = el("section"); s7.id = "followup"; s7.appendChild(el("h2", null, "7. recommended_followup (士業 escalate)"));
    (a.recommended_followup || []).forEach(function (f) {
      var c = el("div", "card");
      c.appendChild(el("h3", null, f.action));
      c.appendChild(el("div", null, "trigger: " + f.trigger));
      s7.appendChild(c);
    });
    root.appendChild(s7);
  }

  function getPackId () {
    var p = new URLSearchParams(window.location.search);
    return p.get("id") || p.get("pack_id") || "demo-pack-0001";
  }

  function boot () {
    var packId = getPackId();
    DEMO.pack_id = packId;
    var url = "/v1/artifacts/" + encodeURIComponent(packId);
    fetch(url, {headers: {"accept": "application/json"}})
      .then(function (r) { if (!r.ok) throw new Error("http " + r.status); return r.json(); })
      .then(function (j) { render(j, false); })
      .catch(function () { render(DEMO, true); });

    document.querySelectorAll(".action-btn").forEach(function (b) {
      b.addEventListener("click", function () {
        var act = b.dataset.act, id = getPackId();
        if (act === "pdf") window.open("/v1/artifacts/" + encodeURIComponent(id) + ".pdf", "_blank");
        else if (act === "json") window.open("/v1/artifacts/" + encodeURIComponent(id), "_blank");
        else if (act === "embed") { var s = '<iframe src="https://jpcite.com/artifact?id=' + id + '" width="100%" height="800"></iframe>'; if (navigator.clipboard) navigator.clipboard.writeText(s); alert("embed snippet をコピーしました。"); }
        else if (act === "regen") { if (confirm("再生成すると billable_units を消費します。続行しますか?")) fetch("/v1/artifacts/" + encodeURIComponent(id) + "/regenerate", {method: "POST"}); }
        else if (act === "watch") { fetch("/v1/artifacts/" + encodeURIComponent(id) + "/watch", {method: "POST"}); alert("watch 登録しました (更新時にメール通知)。"); }
      });
    });
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>

</body>
</html>
