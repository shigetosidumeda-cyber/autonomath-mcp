<style>
  .login-wrap { padding: 64px 0 80px; }

    margin: 0 0 28px;

  .oauth-btn {
    width: 100%;

    align-items: center;
    justify-content: center;

    padding: 12px 16px;

    border-radius: 8px;

    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    min-height: 48px;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .oauth-btn:hover { background: var(--bg-alt); border-color: var(--accent); }
  .oauth-btn + .oauth-btn { margin-top: 10px; }
  .oauth-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 20px;
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .magic-form { display: grid; gap: 10px; }
  .magic-form label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .magic-form input[type="email"],
  .magic-form input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    box-sizing: border-box;
  }
  .magic-form input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(10, 77, 140, 0.12);
  }
  .magic-form button {
    width: 100%;
    padding: 11px 16px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    min-height: 44px;
  }
  .magic-form button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .magic-form button:hover:not(:disabled) { background: #073b6e; }
  .status-line {
    margin: 12px 0 0;
    font-size: 13px;
    min-height: 18px;
    color: var(--text-muted);
  }
  .status-line.error { color: var(--danger, #c62828); }
  .status-line.ok { color: #2e7d32; }
  .footer-link {
    text-align: center;
    margin: 24px 0 0;
    font-size: 13px;

  .footer-link a { color: var(--accent); }
  .code-section { display: none; margin-top: 14px; }

  @media (max-width: 480px) {
    .login-card { padding: 28px 22px; }
    .login-card h1 { font-size: 22px; }

        <a id="oauth-github" class="oauth-btn" href="https://api.jpcite.com/v1/auth/github/start" rel="nofollow noopener">

            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.25 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C4 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.83z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 4 3.47 2.18 7.07l3.66 2.83C6.71 7.31 9.14 5.38 12 5.38z"/>

            id="login-email"
            name="email"
            autocomplete="email"
            required
            placeholder="you@example.com">

<script>
(function () {
  'use strict';
  var API_BASE = (window.JPCITE_API_BASE || 'https://api.jpcite.com').replace(/\/$/, '');
  var emailEl = document.getElementById('login-email');
  var codeEl = document.getElementById('login-code');
  var statusEl = document.getElementById('login-status');
  var submitBtn = document.getElementById('magic-submit');
  var verifyBtn = document.getElementById('magic-verify');
  var codeSection = document.getElementById('code-section');
  var form = document.getElementById('magic-form');

  function setStatus(msg, kind) {
    statusEl.textContent = msg || '';
    statusEl.classList.remove('ok', 'error');
    if (kind === 'ok') statusEl.classList.add('ok');
    if (kind === 'error') statusEl.classList.add('error');
  }

  function jsonHeaders() {
    return { 'Content-Type': 'application/json', 'Accept': 'application/json' };
  }

  async function sendMagicLink(email) {
    var resp = await fetch(API_BASE + '/v1/me/login_request', {
      method: 'POST',
      credentials: 'include',
      headers: jsonHeaders(),
      body: JSON.stringify({ email: email }),
    });
    if (!resp.ok) {
      var detail = await resp.text();
      throw new Error('login_request failed: ' + resp.status + ' ' + detail.slice(0, 200));
    }
    return await resp.json();
  }

  async function verifyCode(email, code) {
    var resp = await fetch(API_BASE + '/v1/me/login_verify', {
      method: 'POST',
      credentials: 'include',
      headers: jsonHeaders(),
      body: JSON.stringify({ email: email, code: code }),
    });
    if (!resp.ok) {
      var detail = await resp.text();
      throw new Error('login_verify failed: ' + resp.status + ' ' + detail.slice(0, 200));
    }
    return await resp.json();
  }

  form.addEventListener('submit', async function (ev) {
    ev.preventDefault();
    var email = (emailEl.value || '').trim().toLowerCase();
    if (!email || email.indexOf('@') < 1) {
      setStatus('メールアドレスが必要です', 'error');
      emailEl.focus();
      return;
    }
    submitBtn.disabled = true;
    setStatus('送信中…');
    try {
      var result = await sendMagicLink(email);
      if (result && result.reuse_existing_code) {
        setStatus('既に有効なコードがあります。受信箱を確認して 6 桁を入力してください。', 'ok');
      } else if (result && result.sent) {
        setStatus('コードを送信しました。受信箱を確認してください。', 'ok');
      } else {
        setStatus('送信に問題があった可能性があります。少し時間を置いて再送してください。', 'error');
      }
      codeSection.classList.add('show');
      codeEl.focus();
    } catch (err) {
      setStatus('送信に失敗しました: ' + err.message, 'error');
    } finally {
      submitBtn.disabled = false;
    }
  });

  verifyBtn.addEventListener('click', async function () {
    var email = (emailEl.value || '').trim().toLowerCase();
    var code = (codeEl.value || '').trim();
    if (!email) { setStatus('メールアドレスが必要です', 'error'); return; }
    if (!/^\d{6}$/.test(code)) { setStatus('6 桁の数字を入力してください', 'error'); return; }
    verifyBtn.disabled = true;
    setStatus('認証中…');
    try {
      var result = await verifyCode(email, code);
      if (result && result.ok) {
        setStatus('ログインしました。ダッシュボードへ移動します…', 'ok');
        // Cookie は API レスポンスで set 済み。即 redirect.
        window.location.href = '/dashboard.html';
      } else {
        setStatus('認証に失敗しました。コードを確認してください。', 'error');
      }
    } catch (err) {
      setStatus('認証エラー: ' + err.message, 'error');
    } finally {
      verifyBtn.disabled = false;
    }
  });

  // OAuth ボタン: ?return_to= を保持して dashboard へ戻れるようにする。
  // 現状の auth_github / auth_google.callback は ?return_to を読まないので
  // 純粋に default redirect = dashboard.html へ遷移する。
})();
</script>
