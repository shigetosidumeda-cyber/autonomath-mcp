<script>
  (function () {
    // Extract token from ?token=... (the email footer link shape), fallback to
    // the path fragment for direct POST to /v1/compliance/unsubscribe/{token}.
    function tokenFromQuery() {
      var m = location.search.match(/[?&]token=([a-f0-9]{32})/i);
      return m ? m[1] : "";
    }

    var btn = document.getElementById("unsub-btn");
    var status = document.getElementById("unsub-status");
    var title = document.getElementById("unsub-title");
    var lead = document.getElementById("unsub-lead");
    if (!btn) return;

    var token = tokenFromQuery();
    if (!token) {
      status.className = "status err";
      status.innerHTML = 'リンクが無効です。メール末尾のリンクをご確認ください。届かない場合は <a href="mailto:info@bookyou.net">info@bookyou.net</a> までご連絡ください。<br><a href="alerts.html">アラート設定に戻る</a>';
      btn.disabled = true;
      return;
    }

    btn.addEventListener("click", function () {
      btn.disabled = true;
      status.className = "status";
      status.textContent = "送信中...";
      var apiBase = window.AUTONOMATH_API_BASE || window.JPINTEL_API_BASE || "https://api.zeimu-kaikei.ai";
      fetch(apiBase + "/v1/compliance/unsubscribe/" + encodeURIComponent(token), {
        method: "POST",
        headers: { "Accept": "text/html" }
      }).then(function (r) {
        if (r.ok) {
          title.textContent = "配信を停止しました";
          lead.textContent = "今後このメールアドレスへアラートを送信することはありません。";
          status.className = "status ok";
          status.textContent = "処理が完了しました。";
        } else {
          status.className = "status err";
          status.textContent = "処理に失敗しました。時間をおいて再度お試しいただくか、info@bookyou.net までご連絡ください。";
          btn.disabled = false;
        }
      }).catch(function () {
        status.className = "status err";
        status.textContent = "ネットワークエラーが発生しました。時間をおいて再度お試しください。";
        btn.disabled = false;
      });
    });
  })();
</script>
