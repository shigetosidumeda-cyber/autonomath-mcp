# Smithery configuration file. Schema: https://smithery.ai/docs/build/project-config/smithery-yaml

startCommand:
  type: stdio

configSchema:
  type: object
  required: []
  properties:
    jpciteApiKey:
      type: string
      description: >-
        Optional jpcite API key from https://jpcite.com/pricing. This is sent to
        api.jpcite.com as X-API-Key and is not an LLM provider key. Anonymous tier
        is 3 req/day per IP (JST next-day reset) and works without a key; metered
        paid tier (¥3/req tax-exclusive, ¥3.30 tax-inclusive) requires one.
    jpciteApiBase:
      type: string
      default: "https://api.jpcite.com"
      description: >-
        Override the API base URL only when instructed by jpcite support.
    autonomathApiKey:
      type: string
      description: >-
        Legacy alias for jpciteApiKey. Kept only for backwards compatibility.
    autonomathApiBase:
      type: string
      description: >-
        Legacy alias for jpciteApiBase. Kept only for backwards compatibility.

commandFunction: |-
  (config) => ({
    command: 'uvx',
    args: ['autonomath-mcp'],
    env: {
      JPCITE_API_KEY: config.jpciteApiKey || config.autonomathApiKey || '',
      JPCITE_API_BASE: config.jpciteApiBase || config.autonomathApiBase || 'https://api.jpcite.com',
      AUTONOMATH_API_KEY: config.jpciteApiKey || config.autonomathApiKey || '',
      AUTONOMATH_API_BASE: config.jpciteApiBase || config.autonomathApiBase || 'https://api.jpcite.com'
    }
  })

metadata:
  version: "0.3.2"
  displayName: "jpcite — Japanese public-program evidence MCP"
  description: >-
    Evidence-prefetch MCP for Japanese public-program research. Use it before
    GPT, Claude, Cursor, or RAG answer generation when the alternative is
    pasting long PDFs, ministry pages, or search results into the model. jpcite
    returns compact source-linked Evidence Packets with source_url, fetched_at,
    provenance, known_gaps, and compatibility rules. The service uses
    deterministic SQL + Python over a corpus snapshot and makes no LLM call
    inside the request path. Context-size estimates are workload-dependent and
    not billing guarantees. Pricing is ¥3/request tax-exclusive (¥3.30
    tax-inclusive); anonymous access is 3 requests/day per IP.
  icon: "https://jpcite.com/assets/mark.svg"
  iconUrl: "https://jpcite.com/assets/favicon-v2.svg"
  homepage: "https://jpcite.com"
  website: "https://jpcite.com"
  repository: "https://github.com/shigetosidumeda-cyber/autonomath-mcp"
  license: "MIT"
  categories:
    - government
    - legal
    - finance
    - data
    - compliance
  tags:
    - mcp-server
    - mcp-tools
    - japan
    - japanese
    - legal-tech
    - subsidies
    - grants
    - loans
    - tax
    - tax-incentives
    - certifications
    - enforcement
    - case-studies
    - exclusion-rules
    - corporate-registry
    - evidence
    - citation
    - rag
    - agent-tools
    - claude
    - mcp-2025-06-18
