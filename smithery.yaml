# Smithery configuration file. Schema: https://smithery.ai/docs/build/project-config/smithery-yaml

startCommand:
  type: stdio

configSchema:
  type: object
  required: []
  properties:
    jpciteApiKey:
      type: string
      description: >-
        Optional jpcite API key from https://jpcite.com/pricing. This is sent to
        api.jpcite.com as X-API-Key and is not an LLM provider key. Anonymous tier
        is 3 req/day per IP (JST next-day reset) and works without a key; metered
        paid tier (¥3/req tax-exclusive, ¥3.30 tax-inclusive) requires one.
    jpciteApiBase:
      type: string
      default: "https://api.jpcite.com"
      description: >-
        Override the API base URL. Only set this for self-hosted or staging deployments.
    autonomathApiKey:
      type: string
      description: >-
        Legacy alias for jpciteApiKey. Kept only for backwards compatibility.
    autonomathApiBase:
      type: string
      description: >-
        Legacy alias for jpciteApiBase. Kept only for backwards compatibility.

commandFunction: |-
  (config) => ({
    command: 'uvx',
    args: ['autonomath-mcp'],
    env: {
      JPCITE_API_KEY: config.jpciteApiKey || config.autonomathApiKey || '',
      JPCITE_API_BASE: config.jpciteApiBase || config.autonomathApiBase || 'https://api.jpcite.com',
      AUTONOMATH_API_KEY: config.jpciteApiKey || config.autonomathApiKey || '',
      AUTONOMATH_API_BASE: config.jpciteApiBase || config.autonomathApiBase || 'https://api.jpcite.com'
    }
  })

metadata:
  version: "0.3.2"
  displayName: "jpcite (autonomath-mcp) — 日本の制度 MCP (93 tools)"
  description: >-
    Evidence-first MCP server over Japanese institutional data. Each row carries a
    primary-source URL + content_hash + fetched_at on 99%+ of rows; aggregators are
    excluded. Coverage: 11,684 searchable subsidies/loans/tax incentives/certifications
    + 154 laws full-text + 9,484 law catalog stubs (e-Gov, CC-BY) + 2,065 court decisions
    + 50 tax rulesets + 13,801 国税庁 invoice registrants (PDL v1.0) + 2,286 採択事例
    + 1,185 行政処分 + 22,258 enforcement-detail rows + 362 bids + 181 exclusion /
    prerequisite rules. 93 default-on MCP tools (39 jpintel core + 3 audit /
    composition + 25 jpcite generic + 4 V4 universal + 5 static-resource tools
    + 4 NTA corpus tools + 10 composition tools + 3 industry-pack tools). Protocol
    2025-06-18, stdio. No LLM call inside the service —
    deterministic SQL + Python over the corpus snapshot. ¥3/req metered (税込 ¥3.30);
    anonymous 3 req/day per IP free (JST midnight reset, no signup). Not legal /
    tax / 行政書士 advice — verify primary sources before any business decision.
    Operator: Bookyou株式会社 (T8010001213708, info@bookyou.net).
  icon: "https://jpcite.com/assets/mark.svg"
  iconUrl: "https://jpcite.com/assets/favicon-v2.svg"
  homepage: "https://jpcite.com"
  website: "https://jpcite.com"
  repository: "https://github.com/shigetosidumeda-cyber/autonomath-mcp"
  license: "MIT"
  categories:
    - government
    - legal
    - finance
    - data
    - compliance
  tags:
    - mcp-server
    - mcp-tools
    - japan
    - japanese
    - legal-tech
    - subsidies
    - grants
    - loans
    - tax
    - tax-incentives
    - certifications
    - enforcement
    - case-studies
    - exclusion-rules
    - corporate-registry
    - evidence
    - citation
    - rag
    - agent-tools
    - claude
    - mcp-2025-06-18
