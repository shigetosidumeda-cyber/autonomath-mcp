# DEEP-39 shingikai (審議会) sources config — 12 council 議事録 mirrors.
#
# Each council carries:
#   ministry            display label (内閣府 / 経産省 / etc.)
#   council             display label (規制改革推進会議 / etc.)
#   index_url           council's minutes-index page (HTML; sitemap.xml fallback)
#   pdf_url_pattern     regex (Python re) extracting PDF URLs from index_url
#   robots_check        true if robots.txt should be honored prior to fetch
#
# Operator notes:
#   * 12 entries below match the DEEP-39 spec §3 list verbatim.
#   * Each council index_url is the directory page; the cron walks
#     anchors via re.findall against pdf_url_pattern.
#   * Per-council try/except in ingest_shingikai_weekly.py — one DOM
#     change does NOT halt the other 11.
#   * No LLM imports under any circumstance — cron uses lxml + pdfplumber.

councils:
  - id: cao_kisei_kaikaku
    ministry: 内閣府
    council: 規制改革推進会議
    index_url: https://www8.cao.go.jp/kisei-kaikaku/kisei/meeting/meeting.html
    pdf_url_pattern: 'href="([^"]+\.pdf)"'
    robots_check: true

  - id: meti_sangyo_kozo
    ministry: 経産省
    council: 産業構造審議会
    index_url: https://www.meti.go.jp/shingikai/sankoshin/index.html
    pdf_url_pattern: 'href="([^"]+\.pdf)"'
    robots_check: true

  - id: mhlw_rosei_seisaku
