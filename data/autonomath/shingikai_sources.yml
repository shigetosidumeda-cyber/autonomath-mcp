    pdf_url_pattern: 'href="([^"]+\.pdf)"'
    robots_check: true

  - id: mlit_fudosan_toki
    ministry: 国交省
    council: 不動産登記部会
    index_url: https://www.mlit.go.jp/totikensangyo/totikensangyo_tk5_000003.html
