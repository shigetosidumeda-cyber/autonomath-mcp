    robots_check: true

  - id: ppc_committee
    ministry: 個人情報保護委員会
    council: 個人情報保護委員会
    index_url: https://www.ppc.go.jp/aboutus/minutes/
    pdf_url_pattern: 'href="([^"]+\.pdf)"'
    robots_check: true

  - id: fsa_kinyu_shingikai
    ministry: 金融庁
    council: 金融審議会
    index_url: https://www.fsa.go.jp/singi/singi_kinyu/index.html
