    robots_check: true

  - id: nta_zeisei_chosa
    ministry: 国税庁
    council: 税制調査会
    index_url: https://www.cao.go.jp/zei-cho/gijiroku/zeicho/index.html
    pdf_url_pattern: 'href="([^"]+\.pdf)"'
    robots_check: true

  - id: moj_hosei_shingikai
    ministry: 法務省
    council: 法制審議会
    index_url: https://www.moj.go.jp/shingi1/housei_index.html
    pdf_url_pattern: 'href="([^"]+\.pdf)"'
    robots_check: true

  - id: zeirishi_shingikai
    ministry: 国税庁
    council: 税理士審議会
    index_url: https://www.nta.go.jp/about/council/zeirishi/index.htm
    pdf_url_pattern: 'href="([^"]+\.pdf)"'
    robots_check: true

  - id: koninkaikei_shingikai
    ministry: 金融庁
    council: 公認会計士・監査審査会
    index_url: https://www.fsa.go.jp/cpaaob/shinsakai/index.html
    pdf_url_pattern: 'href="([^"]+\.pdf)"'
    robots_check: true

  - id: shihoshoshi_shingikai
    ministry: 法務省
    council: 司法書士審議会
    index_url: https://www.moj.go.jp/MINJI/minji_shoshi.html
