# Legal-reasoning-chain topic taxonomy — subsidy (補助金)
# generated_at: 2026-05-17
# source: scripts/build_legal_reasoning_chain.py :: all_topics()
# total_topics: 30 (each emits 5 viewpoint slices)

topics:
  - topic_id: subsidy:keizai_gouriseii
    label: "補助金交付の経済的合理性"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["2", "3"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-1"]
    keywords: ["補助金", "適正化", "経済合理性"]
    conclusion_text: "補助金交付の経済合理性は補助金等適正化法・各省告示に基づき、事業計画の実現可能性・費用対効果・公共性が審査対象。"

  - topic_id: subsidy:taisho_keihi
    label: "補助対象経費の範囲"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["2", "4"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-2"]
    keywords: ["補助対象経費", "対象外"]
    conclusion_text: "補助対象経費は公募要領で限定列挙。原則として事業に直接必要な経費(設備費・原材料費・委託費・専門家経費)に限る。経常的経費(人件費・賃料)は除外が一般的。"

  - topic_id: subsidy:hojo_ritsu
    label: "補助率と補助上限"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["4"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-3"]
    keywords: ["補助率", "補助上限"]
    conclusion_text: "補助率は中小企業1/2-2/3、小規模事業者2/3が標準。補助上限は事業類型・従業員規模により50万円-1億円の幅。"

  - topic_id: subsidy:syuekikin_henkan
    label: "収益納付・返還"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["7"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-4"]
    keywords: ["収益納付", "返還"]
    conclusion_text: "補助金により取得した財産の処分・収益は5年間の制限。事業終了後5年以内に収益が発生した場合、収益納付が必要(補助金等適正化法22条)。"

  - topic_id: subsidy:fusei_jukyu
    label: "不正受給と返還命令"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["18"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-5"]
    keywords: ["不正受給", "返還"]
    conclusion_text: "不正受給は補助金等適正化法29条で交付決定取消・返還命令。加算金10.95%/年と、不正利得罪(3年以下懲役)の刑事罰の併科。"

  - topic_id: subsidy:zeimu_shori
    label: "補助金の税務処理"
    tax_category: subsidy
    law_canonical_id: "law:corporate-tax"
    article_numbers: ["42"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["10-1"]
    keywords: ["補助金", "圧縮記帳"]
    conclusion_text: "補助金により取得した固定資産は法人税法42条の圧縮記帳の対象。圧縮損計上で課税繰延が可能。直接減額方式または積立金方式を選択。"

  - topic_id: subsidy:monodukuri
    label: "ものづくり補助金"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["2"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-1"]
    keywords: ["ものづくり", "革新"]
    conclusion_text: "ものづくり補助金は中小企業庁実施で革新的サービス開発・試作品開発・生産プロセス改善が対象。補助上限750-5000万円、補助率1/2-2/3。"

  - topic_id: subsidy:itdounyu
    label: "IT導入補助金"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["2"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-2"]
    keywords: ["IT導入", "DX"]
    conclusion_text: "IT導入補助金は中小企業庁実施で業務効率化IT・インボイス対応・セキュリティ対策・複数社連携IT等の枠あり。補助率1/2-3/4。"

  - topic_id: subsidy:jizoku_ka
    label: "持続化補助金"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["2"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-3"]
    keywords: ["持続化", "小規模事業者"]
    conclusion_text: "持続化補助金は商工会議所・商工会経由で小規模事業者の販路開拓・生産性向上が対象。補助上限50-200万円、補助率2/3。"

  - topic_id: subsidy:saikouchiku
    label: "事業再構築補助金"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["2"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-4"]
    keywords: ["事業再構築", "新分野"]
    conclusion_text: "事業再構築補助金は中小企業庁実施で新分野展開・事業転換・業種転換・業態転換・事業再編が対象。補助上限100-1.5億円、補助率1/2-3/4。"

  - topic_id: subsidy:gx
    label: "GX関連補助金"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["2"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-5"]
    keywords: ["GX", "脱炭素"]
    conclusion_text: "GX関連補助金は環境省・経産省で省エネ設備導入・再エネ導入・燃料転換等が対象。CO2削減量に応じた補助率設定が一般的。"

  - topic_id: subsidy:saiyou_shien
