    keywords: ["補助金", "益金算入"]
    conclusion_text: "補助金は法人税法22条+法人税基本通達2-1-42により交付決定通知のあった日の属する事業年度の益金算入。圧縮記帳と組合せて課税繰延可能。"

  - topic_id: subsidy:zaikoku_houjikin
