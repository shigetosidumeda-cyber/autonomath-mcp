    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-1"]
    keywords: ["事業計画書"]
    conclusion_text: "補助金事業計画書は公募要領で指定された様式・記載事項に従う。実現可能性・公益性・費用対効果・予算積算の合理性が審査対象。"

  - topic_id: subsidy:hojokin_kazei
    label: "補助金の益金算入時期"
    tax_category: subsidy
    law_canonical_id: "law:corporate-tax"
