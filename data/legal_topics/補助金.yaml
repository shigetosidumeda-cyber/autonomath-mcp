    conclusion_text: "補助金事業終了後の税務調査では補助金益金算入時期・圧縮記帳・補助対象経費の損金算入が論点。証憑保存7年間が前提。"

  - topic_id: subsidy:hokoshou_kondan
    label: "補助事業者の説明会"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["3"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-4"]
