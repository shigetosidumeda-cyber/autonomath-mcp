    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-2"]
    keywords: ["在国子会社", "外資"]
    conclusion_text: "外資系子会社も国内法人として補助金受給可能(外資規制対象業種を除く)。外為法上の事前届出は補助金交付と別の手続。"

  - topic_id: subsidy:sentaku_seido
    label: "重複申請の禁止"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["4"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-3"]
    keywords: ["重複申請", "排他"]
    conclusion_text: "同一事業内容・同一経費に対する複数補助金の重複申請は補助金等適正化法・各公募要領により原則禁止。違反は不正受給扱い。"

  - topic_id: subsidy:saitaku_kekka
    label: "採択通知後の手続"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["6"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-4"]
    keywords: ["採択", "交付申請"]
    conclusion_text: "採択通知後は交付申請書を提出し、補助金等適正化法6条の交付決定を待つ。発注・契約は交付決定後でないと補助対象外となる。"

  - topic_id: subsidy:jisseki_houkoku
    label: "実績報告と確定検査"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
    article_numbers: ["14"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
    tsutatsu_article_prefix: ["4-5"]
    keywords: ["実績報告", "確定検査"]
    conclusion_text: "事業終了後30日以内または翌年度4月10日いずれか早い日までに実績報告書提出。補助金等適正化法14条の確定検査で補助金額確定。"

  - topic_id: subsidy:zaisan_shobun
