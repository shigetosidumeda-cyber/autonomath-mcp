    tsutatsu_article_prefix: ["4-1"]
    keywords: ["雇用調整", "助成金"]
    conclusion_text: "雇用調整助成金は経済上の理由による事業活動縮小時の休業手当の一部助成。中小企業は4/5、大企業は2/3。日額上限あり。"

  - topic_id: subsidy:tokutei_kunren
    label: "人材開発支援助成金"
    tax_category: subsidy
