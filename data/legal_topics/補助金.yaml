    tsutatsu_article_prefix: ["4-5"]
    keywords: ["補助金等適正化"]
    conclusion_text: "補助金交付は補助金等適正化法を基本法として各省告示・要綱で運用。交付決定・実績報告・確定検査・財産処分制限の流れ。"

  - topic_id: subsidy:tokutei_shiryo
    label: "事業計画書の作成要件"
    tax_category: subsidy
    law_canonical_id: "law:chusho-keiei-kyouka"
