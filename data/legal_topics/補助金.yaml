    conclusion_text: "補助金は補助金等適正化法11条により交付目的に従って使用。目的外使用は返還命令の対象。"

  - topic_id: subsidy:zeimu_chosa
    label: "補助金関連の税務調査"
    tax_category: subsidy
    law_canonical_id: "law:corporate-tax"
    article_numbers: ["22"]
    tsutatsu_law_id: "law:hojin-zei-tsutatsu"
