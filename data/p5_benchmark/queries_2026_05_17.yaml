# FF3 P5 LIVE benchmark — 250 query head-to-head set
#
# Author: jpcite operator (Bookyou株式会社)
# Generated: 2026-05-17
# Status: LANDED 2026-05-17 (FF3 P5 LIVE benchmark scaffold)
#
# Cohort = 5 (税理士 / 会計士 / 行政書士 / 司法書士 / 中小経営者)
# Per cohort = 50 query → total 250 query
#
# Each query is a single, agent-style Japanese instruction that an Opus 4.7
# 7-turn workflow OR a jpcite MCP tool chain (search → expand →
# precomputed_answer → cite) should be able to satisfy. The query text is
# deliberately verb-anchored ("教えて" / "出して" / "確認したい" / "整理して") so
# both pipelines can plan an answer.
#
# CONSTRAINT (CLAUDE.md non-negotiable): jpcite production has NO LLM API.
# Opus 4.7 ground truth is generated by the **operator** under Claude Code
# Max Pro and is laid down as a static fixture under
# `data/p5_benchmark/opus_4_7_outputs/`. This file only enumerates the
# queries — it never invokes any LLM.
#
# Tier letter (A/B/C/D) hints reflect the V3 pricing band the jpcite tool
# chain is expected to land in (see JPCITE_PRICING_V3_2026_05_17.md).

