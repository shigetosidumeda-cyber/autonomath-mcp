<svg xmlns="http://www.w3.org/2000/svg" width="148" height="20" role="img" aria-label="downloads: per month">
  <title>downloads: per month</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="148" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="74" height="20" fill="#555"/>
    <rect x="74" width="74" height="20" fill="#4c1"/>
    <rect width="148" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="110" text-rendering="geometricPrecision">
    <text aria-hidden="true" x="380" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="640">downloads</text>
    <text x="380" y="140" transform="scale(.1)" fill="#fff" textLength="640">downloads</text>
    <text aria-hidden="true" x="1100" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="640">per month</text>
    <text x="1100" y="140" transform="scale(.1)" fill="#fff" textLength="640">per month</text>
  </g>
</svg>
