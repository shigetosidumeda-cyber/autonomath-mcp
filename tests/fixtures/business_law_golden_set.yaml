# DEEP-63 業法 fence test corpus — 100 sample golden set.
#
# 50 violation + 50 clean, per-業法 7 軸 coverage (each law: 7 violation + 7 clean
# samples for the 7 main laws + 1 spare violation slot for general filler).
#
# Schema per sample:
#   id:                 unique slug
#   text:               fence-touching or clean text (NFKC-canonical form)
#   expected_violation: bool
#   laws:               []  (empty when expected_violation=false)
#   forbidden_phrases:  canonical phrases expected to match (when violation)
#   cohort:             industry cohort hint (free text, optional)
#
# Phrases sourced from data/business_law_forbidden_phrases.json (DEEP-23
# OSS spec). Clean samples reuse the SAME 業法 territory but render the
# query as a routing-required disclaimer-first variant per
# 09_B_PUBLIC_CLAIM_GUARD.md.
#
# Calibration target: TP > 95% (>= 48/50) / FP < 5% (<= 2/50). LLM 0.

