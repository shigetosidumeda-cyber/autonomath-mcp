# =============================================================================
# acceptance_criteria.yaml
# =============================================================================
#
# DEEP-59 source of truth for the 258 acceptance criteria distilled from the
# 33 DEEP specs (see R8_ACCEPTANCE_CRITERIA_CI_GUARD.md).
#
# The seed sample below covers the principal criterion of each DEEP spec
# (>= 30 rows; full 258-row matrix is generated incrementally as each spec
# lands). Every row drives test_acceptance_criteria.py via pytest parametrize.
#
# Schema:
#   id          - "DEEP-NN-K"  (K = ordinal within the spec)
#   check_kind  - one of 12 core or 3 aux verifiers (see test module)
#   spec        - DEEP spec id (rollup key for aggregate_acceptance.py)
#   automation  - "auto" | "semi" | "manual"  (defaults to auto)
#   <inputs>    - kind-specific inputs (path, query, file, pattern, ...)
#
# Constraints:
# - LLM API call count = 0
# - jpcite scope only
# - Paths resolved relative to JPCITE_REPO_ROOT
# =============================================================================

# --- DEEP-22 : am_amendment_snapshot migration -------------------------------
- id: DEEP-22-1
  spec: DEEP-22
  check_kind: file_existence
  path: scripts/migrations/wave24_106_am_amendment_snapshot_rebuild.sql
- id: DEEP-22-2
  spec: DEEP-22
  check_kind: sql_syntax
  file: scripts/migrations/wave24_106_am_amendment_snapshot_rebuild.sql
- id: DEEP-22-3
  spec: DEEP-22
  check_kind: regex_pattern_count
  file: scripts/migrations/wave24_106_am_amendment_snapshot_rebuild.sql
  pattern: '--\s*target_db:\s*autonomath'
  min_count: 1
- id: DEEP-22-4
  spec: DEEP-22
  automation: semi
  check_kind: sql_count
  query: "SELECT COUNT(*) FROM am_amendment_snapshot WHERE snapshot_at IS NOT NULL"
  expected: ">= 144"

