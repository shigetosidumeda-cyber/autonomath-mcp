# =============================================================================
# acceptance_criteria.yaml
# =============================================================================
#
# DEEP-59 source of truth for the 258 acceptance criteria distilled from the
# 33 DEEP specs (see R8_ACCEPTANCE_CRITERIA_CI_GUARD.md).
#
# Wave 17 → expanded 2026-05-07: 61 → 258 rows. Six specs (DEEP-23, DEEP-32,
# DEEP-37, DEEP-46, DEEP-47, DEEP-53) carry 7 rows; the remaining 27 specs
# carry 8 rows for a total of 6 * 7 + 27 * 8 = 258. Every row drives
# test_acceptance_criteria.py via pytest parametrize.
#
# Schema:
#   id          - "DEEP-NN-K"  (K = ordinal within the spec)
#   check_kind  - one of 12 core or 3 aux verifiers (see test module)
#   spec        - DEEP spec id (rollup key for aggregate_acceptance.py)
#   automation  - "auto" | "semi" | "manual"  (defaults to auto)
#   <inputs>    - kind-specific inputs (path, query, file, pattern, ...)
#
# Constraints:
# - LLM API call count = 0
# - jpcite scope only
# - Paths resolved relative to JPCITE_REPO_ROOT
# =============================================================================

