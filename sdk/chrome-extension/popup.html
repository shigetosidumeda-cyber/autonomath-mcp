<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>jpcite — クイック照会</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif;
    margin: 0;
    padding: 14px 16px;
    width: 320px;
    color: #1c1917;
  }
  h1 {
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 4px 0;
    color: #1c1917;
  }
  p.tag {
    font-size: 11px;
    color: #6b7280;
    margin: 0 0 12px 0;
    line-height: 1.4;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  input[type="text"] {
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    border: 1px solid #d4d4d8;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #3B82F6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  }
  button {
    background: #1c1917;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 9px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover {
    background: #3B82F6;
  }
  .hint {
    font-size: 11px;
    color: #6b7280;
    line-height: 1.5;
    margin-top: 6px;
  }
  .hint code {
    background: #f4f4f5;
    padding: 1px 4px;
    border-radius: 2px;
    font-size: 11px;
  }
  .meter {
    margin-top: 10px;
    padding: 8px 10px;
    background: #fef9c3;
    border-radius: 4px;
    font-size: 11px;
    color: #713f12;
    line-height: 1.5;
  }
  a {
    color: #3B82F6;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
  .footer {
    margin-top: 10px;
    font-size: 10px;
    color: #9ca3af;
    text-align: right;
  }
</style>
</head>
<body>
  <h1>jpcite クイック照会</h1>
  <p class="tag">法人番号 (13桁) または制度名キーワードを入力。</p>
  <form id="qf">
    <input id="q" type="text" placeholder="例: IT導入補助金 / 8010001213708" autocomplete="off" autofocus>
    <button type="submit">jpcite で開く</button>
  </form>
  <p class="hint">
    13桁数字 → <code>/v1/houjin/&lt;n&gt;</code><br>
    それ以外 → <code>/v1/programs/search?q=&lt;query&gt;</code>
  </p>
  <div class="meter">
    匿名 3 req/日 (IP) 無料、超過分は ¥3/req (税込 ¥3.30)。
    <a href="https://jpcite.com/pricing.html" target="_blank" rel="noopener">料金</a>
  </div>
  <div class="footer">
    powered by <a href="https://jpcite.com/" target="_blank" rel="noopener">jpcite</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
