<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>税務会計AI — freee 連携</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="hdr">
    <div class="hdr-l">
      <span class="logo">税務会計AI</span>
      <span class="hdr-sub">freee 会計 連携</span>
    </div>
    <div class="hdr-r">
      <span id="company-pill" class="pill" hidden></span>
      <a href="/oauth/logout" class="logout">ログアウト</a>
    </div>
  </header>

  <main class="main">
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="subsidy" role="tab">補助金</button>
      <button class="tab" data-tab="tax" role="tab">税制優遇</button>
      <button class="tab" data-tab="invoice" role="tab">インボイス番号確認</button>
    </nav>

    <section class="panel" id="panel-subsidy">
      <form id="form-subsidy" class="form">
        <label class="lab">キーワード
          <input type="text" name="q" placeholder="例: 省エネ / DX / 設備投資" autocomplete="off" />
        </label>
        <label class="lab">都道府県
          <select name="prefecture">
            <option value="">指定なし</option>
            <option>北海道</option><option>青森県</option><option>岩手県</option>
            <option>宮城県</option><option>秋田県</option><option>山形県</option>
            <option>福島県</option><option>茨城県</option><option>栃木県</option>
            <option>群馬県</option><option>埼玉県</option><option>千葉県</option>
            <option>東京都</option><option>神奈川県</option><option>新潟県</option>
            <option>富山県</option><option>石川県</option><option>福井県</option>
            <option>山梨県</option><option>長野県</option><option>岐阜県</option>
            <option>静岡県</option><option>愛知県</option><option>三重県</option>
            <option>滋賀県</option><option>京都府</option><option>大阪府</option>
            <option>兵庫県</option><option>奈良県</option><option>和歌山県</option>
            <option>鳥取県</option><option>島根県</option><option>岡山県</option>
            <option>広島県</option><option>山口県</option><option>徳島県</option>
            <option>香川県</option><option>愛媛県</option><option>高知県</option>
            <option>福岡県</option><option>佐賀県</option><option>長崎県</option>
            <option>熊本県</option><option>大分県</option><option>宮崎県</option>
            <option>鹿児島県</option><option>沖縄県</option>
          </select>
        </label>
        <button type="submit" class="btn">検索</button>
      </form>
      <ul class="results" id="results-subsidy"></ul>
    </section>

    <section class="panel" id="panel-tax" hidden>
      <form id="form-tax" class="form">
        <label class="lab">キーワード
          <input type="text" name="q" placeholder="例: 賃上げ / 中小企業経営強化 / DX" autocomplete="off" />
        </label>
        <button type="submit" class="btn">検索</button>
      </form>
      <ul class="results" id="results-tax"></ul>
    </section>

    <section class="panel" id="panel-invoice" hidden>
      <form id="form-invoice" class="form">
        <label class="lab">登録番号 (T + 13 桁)
          <input type="text" name="q" placeholder="例: T8010001213708" autocomplete="off" maxlength="14" />
        </label>
        <button type="submit" class="btn">確認</button>
      </form>
      <ul class="results" id="results-invoice"></ul>
    </section>
  </main>

  <footer class="ftr">
    <p class="disclaimer">
      <strong>税理士法 第52条 ご注意:</strong>
      本サービスは情報提供のみを目的とし、税理士業務 (個別の税務相談・申告書作成等) には該当しません。
      最終的な税務判断は、貴社の顧問税理士にご確認ください。
    </p>
    <p class="ftr-sub">
      提供: <a href="https://zeimu-kaikei.ai/" target="_blank" rel="noopener">税務会計AI</a>
      / 運営: Bookyou株式会社 (法人番号 T8010001213708) ·
      <a href="https://zeimu-kaikei.ai/privacy" target="_blank" rel="noopener">プライバシー</a> ·
      <a href="https://zeimu-kaikei.ai/terms" target="_blank" rel="noopener">利用規約</a>
    </p>
  </footer>

  <script src="/static/app.js" defer></script>
</body>
</html>
