validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    # Absolute links (e.g. /downloads/autonomath-mcp.mcpb) point at static
    # assets served by Cloudflare Pages that live outside mkdocs' docs_dir.
    # They are intentional cross-boundary links, not drift — ignore them
    # rather than warn so strict-mode builds stay meaningful.
    absolute_links: ignore
    unrecognized_links: warn
