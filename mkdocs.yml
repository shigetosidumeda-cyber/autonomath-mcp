# jpcite — MkDocs Material config.
#
# Build locally:
#   pip install -r docs-requirements.txt
#   mkdocs build --strict
#
# Output: site/docs/  (nested so Cloudflare Pages can serve landing + docs
# together from a single `site/` upload).

site_name: jpcite
site_description: jpcite — 日本の制度 (補助金 / 融資 / 税制 / 認定制度) 11,684件 + 採択事例 2,286 + 融資 108 + 行政処分 1,185 を一次資料付きで返す REST + MCP API。現在の公開料金と匿名枠はPricingに掲載。
site_author: jpcite
site_url: "https://jpcite.com/docs/"
copyright: "© 2026 jpcite"

# Disable the GitHub edit link for the public documentation build.
# Re-enable by setting `repo_url` + `edit_uri: edit/main/docs/`.
edit_uri: ""

docs_dir: docs
site_dir: site/docs

# Fail on broken internal links, missing nav entries, ambiguous refs.
# This is the whole point of the migration: catch the accumulated
# [text](link.md) drift that slipped through review.
strict: true

theme:
  name: material
  custom_dir: overrides
  language: ja
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  # Material's default "Made with Material" footer is replaced by
  # overrides/partials/footer.html (single-line legal + source links).

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/feedback-widget.js
  - assets/feedback-init.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      # Japanese headings need Unicode-preserving slugs so inline
      # [text](file.md#日本語アンカー) links resolve at strict-mode build.
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark

plugins:
  - search:
      lang:
        - ja
        - en
  - tags
  # Algolia DocSearch — staged, OFF until DocSearch credentials land.
  #
  # Status: applied 2026-05-01 via the OSS docs program at
  # https://docsearch.algolia.com/apply/. Crawler-side ranking + JS widget
  # hook are wired through a custom theme partial (overrides/partials/
  # docsearch.html — to be added when keys arrive). Until then the
  # mkdocs-material native lunr search above remains the only search
  # surface, and `mkdocs build --strict` keeps passing because no plugin
  # requires the secrets.
  #
  # Activation steps once Algolia returns app_id + api_key + index_name:
  #   1. drop the credentials into Cloudflare Pages secrets:
  #        ALGOLIA_APP_ID / ALGOLIA_API_KEY / ALGOLIA_INDEX
  #      (read-only "search-only" key — never the admin key)
  #   2. uncomment the extra_javascript / extra_css block below
  #   3. re-enable theme.features.search.suggest (already on) and add
  #      `docsearch_url` to the navbar
  #   4. trigger the Algolia crawler (DocSearch dashboard → "trigger crawl")
  #
  # Ref: https://docsearch.algolia.com/docs/integrations#mkdocs
  # extra_css:
  #   - https://cdn.jsdelivr.net/npm/@docsearch/css@3
  # extra_javascript:
  #   - assets/docsearch-init.js  # reads window.__DOCSEARCH_CFG__ injected by overrides/partials/docsearch.html
  # Material's social plugin auto-generates per-page OG images (1200x630
  # PNG) using site_name + page title + description. Cards land at
  # site/docs/assets/images/social/<page>.png and are referenced via the
  # `<meta property="og:image">` tag injected into each page head.
  # Requires cairosvg + pillow on the build host (added to docs-requirements.txt).
  # Falls back to a default Roboto font (no custom font configured).
  - social:
      cards: true
      cards_layout_options:
        background_color: "#0F172A"  # jpcite dark navy
        color: "#FFFFFF"
  # git-revision-date-localized reads the last-commit timestamp per page
  # and displays "最終更新" at the bottom. Requires the build to run
  # inside a real git checkout with the `git` binary in PATH — both hold
  # in CI (`.github/workflows/pages-preview.yml`).
  #
  # Local gotcha: on macOS under Rosetta an x86_64 venv python can't fork
  # `git version` (rosetta/xcrun bug). If you hit `rosetta error: ... libxcrun`
  # at `mkdocs build`, either rebuild your venv with an arm64 Python
  # (`python3.13 -m venv .venv` under arm64 shell) or drop this plugin
  # by commenting out the four lines below for the local run only.
  # - git-revision-date-localized:  # TEMP disabled for local Rosetta build; CI re-enables via pages-preview.yml
  #     enable_creation_date: false
  #     type: date
  #     fallback_to_build_date: true

