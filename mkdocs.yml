extra:
  generator: false
  # Used by overrides/partials/index_jsonld.html for absolute URLs in
  # JSON-LD structured data (Schema.org @id / url / sameAs etc.). The
  # placeholder approach was a deploy-time envsubst hack; mkdocs already
  # has a perfectly fine extras dict, use it.
  domain: "https://jpcite.com"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
      name: GitHub

nav:
  - ホーム: index.md

  - 入門:
      - はじめに: getting-started.md
      - 料金: pricing.md
      - FAQ: faq.md
      - 正直な能力と限界: honest_capabilities.md

  - API:
      - REST: api-reference.md
      - レスポンス エンベロープ: api-reference/response_envelope.md
      - エラー: error_handling.md
      - MCP ツール: mcp-tools.md
      - 排他ルール: exclusions.md

  - 開発者:
      - サンプル: examples.md
      - Prompt Cookbook: prompt_cookbook.md
      - Cookbook (12 recipes):
          - 概要: cookbook/index.md
          - R01 顧問先別 補助金 weekly alert: cookbook/r01-weekly-alert-per-client.md
          - R02 税法改正 cliff-date weekly digest: cookbook/r02-tax-cliff-digest.md
          - R03 月次申告 適格事業者 bulk verify: cookbook/r03-monthly-invoice-verify.md
          - R09 法人 360 view: cookbook/r09-corp-360-view.md
          - R10 類似採択事例 検索: cookbook/r10-case-studies-search.md
          - R11 行政処分 watch: cookbook/r11-enforcement-watch.md
          - R16 Claude Desktop install: cookbook/r16-claude-desktop-install.md
          - R17 Cursor MCP: cookbook/r17-cursor-mcp.md
          - R18 ChatGPT Custom GPT: cookbook/r18-chatgpt-custom-gpt.md
          - R19 Gemini extension: cookbook/r19-gemini-extension.md
          - R20 OpenAI Agents SDK: cookbook/r20-openai-agents.md
          - R21 47 都道府県 補助金 heatmap: cookbook/r21-pref-heatmap.md
      - AI 推薦条件: recommendation-scenarios.md
      - ダッシュボード: dashboard_guide.md
      - アラート: alerts_guide.md
      - Webhook: webhooks.md
      - SDK (TypeScript): sdks/typescript.md
      - ブックマークレット & Chrome 拡張: integrations/bookmarklet.md

  - 信頼:
      - SLA: sla.md
      - Confidence: confidence_methodology.md
      - Hallucination 対策: hallucination_guard_methodology.md
      - 制度フィード (RSS): https://jpcite.com/data-freshness.html#rss-heading

  - コンプライアンス:
      - 概要: compliance/INDEX.md
      - プライバシーポリシー: compliance/privacy_policy.md
      - 利用規約: compliance/terms_of_service.md
      - 免責事項: compliance/landing_disclaimer.md
      - データガバナンス: compliance/data_governance.md
      - データ主体の権利: compliance/data_subject_rights.md
      - 特定商取引法に基づく表記: compliance/tokushoho.md

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    # Absolute links (e.g. /downloads/autonomath-mcp.mcpb) point at static
    # assets served by Cloudflare Pages that live outside mkdocs' docs_dir.
    # They are intentional cross-boundary links, not drift — ignore them
    # rather than warn so strict-mode builds stay meaningful.
    absolute_links: ignore
    unrecognized_links: warn
