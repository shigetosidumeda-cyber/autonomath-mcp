  - site/mcp-server.json
  - site/mcp-server.full.json
  - dxt/manifest.json
  - smithery.yaml
  - docs/openapi/v1.json
  - site/llms.txt
  - site/llms.en.txt
  - site/en/llms.txt

version_surface_paths:
