# Forbidden tokens must not appear in distribution surfaces except in excluded
# historical/redirect paths.
forbidden_tokens:
  - jpintel-mcp
  - zeimu-kaikei.ai
  - 税務会計AI

forbidden_token_exclude_paths:
  - CLAUDE.md
  - CHANGELOG.md
  - HANDOFF_
  - site/_redirects
  - docs/_internal/
  - analysis_wave18/
  - analysis_value/
  - _archive/
  - site/llms.txt
