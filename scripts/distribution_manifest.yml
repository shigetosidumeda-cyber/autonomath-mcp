# Canonical Distribution Manifest
#
# Read-only source of truth for jpcite distribution metadata. This file is
# consumed by scripts/check_distribution_manifest_drift.py and
# scripts/probe_runtime_distribution.py. It intentionally records canonical
# values only; downstream distribution surfaces must be edited separately.
#
# Last verified on 2026-05-16 JST:
# - Public default-gate MCP surfaces advertise 179 tools. Internal runtime
#   manager counts may be higher while gated or experimental tools are held back.
# - Stable-gate runtime route count is 364 and generated OpenAPI path count is 307.
# - Pricing/free-tier language is consistent: JPY 3 per billable unit /
#   ¥3 per 課金単位, tax-included JPY 3.30 where expanded, anonymous 3/day free.

product: jpcite
canonical_domains:
  site: https://jpcite.com
  api: https://api.jpcite.com
canonical_mcp_package: autonomath-mcp
canonical_pypi_package: autonomath
canonical_repo: shigetosidumeda-cyber/autonomath-mcp
canonical_api_env:
  api_key: JPCITE_API_KEY
  api_base: JPCITE_API_BASE

pyproject_version: "0.4.1"
tool_count_default_gates: 184  # public default-gate MCP tool count
route_count: 364              # runtime len(app.routes) with AUTONOMATH_EXPERIMENTAL_API_ENABLED=0, verified 2026-05-16 JST (Stream F sync)
openapi_path_count: 307       # docs/openapi/v1.json stable .paths length, verified 2026-05-16 JST (Stream F sync)
searchable_programs_total: 11601
total_programs: 14472
tier_c_count: 5961
publication_review_rows: 2871
laws_fulltext_indexed: 6493
laws_metadata: 9484
tax_rulesets_total: 50

pricing_unit_jpy_ex_tax: 3
pricing_unit_jpy_tax_included: "3.30"
pricing_model: "metered billable unit; no subscription tiers, seat fees, or annual minimums"
free_tier_requests_per_day: 3
free_tier_scope: anonymous per IP
free_tier_reset_timezone: JST
tagline_ja: "日本の制度 184-tool MCP — 補助金/法令/判例/税制/適格事業者/法人/採択事例/行政処分/入札/融資。税別 ¥3/課金単位、匿名 3回/日無料"

