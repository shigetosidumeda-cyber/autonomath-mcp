  - CLAUDE.md
  - CHANGELOG.md
  - HANDOFF_
  - scripts/registry_submissions/mcp_so_submission.md
  - site/_redirects
  # 旧 brand (zeimu-kaikei.ai / 税務会計AI) は llms*.txt と index.html JSON-LD
  # で SEO citation bridge marker として必須 (test_seo_brand_history.py LEGACY_TERMS 要件)
  - site/llms.txt
  - site/llms.en.txt
  - site/llms-full.txt
  - site/llms-full.en.txt
  - site/index.html
  - site/programs/
  - site/llms-full
  - docs/_internal/
  - analysis_wave18/
  - analysis_value/
  - _archive/
  - site/llms.txt
  # Pricing canonical surfaces — ¥3/req is the canonical user-facing
  # price phrase here (税込 ¥3.30 expanded in body copy). The forbidden
  # token list catches stale legacy strings (¥3/request, ¥3/リクエスト,
  # JPY 3/req, 3 yen/req) that need to converge on the canonical
  # "¥3/req" form; the pricing surfaces below are by-design hits.
  - site/pricing.html
  - site/playground.html
  - site/manifest.webmanifest
  - site/ai-plugin.json
  - docs/cookbook/cookbook_v3_2026_05_11.md
  # Server manifest + WebMCP wiring carry the canonical "¥3/req" phrase
  # by design — `server.json` is the MCP registry description seen by
  # ChatGPT / Claude.ai / Cursor; `webmcp_init.js` declares the cost
  # contract for browser-resident tool delegation. Both must surface
  # the canonical phrase so downstream agents see consistent pricing.
  - server.json
  - site/assets/webmcp_init.js
  # MCP split manifests (full / core / composition) are direct siblings
  # of server.json — same MCP registry SOT, just sliced by audience
  # (full = exhaustive, core = lean, composition = paid Stage-3 tools).
  # Each per-tool `description` carries the canonical "Cost-saving
  # claim: ... ¥3/req (tier A)" trailer added in Wave 51 + V3 pricing
  # rollout (2026-05-17). The substring exclude for `server.json`
  # already covers `mcp-server.json` / `site/mcp-server.json`; the
  # split derivatives need their own entries because their stems
  # ("mcp-server.full.json" etc.) do not contain the bare "server.json"
  # substring.
  - mcp-server.full.json
  - mcp-server.core.json
  - mcp-server.composition.json
  # OpenAPI specs (canonical + site mirrors) carry the canonical "¥3/req"
  # phrase by design in refund-request endpoint schema `default` fields
  # (e.g. site/docs/openapi/v1.json:15553: "返金は手動審査となります。既に
  # 課金済みの ¥3/req メータリング分は 自動取消しされません ..."). The
  # forbidden-token list is intended to catch *stale legacy* pricing
  # strings ("¥3/request", "¥3/リクエスト", "JPY 3/req", "3 yen/req") on
  # narrative/marketing surfaces. Endpoint-schema defaults are part of
  # the OpenAPI contract that downstream agents read to size billing
  # impact — they must surface the canonical phrase verbatim. Verified
  # (2026-05-17 UNBLOCK-2) no OTHER forbidden token (legacy brand /
  # stale count / banned tagline) matches inside these files.
  - docs/openapi/v1.json
  - site/docs/openapi/v1.json
  - docs/openapi/agent.json
  - site/docs/openapi/agent.json
  - site/openapi.agent.json
  - site/openapi.agent.gpt30.json
  # GG10 Justifiability landing + DD1 federated-MCP descriptors carry
  # cost-comparison narrative ("Opus 4.7 7-turn ¥500 → jpcite ¥3-¥30")
  # and per-tier sizing tables ("A (¥3 = 1 unit)"). These do NOT trigger
  # the forbidden "¥3/req" substring today (they use "¥3/billable unit"
  # and bare "¥3"), but the V3 pricing rollout may regenerate them with
  # the canonical "¥3/req" trailer. Preemptive exclusion keeps the lane
  # green across regen cycles. New 2026-05-17 (UNBLOCK-2).
  - site/why-jpcite-over-opus.html
  - site/.well-known/jpcite-justifiability.json
  - site/.well-known/jpcite-federated-mcp-12-partners.json
  - data/federated_partners_12.json
