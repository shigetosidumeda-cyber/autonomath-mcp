# Canonical Distribution Manifest
#
# Read-only source of truth for jpcite distribution metadata. This file is
# consumed by scripts/check_distribution_manifest_drift.py and
# scripts/probe_runtime_distribution.py. It intentionally records canonical
# values only; downstream distribution surfaces must be edited separately.
#
# Last verified on 2026-05-06 JST:
# - Public distribution surfaces use the 139-tool standard configuration.
# - Runtime route count is 269 and generated OpenAPI path count is 227.
# - Pricing/free-tier language is consistent: JPY 3 per billable unit or
#   request, tax-included JPY 3.30 where expanded, anonymous 3/day free.

product: jpcite
canonical_domains:
  site: https://jpcite.com
  api: https://api.jpcite.com
canonical_mcp_package: autonomath-mcp
canonical_pypi_package: autonomath
canonical_repo: shigetosidumeda-cyber/autonomath-mcp
canonical_api_env:
  api_key: JPCITE_API_KEY
  api_base: JPCITE_API_BASE

pyproject_version: "0.3.4"
tool_count_default_gates: 139  # runtime len(mcp._tool_manager.list_tools()), verified 2026-05-05 JST
route_count: 269              # runtime len(app.routes), verified 2026-05-06 JST
openapi_path_count: 227       # docs/openapi/v1.json .paths length, verified 2026-05-06 JST

pricing_unit_jpy_ex_tax: 3
pricing_unit_jpy_tax_included: "3.30"
pricing_model: "metered billable unit; no subscription tiers, seat fees, or annual minimums"
free_tier_requests_per_day: 3
free_tier_scope: anonymous per IP
free_tier_reset_timezone: JST
tagline_ja: "日本の制度 139-tool MCP — 補助金/法令/判例/税制/適格事業者/法人/採択事例/行政処分/入札/融資。JPY 3/req、anon 3/day free"

# Read-only drift checker surfaces. Pricing/free-tier scans are intentionally
# narrower than version/tool-count scans because some public docs link to
# pricing instead of repeating it.
distribution_surface_paths:
  - README.md
  - pyproject.toml
  - server.json
  - site/server.json
  - mcp-server.json
  - mcp-server.full.json
  - mcp-server.core.json
  - mcp-server.composition.json
  - site/mcp-server.json
  - site/mcp-server.full.json
  - dxt/manifest.json
  - smithery.yaml
  - docs/openapi/v1.json
  - docs/openapi/agent.json
  - site/docs/openapi/v1.json
  - site/docs/openapi/agent.json
  - site/openapi.agent.json
  - site/llms.txt
  - site/llms.en.txt
  - site/en/llms.txt

# Package-name scans are narrower than distribution scans. The agent-safe
# OpenAPI specs are OpenAI Actions schemas with billing/operator operations
# removed; they are not MCP install manifests and need not repeat the MCP
# package identifier.
canonical_mcp_package_surface_paths:
