# jpintel-mcp gold evaluation queries
# ====================================
# Public-domain (MIT, see ../LICENSE) gold-standard queries that test recall
# and precision of the AutonoMath MCP tools against a real, frozen snapshot
# of data/jpintel.db. Each row encodes:
#
#   id                      short slug, used in CI logs / regression diffs
#   query_text              Japanese natural-language question (user story)
#   tool_name               which MCP tool a correct agent should select
#   tool_args               literal kwargs that go into the tool call
#   expected_ids            unified_id / case_id / loan_id / TAX-id / ... that
#                           SHOULD appear in the top-`limit` returned rows
#                           (recall — the row IS relevant)
#   forbidden_ids           IDs that MUST NOT appear in the top-`limit`
#                           (precision — usually tier=X excluded rows or
#                            an opposite-prefecture row that hijacked FTS)
#   min_precision_at_10     fraction of the top-10 rows that must be in
#                           expected_ids. 0.5 = at least 5 of 10 are gold.
#   note                    why this query is interesting; what bug a
#                           regression would imply
#
# The `expected_ids` lists were generated by actually calling each tool on
# the live DB on 2026-04-25 (see the audit log in run.py). They are not
# hand-curated wishes; they are the current top-K. Future runs can either
# (a) re-snapshot to update the gold list when a real schema change occurs,
# or (b) detect drift and fail loudly.
#
# Categories (see README.md for the breakdown):
#   agri_*      農業 / 新規就農 / 農林水産 (the original niche)
#   mfg_*       製造業 / 中小企業 / 設備投資
#   it_*        IT / DX / セキュリティ
#   startup_*   創業 / スタートアップ / 事業承継
#   pref_*      都道府県 specific (Tokyo, Osaka, Hokkaido, Okinawa, ...)
#   tax_*       適格請求書 / インボイス / 中小企業 税制
#   loan_*      融資 (担保・保証 三軸)
#   case_*      採択事例 (recipient profiles)
#   prescreen_* profile → ranked match (prescreen_programs)
#   enforcement_*  行政処分 / 不正受給
#   cross_*     cross-dataset (programs + tax + cases + dd_profile)
#   edge_*      edge cases (typos, empty input, unicode variants)

