# Pre-commit hooks for jpintel-mcp.
# Install once per clone: pip install pre-commit && pre-commit install
# Run manually across the tree: pre-commit run --all-files
# Update hook versions: pre-commit autoupdate
#
# research/ holds drafts (blog posts, notes, free-form markdown) and is
# intentionally excluded from the strictest hooks — it is a scratch pad,
# not shipped artifact.

default_language_version:
  python: python3.13

# Apply to everything under the repo except the following paths.
exclude: |
  (?x)^(
    \.venv/.*|
    \.ruff_cache/.*|
    \.pytest_cache/.*|
    data/.*|
    sdk/python/\.venv/.*|
    sdk/typescript/node_modules/.*|
    sdk/typescript/dist/.*|
    docs/openapi/.*\.json|
    site/(cases|laws|enforcement)/.*\.md
  )$

repos:
  # ---------------------------------------------------------------------
  # jpcite distribution guards — keep public metadata aligned before push.
  # Runtime probes stay in CI because they boot the app and MCP server.
  # ---------------------------------------------------------------------
  - repo: local
    hooks:
      - id: distribution-manifest-drift
        name: distribution manifest drift
        # Use `python3` — macOS only ships `python3` by default; the bare
        # `python` alias is unavailable on stock systems and broke this hook
        # for fresh clones until 2026-05-07.
        entry: python3 scripts/check_distribution_manifest_drift.py
        language: system
        pass_filenames: false
        always_run: true

  # ---------------------------------------------------------------------
  # Stock hygiene hooks
  # ---------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        # 500 KB cap. Data dumps / fixtures >500 KB should live in data/ (gitignored)
        # or external storage, never committed.
        args: ["--maxkb=500"]
      - id: check-yaml
        # Allow multi-doc YAML (GitHub Actions occasionally uses it).
        # `--unsafe` lets the parser tolerate custom Python-object tags such
        # as `!!python/object/apply:pymdownx.slugs.slugify` in mkdocs.yml,
        # which the standard SafeLoader rejects. Validation still flags
        # syntactically-broken YAML; only the constructor tag is whitelisted.
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: ^research/.*\.md$
      - id: trailing-whitespace
        exclude: ^research/.*\.md$
        args: ["--markdown-linebreak-ext=md"]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # ---------------------------------------------------------------------
  # Ruff — lint + format. Version kept >= the floor declared in pyproject.toml
  # [dev] extras (ruff>=0.8). Update with `pre-commit autoupdate`.
  # ---------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Bumped 2026-05-07: v0.8.4 enforced UP038 (deprecated in 0.15.x);
    # the rule fired on intentional `isinstance(x, (int, float))` patterns
    # that the per-file-ignores in pyproject.toml don't otherwise exempt.
    # Pin matches the local .venv ruff to keep CI parity.
    rev: v0.15.11
    hooks:
      - id: ruff
        args: ["--fix"]
        # research/ has throwaway scripts / one-off snippets; don't gate on lint.
        exclude: ^research/
      - id: ruff-format
        exclude: ^research/

  # ---------------------------------------------------------------------
  # YAML lint — strict only on workflow + top-level yaml configs.
  # ---------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: yamllint (workflows + top-level yaml)
        # Only scan workflow files + top-level yaml (e.g., .pre-commit-config.yaml).
        # fly.toml is TOML so not in scope.
        files: ^(\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml|\.gitleaks\.yaml)$
        args: ["-c=.yamllint.yaml"]

  # ---------------------------------------------------------------------
  # Gitleaks — secret scanning on staged changes. `protect --staged` mode
  # is the documented pre-commit pattern and runs fast (<1s typically).
  # ---------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # Default entry is `gitleaks protect --verbose --redact --staged`.
        # Config in .gitleaks.toml tunes allowlists for test fixtures +
        # .env.example.

  # ---------------------------------------------------------------------
  # mypy — type checks on src/. Promoted to pre-commit-blocking per the
  # 2026-04-25 CI security gating audit (a92f5354dc4848432).
  # ---------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    # Bumped 2026-05-07 to match local .venv mypy 1.20.x. Older v1.13.0 flagged
    # 28 newer "Unused type: ignore" comments and surfaced 12 sqlite Row /
    # pydantic v2 boundary cases that mypy 1.20 reasons about correctly.
    rev: v1.20.0
    hooks:
      - id: mypy
        name: mypy (src/jpintel_mcp)
        # `_archive/` is intentionally filtered both at the file selector
        # AND via `--exclude`. Pre-commit-mypy runs in an isolated venv
        # that does not auto-honor `[tool.mypy]` from pyproject.toml; the
        # archive tree contains dated dir names with hyphens (e.g.
        # `embedding_2026-04-25/`) that mypy rejects as invalid dotted
        # package names even with `__init__.py` present, which used to
        # fatal-out the walk before any type errors could surface.
        files: ^src/jpintel_mcp/(?!_archive/).*\.py$
        exclude: ^src/jpintel_mcp/_archive/
        args:
          - "--strict"
          - "--ignore-missing-imports"
          - "--no-implicit-reexport"
          - "--exclude"
          - "^src/jpintel_mcp/_archive/"
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.6
          - fastapi>=0.115
          - types-requests
          # `mcp` (FastMCP SDK) types are required so the @mcp.tool decorator
          # is treated as typed; without this 174 of 226 errors collapse to
          # `[misc] Untyped decorator makes function untyped`. 2026-05-07.
          - mcp>=1.27
          # `ratelimit` shadows mypy untyped-decorator on the gbiz limiter.
          - ratelimit
          # Polars + pandas appear in ETL boundary functions.
          - pandas-stubs
          # Match the local .venv resolution so `# type: ignore` suppressors
          # are not flagged as unused-ignore in the isolated pre-commit venv.
          # 2026-05-07: 25 mypy errors collapsed once these resolved imports
          # against real types instead of the implicit `Any` fallback.
          - sentry-sdk>=2.58
          - stripe>=12.5
          - httpx>=0.28
          - anyio>=4.13
          - pykakasi>=2.3
          - types-pyyaml

  # ---------------------------------------------------------------------
  # bandit — Python static security analyzer (CWE-style checks). Added
  # 2026-04-25 per CI security gating audit (a92f5354dc4848432).
  # ---------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-c", ".bandit.yaml"]
        exclude: ^tests/
