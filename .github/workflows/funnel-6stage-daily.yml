name: funnel-6stage-daily

# Wave 43.5 — 6-stage agent-funnel KPI tracker.
# Runs `scripts/cron/track_funnel_6stage_daily.py` at 19:30 UTC (04:30 JST),
# appends one JSONL row to `analytics/funnel_6stage_daily.jsonl`, refreshes
# `site/status/funnel_6stage.json`, then commits both back to main.
#
# 6 stages tracked:
#   1. Discoverability — agent surface presence (llms.txt / .well-known / sitemap)
#   2. Justifiability — programs S+A source_url + primary_name coverage
#   3. Trustability   — AMS citation_rate_avg + health.json components
#   4. Accessibility  — anonymous vs metered req split, llms.txt size budget
#   5. Payability     — active api_keys + Stripe-linked + cost_ledger 24h
#   6. Retainability  — D30 retention + saved_searches weekly cadence
#
# Reads `data/jpintel.db` only (~352 MB). NEVER touches autonomath.db
# (9.7 GB) — memory `feedback_no_quick_check_on_huge_sqlite` applies.
#
# Memory contracts upheld:
#   * `feedback_autonomath_no_api_use` — zero LLM API imports
#   * `feedback_zero_touch_solo` — no human-in-the-loop required
#   * `feedback_organic_only_no_ads` — no acquisition cost line items

on:
  schedule:
    # 19:30 UTC == 04:30 JST. 30 min after monetization-metrics so the
    # AMS-derived trustability metric reads a fresh ai_mention_share file
    # if the monthly bench landed during that same wake-up cycle.
    - cron: "30 19 * * *"
  workflow_dispatch: {}

concurrency:
  group: funnel-6stage-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify jpintel.db presence (read-only)
        run: |
          if [ -f data/jpintel.db ]; then
            ls -la data/jpintel.db
          else
            echo "data/jpintel.db missing — funnel stages 2/4/5/6 = 0"
          fi

      - name: Aggregate 6-stage funnel
        run: |
          python3 scripts/cron/track_funnel_6stage_daily.py

      - name: Show today's funnel
        run: |
          if [ -f site/status/funnel_6stage.json ]; then
            jq -r '.funnel_score, (.stages[] | "\(.stage): \(.score)")' \
              site/status/funnel_6stage.json
          fi

      - name: Commit + push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analytics/funnel_6stage_daily.jsonl site/status/funnel_6stage.json
          if git diff --cached --quiet; then
            echo "no funnel delta to commit"
            exit 0
          fi
          git commit -m "cron(funnel-6stage): daily 6-stage agent funnel snapshot" \
            -m "Wave 43.5 monitoring integration — Discoverability / Justifiability / Trustability / Accessibility / Payability / Retainability. Memory: feedback_autonomath_no_api_use."
          git push origin HEAD:main
