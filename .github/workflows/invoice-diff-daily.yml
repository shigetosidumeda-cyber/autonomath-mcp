name: invoice-diff-daily

# Axis 3e — invoice 適格事業者公表 daily diff cron.
#
# Schedule: 00:00 UTC == 09:00 JST.
#
# Replaces the monthly 4M-row bulk by pulling only the since-cursor delta
# via the NTA invoice API (PDL v1.0 redistribution OK).
#
# LLM call count: 0.

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      since_cursor:
        description: "Override since-cursor (ISO 8601)"
        required: false
        default: ""
      dry_run:
        description: "If true, fetch+parse only"
        required: false
        default: "false"

concurrency:
  group: invoice-diff-daily
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  diff:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright chromium (Wave 36 fallback)
        run: |
          # Wave 36: ETL fetch_with_fallback uses Playwright on 4xx/5xx/timeout
          # against authoritative .go.jp / .lg.jp sources.
          python -m playwright install --with-deps chromium

      - name: Run invoice diff daily
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_SINCE: ${{ github.event.inputs.since_cursor }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          set -euo pipefail
          ARGS=""
          if [ -n "${INPUT_SINCE:-}" ]; then
            ARGS="--since-cursor ${INPUT_SINCE}"
          fi
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          if [ ! -f "${AUTONOMATH_DB_PATH}" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/cron/diff_invoice_registrants_daily.py \
            ${ARGS} \
            ${DRY_FLAG}

      - name: Open issue on driver failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `invoice-diff-daily failed ${new Date().toISOString()}`,
              body: `Run: ${runUrl}\n\nLikely causes: api.invoice.nta.go.jp 5xx, since-cursor drift, autonomath.db lock contention. See scripts/cron/diff_invoice_registrants_daily.py docstring.`,
              labels: ["ingest-failure", "automation", "axis3"],
            });
