name: refresh-fact-signatures-weekly

# Weekly Ed25519 re-sign cron for `am_fact_signature` (Wave 43.2.5 dim F /
# Wave 46 dim 19 dim F sub-criterion close).
#
# What it does:
#   Runs `scripts/cron/refresh_fact_signatures_weekly.py` on the Fly
#   production machine via flyctl ssh. The script walks
#   `extracted_fact` rows that are either new or amended since the last
#   `am_fact_signature.signed_at` and produces a fresh Ed25519
#   signature, UPSERTing into `am_fact_signature` with the current
#   `corpus_snapshot_id` and the active key_id.
#
# Why Sunday 02:00 UTC (= Monday 11:00 JST):
#   * Matches the cron docstring's stated schedule (line 35 of the
#     Python file).
#   * Sits clear of the 19:30 UTC daily-cron cluster and the 03:00 UTC
#     amendment-diff RSS run earlier on Monday.
#
# Required secrets:
#   FLY_API_TOKEN
#   AUTONOMATH_FACT_SIGN_PRIVATE_KEY  (32-byte hex Ed25519 seed, Fly
#     machine secret — NOT a GHA secret. Resolved by the cron script
#     from os.environ on the Fly machine where it runs.)
#
# Operator-LLM ban:
#   This cron script contains NO LLM imports — pure stdlib (sqlite3 +
#   hashlib + cryptography Ed25519). Verified by
#   `tests/test_no_llm_in_production.py` (scripts/cron/ is in
#   PRODUCTION_DIRS). Memory `feedback_no_operator_llm_api`.
#
# Dim F audit linkage:
#   Closes the **cron MISSING** axis of the 2026-05-12 dim 19 audit dim
#   F sub-criteria. Cron Python existed upstream as
#   `scripts/cron/refresh_fact_signatures_weekly.py` but the wiring
#   workflow YAML was missing — this PR (Wave 46 dim 19 F round 2)
#   lands that wiring. See `docs/research/wave46/STATE_w46_dim19_F2_pr.md`.

on:
  schedule:
    # 02:00 UTC every Sunday == 11:00 JST every Monday.
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      max_rows:
        description: "Cap rows signed in one run (default unlimited)"
        required: false
        default: ""
      dry_run:
        description: "If true, walk + sign but do NOT write am_fact_signature"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: refresh-fact-signatures-weekly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  refresh-signatures:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Refresh fact signatures on Fly machine
        id: run
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          INPUT_MAX_ROWS: ${{ github.event.inputs.max_rows }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          MAX_FLAG=""
          if [ -n "${INPUT_MAX_ROWS:-}" ]; then
            MAX_FLAG="--max-rows ${INPUT_MAX_ROWS}"
          fi
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/cron/refresh_fact_signatures_weekly.py \
              ${MAX_FLAG} \
              ${DRY_FLAG}"

      - name: Open issue on driver failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY="Cron: \`scripts/cron/refresh_fact_signatures_weekly.py\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nSHA: \`${{ github.sha }}\`\n\nLikely causes:\n  * migration 262 (am_fact_signature) not applied on the Fly volume's autonomath.db\n  * AUTONOMATH_FACT_SIGN_PRIVATE_KEY Fly secret missing or malformed (must be 32-byte hex Ed25519 seed)\n  * Fly machine /data/autonomath.db locked by a concurrent writer\n\nVerify with:\n  flyctl ssh console -a autonomath-api -C 'sqlite3 /data/autonomath.db \"SELECT COUNT(*) FROM am_fact_signature;\"'\n  flyctl ssh console -a autonomath-api -C 'env | grep AUTONOMATH_FACT_SIGN_PRIVATE_KEY >/dev/null && echo present || echo missing'\n"
          gh issue create \
            --title "refresh-fact-signatures-weekly failed on $(date -u +%Y-%m-%d)" \
            --label cron-failure \
            --label automation \
            --body "$BODY"
