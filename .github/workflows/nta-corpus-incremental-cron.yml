name: nta-corpus-incremental-cron

# Daily incremental ingest of NTA primary-source corpora into autonomath.db.
# Targets: 国税不服審判所 公表裁決事例 (saiketsu),
#          国税庁 質疑応答事例 (shitsugi),
#          国税庁 文書回答事例 (bunsho).
#
# Pace + saturation projection (2026-04-29 baseline):
# * saiketsu: 137 / ~5,000 ingested (2.7%). Daily cap = 100 rows. ETA to
#   full saturation ≈ 50 days at current cap.
# * shitsugi: 286 ingested. Tail likely ~500-700 pages total — natural
#   wall-clock budget cap (20 min × 1 req / 2s ≈ 600 fetches/day max).
#   ETA to full saturation ≈ 1-2 days from cursor; mostly already done.
# * bunsho:   278 ingested. Same shape as shitsugi. ETA ≈ 1-2 days.
#
# Why daily not weekly: NTA pages amend visibly within weeks (新通達 +
# 公表裁決 is published quarterly but with rolling additions). A daily
# cron with a 100-row cap saturates the existing backlog in ~50 days
# AND keeps the corpus current once saturated, all within NTA's 1 req/2s
# crawl-delay budget.
#
# Runs ON the Fly production machine via `flyctl ssh` so DB writes land
# on the Fly volume's autonomath.db (the canonical 8.29 GB primary).
# The repo-local autonomath.db is a dev mirror only.
#
# Required secrets:
#   FLY_API_TOKEN
# Optional secrets:
#   SLACK_WEBHOOK_INGEST   notify on driver failure

on:
  schedule:
    # 19:05 UTC daily == 04:05 JST. NTA is fully idle this window.
    # Staggered +5 min vs ingest-daily (0 19) to avoid Fly machine
    # contention. Runs *before* the 19:30 UTC weekly law-load on Sundays
    # so the two crons never overlap on the same 30-min wall.
    - cron: "5 19 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Which target (all | saiketsu | shitsugi | bunsho)"
        required: false
        default: "all"
      max_minutes:
        description: "Per-target wall-clock cap (default: 20)"
        required: false
        default: "20"
      dry_run:
        description: "If true, heartbeat + cursor read only, no fetches"
        required: false
        default: "false"

concurrency:
  group: nta-corpus-incremental-cron
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    # 3 targets × 20 min budget + flyctl overhead + log copy. 75 min cap
    # gives ~15 min headroom over the script's natural worst case.
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run incremental NTA ingest on Fly machine
        id: run
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          INPUT_TARGET: ${{ github.event.inputs.target }}
          INPUT_MAX_MIN: ${{ github.event.inputs.max_minutes }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          TARGET="${INPUT_TARGET:-all}"
          MAX_MIN="${INPUT_MAX_MIN:-20}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          # PYTHONPATH=/app required so transitively-imported `scripts.lib.*`
          # modules resolve when the script is invoked by absolute path.
          set +e
          flyctl ssh console -a autonomath-api -C \
            "env PYTHONPATH=/app \
              /opt/venv/bin/python /app/scripts/cron/ingest_nta_corpus_incremental.py \
              --autonomath-db /data/autonomath.db \
              --jpintel-db /data/jpintel.db \
              --target ${TARGET} \
              --max-minutes ${MAX_MIN} \
              --log-file /data/nta_corpus_load_log.jsonl \
              --workflow-run-id ${{ github.run_id }} \
              ${DRY_FLAG}" \
            2>&1 | tee nta_ingest.out
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # R8 fix 2026-05-07 (R8_DAILY_FORENSIC_FIX): flyctl ssh collapses the
          # inner Python exit code into its own status (always 1 on non-zero),
          # so the original `[ rc -ne 2 ]` branch never matched even when the
          # script intentionally exited 2 ("no work this run" / saturated /
          # dry_run completed cleanly). Detect that case from the wrapped
          # marker `Process exited with status 2` in stderr/stdout instead.
          # rc == 2 (legacy direct call) OR marker present (flyctl-wrapped)
          # both mean "no work done — keep workflow green".
          if [ "$rc" -ne 0 ]; then
            if grep -qE 'Process exited with status 2' nta_ingest.out 2>/dev/null; then
              echo "::notice::ingest_nta_corpus_incremental.py exited 2 (no work this run; flyctl-wrapped). Treating as success."
              rc=0
            fi
          fi
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            echo "::error::ingest_nta_corpus_incremental.py exited $rc"
            exit 1
          fi

      - name: Pull nta_corpus_load_log.jsonl off Fly machine
        if: success()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          flyctl ssh sftp get /data/nta_corpus_load_log.jsonl -a autonomath-api \
            || echo "::warning::no /data/nta_corpus_load_log.jsonl yet"
          if [ -f nta_corpus_load_log.jsonl ]; then
            mv nta_corpus_load_log.jsonl data/nta_corpus_load_log.jsonl
            tail -n 1 data/nta_corpus_load_log.jsonl || true
          fi

      - name: Open issue on driver failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY="Loader: \`scripts/cron/ingest_nta_corpus_incremental.py\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nSHA: \`${{ github.sha }}\`\n\nLikely causes: NTA / KFS 5xx after retries, network egress block, or autonomath.db lock contention. Cursor auto-rotates one step backward on hard failure — next run resumes near the break point.\n"
          gh issue create \
            --title "nta-corpus-incremental-cron failed on $(date -u +%Y-%m-%d)" \
            --label ingest-failure \
            --label automation \
            --body "$BODY"

      - name: Slack notify on driver failure
        if: failure() && env.SLACK_WEBHOOK_INGEST != ''
        env:
          SLACK_WEBHOOK_INGEST: ${{ secrets.SLACK_WEBHOOK_INGEST }}
        run: |
          set -euo pipefail
          curl -fsS -X POST -H 'content-type: application/json' \
            --data "{\"text\":\":warning: nta-corpus-incremental-cron failure — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_INGEST" || true
