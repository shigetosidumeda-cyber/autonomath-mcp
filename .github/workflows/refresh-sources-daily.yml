name: refresh-sources-daily

# MASTER_PLAN_v1 章 3 §D3:
#   tier S/A daily verify pass — HEAD → 200 → GET → SHA256 diff against
#   programs.source_content_hash_at_verify (mig wave24_108). On any
#   outcome we bump source_verified_at = NOW so the median-freshness KPI
#   reflects "we re-checked the live source at this timestamp" — not just
#   "we updated content".
#
#   Pure SQLite + httpx; no LLM calls (memory `feedback_no_operator_llm_api`).
#
#   Pace: ~1,454 tier S+A rows × ~1 req/host/sec ≈ 30-45 min wall clock.
#   GitHub Actions free-tier ceiling is 6h; 90 min job timeout is generous.
#
# Cadence: 18:00 UTC == 03:00 JST daily. Pairs with the weekly tier B/C
# pass at refresh-sources-weekly.yml (Sunday only).

on:
  schedule:
    # 03:05 JST every day (18:05 UTC previous day). Offset +5 min from
    # analytics-cron 18:00 UTC to avoid runner contention (W14-12 audit).
    - cron: '5 18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, --dry-run (no DB writes; report only)."
        required: false
        default: 'false'
      max_rows:
        description: "Optional row cap for smoke tests (default unset)."
        required: false
        default: ''

permissions:
  contents: read
  issues: write   # tier-C alert is in the weekly job; daily inherits perm symmetry.

concurrency:
  group: refresh-sources-daily
  cancel-in-progress: false

jobs:
  refresh-sa:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install package
        run: pip install -e .

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Hydrate jpintel.db from Fly volume
        id: hydrate_db
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::warning::FLY_API_TOKEN not set; writing skipped reports."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p data
          rm -f data/jpintel.db data/jpintel.live.db
          flyctl ssh console -a autonomath-api -C \
            "sqlite3 /data/jpintel.db \".backup /data/jpintel.live.db\""
          flyctl ssh sftp get /data/jpintel.live.db -a autonomath-api
          mv jpintel.live.db data/jpintel.db
          ls -la data/jpintel.db
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Run S/A liveness pass
        if: steps.hydrate_db.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_MAX_ROWS: ${{ github.event.inputs.max_rows }}
        run: |
          set -euo pipefail
          ARGS=(--tier "S,A")
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "${INPUT_MAX_ROWS:-}" ]; then
            ARGS+=(--max-rows "${INPUT_MAX_ROWS}")
          fi
          python scripts/refresh_sources.py --db data/jpintel.db "${ARGS[@]}"

      - name: Write skipped reports when DB unavailable
        if: steps.hydrate_db.outputs.ready != 'true'
        run: |
          set -euo pipefail
          mkdir -p data
          cat > data/refresh_sources_report.json <<'JSON'
          {"status":"skipped","reason":"missing_fly_api_token_or_db","rows":[]}
          JSON
          cat > data/source_freshness_report.json <<'JSON'
          {"status":"skipped","reason":"missing_fly_api_token_or_db","tiers":["S","A"]}
          JSON

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: refresh-sources-daily-SA
          path: |
            data/refresh_sources_report.json
            data/source_freshness_report.json

      # CI runs against the in-repo dev mirror DB. The Fly volume's
      # autonomath.db / jpintel.db are the canonical writes — those are
      # touched by the Fly machine via `scripts/cron/refresh_sources_nightly.sh`
      # on the same cron expression. CI only proves the script works.
