name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # id-token is required for PyPI trusted publishing; safe to keep even with API token auth.
  id-token: write

jobs:
  test:
    name: Test suite (release gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint (CLAUDE.md Quality gates target)
        # Match the lint target documented in CLAUDE.md so the release gate
        # tracks the same scripts the regular test workflow lints, instead
        # of the legacy `ruff check .` which trips on long-tail SIM105 /
        # B904 / TC002 warnings in third-party-shaped paths and has blocked
        # every prior release tag (v0.3.1 / v0.3.2 both red here).
        run: |
          ruff check \
            scripts/generate_cross_hub_pages.py \
            scripts/generate_geo_program_pages.py \
            scripts/generate_industry_hub_pages.py \
            scripts/generate_industry_program_pages.py \
            scripts/generate_prefecture_pages.py \
            scripts/generate_program_pages.py \
            scripts/regen_llms_full.py \
            scripts/regen_llms_full_en.py \
            scripts/etl/generate_program_rss_feeds.py

      - name: Pytest
        run: pytest tests/ -v --tb=short

  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  github-release:
    name: Create GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Create release with auto-generated changelog
        # softprops/action-gh-release auto-generates release notes from PRs since the last tag.
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8 # v2.0.9
        with:
          generate_release_notes: true
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
