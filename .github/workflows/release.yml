name: release

on:
  push:
    tags:
      - "v*"
  # Allow manual re-trigger for an existing tag (no force-push) when an
  # upstream gate change needs to be replayed against a tag that already
  # exists. Pass `ref: vX.Y.Z` to gh workflow run.
  workflow_dispatch: {}

permissions:
  contents: write
  # id-token is required for PyPI trusted publishing; safe to keep even with API token auth.
  id-token: write

# Match test.yml's PYTEST_TARGETS so the release gate runs the same set
# of tests the regular CI proves green. Anything outside this list (HF
# exporters, e2e, sdk, eval seed-DB tests, bs4-dependent PDF extraction)
# requires extras / fixture data that the release runner intentionally
# does not install.
env:
  PYTEST_TARGETS: >-
    tests/test_program_rss_feeds.py
    tests/test_distribution_manifest.py
    tests/test_static_public_reachability.py
    tests/test_enforcement.py
    tests/test_rate_limit.py
    tests/test_source_manifest.py
    tests/test_extract_prefecture.py
    tests/test_no_llm_in_production.py
    tests/test_openapi_export.py
    tests/test_openapi_agent.py
    tests/test_billing.py
    tests/test_billing_webhook_signature.py
    tests/test_programs_batch.py
    tests/test_usage_billing_idempotency.py
    tests/test_self_cap.py
    tests/test_cost_preview.py
    tests/test_trial_signup.py
    tests/test_device_flow.py

jobs:
  test:
    name: Test suite (release gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev + site extras
        # Match the regular test workflow's extras (dev,site) so the
        # release gate sees the same dependency set the day-to-day CI
        # exercises. HF / e2e modules need pandas / playwright that are
        # NOT installed here; their tests are skipped at collection time
        # below to avoid a release-blocking ModuleNotFoundError.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Ruff lint (CLAUDE.md Quality gates target)
        # Match the lint target documented in CLAUDE.md so the release gate
        # tracks the same scripts the regular test workflow lints, instead
        # of the legacy `ruff check .` which trips on long-tail SIM105 /
        # B904 / TC002 warnings in third-party-shaped paths and has blocked
        # every prior release tag (v0.3.1 / v0.3.2 both red here).
        run: |
          ruff check \
            scripts/generate_cross_hub_pages.py \
            scripts/generate_geo_program_pages.py \
            scripts/generate_industry_hub_pages.py \
            scripts/generate_industry_program_pages.py \
            scripts/generate_prefecture_pages.py \
            scripts/generate_program_pages.py \
            scripts/regen_llms_full.py \
            scripts/regen_llms_full_en.py \
            scripts/etl/generate_program_rss_feeds.py

      - name: Pytest (PYTEST_TARGETS — matches test.yml)
        run: pytest $PYTEST_TARGETS -q --tb=short

  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing via OIDC)
        # PYPI_API_TOKEN secret has never been set on this repo, so the
        # legacy password mode failed silently across every prior tag
        # (v0.3.1 / v0.3.2 hand-published with twine).
        # Switch to PyPI Trusted Publishing — id-token: write at the
        # workflow level already provides the OIDC token; the action
        # exchanges it with PyPI when no password/api-token is supplied.
        # Pre-req: register this repo + workflow + environment as a
        # Trusted Publisher at https://pypi.org/manage/project/autonomath-mcp/settings/publishing/
        # (one-time owner action; no token needs to leave PyPI).
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  github-release:
    name: Create GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Create release with auto-generated changelog
        # softprops/action-gh-release auto-generates release notes from PRs since the last tag.
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8 # v2.0.9
        with:
          generate_release_notes: true
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
