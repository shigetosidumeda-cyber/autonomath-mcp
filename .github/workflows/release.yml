name: release

on:
  push:
    tags:
      - "v*"
  # Allow manual re-trigger for an existing tag (no force-push) when an
  # upstream gate change needs to be replayed against a tag that already
  # exists. Pass `ref: vX.Y.Z` to gh workflow run.
  workflow_dispatch: {}

permissions:
  contents: write
  # id-token is required for PyPI trusted publishing; safe to keep even with API token auth.
  id-token: write

# Match test.yml's PYTEST_TARGETS so the release gate runs the same set
# of tests the regular CI proves green. Anything outside this list (HF
# exporters, e2e, sdk, eval seed-DB tests, bs4-dependent PDF extraction)
# requires extras / fixture data that the release runner intentionally
# does not install.
