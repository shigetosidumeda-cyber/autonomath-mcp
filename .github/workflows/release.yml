jobs:
  test:
    name: Test suite (release gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev + site extras
        # Match the regular test workflow's extras (dev,site) so the
        # release gate sees the same dependency set the day-to-day CI
        # exercises. HF / e2e modules need pandas / playwright that are
        # NOT installed here; their tests are skipped at collection time
        # below to avoid a release-blocking ModuleNotFoundError.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Ruff lint (CLAUDE.md Quality gates target)
        # Match the lint target documented in CLAUDE.md so the release gate
        # tracks the same scripts the regular test workflow lints, instead
        # of the legacy `ruff check .` which trips on long-tail SIM105 /
        # B904 / TC002 warnings in third-party-shaped paths and has blocked
        # every prior release tag (v0.3.1 / v0.3.2 both red here).
        run: |
          ruff check \
            scripts/etl/generate_program_rss_feeds.py \
            scripts/generate_city_pages.py \
            scripts/generate_compare_pages.py \
            scripts/generate_cross_hub_pages.py \
            scripts/generate_favicon.py \
            scripts/generate_geo_citation_pages.py \
            scripts/generate_geo_industry_pages.py \
            scripts/generate_geo_program_pages.py \
            scripts/generate_industry_hub_pages.py \
            scripts/generate_industry_program_pages.py \
            scripts/generate_og_images.py \
            scripts/generate_prefecture_pages.py \
            scripts/generate_program_pages.py \
            scripts/generate_public_counts.py \
            scripts/ops/aggregate_acceptance.py \
            scripts/ops/generate_identity_confidence_golden.py \
            scripts/ops/harvest_value_growth_dual.py \
            scripts/ops/lane_policy_enforcer.py \
            scripts/ops/mcp_manifest_deep_diff.py \
            scripts/ops/migration_inventory.py \
            scripts/ops/perf_smoke.py \
            scripts/ops/post_deploy_smoke.py \
            scripts/ops/pre_deploy_verify.py \
            scripts/ops/preflight_production_improvement.py \
            scripts/ops/production_deploy_go_gate.py \
            scripts/ops/release_readiness.py \
            scripts/ops/repo_dirty_lane_report.py \
            scripts/ops/repo_hygiene_inventory.py \
            scripts/ops/repo_value_asset_report.py \
            scripts/ops/sync_workflow_targets.py \
            scripts/ops/sync_workflow_targets_verify.py \
            scripts/ops/verify_migration_targets.py \
            scripts/regen_llms_full.py \
            scripts/regen_llms_full_en.py \
            scripts/regen_qa_sitemap.py

      - name: Ruff format check
        run: ruff format --check $RUFF_TARGETS

      - name: Pytest (PYTEST_TARGETS — matches test.yml)
        run: pytest $PYTEST_TARGETS -q --tb=short

  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing via OIDC)
        # PYPI_API_TOKEN secret has never been set on this repo, so the
        # legacy password mode failed silently across every prior tag
        # (v0.3.1 / v0.3.2 hand-published with twine).
        # Switch to PyPI Trusted Publishing — id-token: write at the
        # workflow level already provides the OIDC token; the action
        # exchanges it with PyPI when no password/api-token is supplied.
        # Pre-req: register this repo + workflow + environment as a
        # Trusted Publisher at https://pypi.org/manage/project/autonomath-mcp/settings/publishing/
        # (one-time owner action; no token needs to leave PyPI).
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  github-release:
    name: Create GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Create release with auto-generated changelog
        # softprops/action-gh-release auto-generates release notes from PRs since the last tag.
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8 # v2.0.9
        with:
          generate_release_notes: true
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
