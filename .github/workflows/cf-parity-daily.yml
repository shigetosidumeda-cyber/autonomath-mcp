name: cf-parity-daily

# Wave 20 B22: daily CF Pages parity verify across 3 jpcite hostnames.
#
# Why daily: CF Pages, CF Workers, Cloudflare _redirects, and origin
# Fly machines can drift independently. A weekly cadence misses
# multi-day blind spots; a per-deploy cadence misses cache TTL drift.
# Daily 04:00 JST (= 19:00 UTC previous day) gives 1 verify between
# 02:00-04:00 ETL window and the morning operator handoff.
#
# What it does: runs `scripts/ops/cf_parity_verify.py` which fans out
# GET requests to 10 well-known resources on (jpcite.com,
# www.jpcite.com, api.jpcite.com) and emits `site/status/cf_parity.json`.
# Drift is flagged as 'degraded' in the JSON; the workflow still exits
# 0 (cron-friendly) so a transient blip does not page the operator.
#
# Output is committed to main if it changed (status snapshot stays in
# the repo so the dashboard can render it).

on:
  schedule:
    # 19:00 UTC = 04:00 JST (next day).
    - cron: "0 19 * * *"
  workflow_dispatch:


concurrency:
  # Wave 43 noise reduction (2026-05-12): serialize same-ref runs.
  group: cf-parity-daily-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write   # auto-commit cf_parity.json snapshot

jobs:
  cf-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Run CF parity verify
        run: |
          set -euo pipefail
          python scripts/ops/cf_parity_verify.py --pretty
          cat site/status/cf_parity.json | python -c "import sys,json; d=json.load(sys.stdin); print('overall=', d['overall'])"

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- site/status/cf_parity.json; then
            git add site/status/cf_parity.json
            git commit -m "status: cf_parity daily snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:main
          else
            echo "no parity drift; skipping commit"
          fi
