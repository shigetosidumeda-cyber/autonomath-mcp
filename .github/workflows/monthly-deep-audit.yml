name: monthly-deep-audit

# Wave 15 H1 — monthly 5-axis deep audit (SEO + GEO + HTML/a11y + per-record
# + AI-bot/competitive) over site/ and the public surface, executed on the
# 1st of each month at 03:00 UTC (= 12:00 JST). Each axis writes a dated
# markdown report under docs/audit/<axis>_audit_<YYYY-MM>.md plus a JSON
# score sidecar consumed by the regression gate. After the matrix completes
# the workflow opens a single PR with all 5 reports for operator review.
#
# Constraints (CLAUDE.md):
#   - Zero LLM API calls (pure stdlib + light deps). NO Anthropic / OpenAI
#     imports anywhere in scripts/ops/audit_runner_*.py.
#   - Read-only against deployed site/* and docs/. No production mutation.
#   - Solo + zero-touch: PR auto-open, operator reviews + merges.
#   - Score regression -> auto-open GitHub Issue with `audit-regression`
#     label so the operator catches it even if PR review is delayed.

on:
  schedule:
    # 03:00 UTC on the 1st == 12:00 JST on the 1st.
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      axes:
        description: "Comma-separated axes to run (default: all 5)"
        required: false
        default: "seo,geo,html,per_record,ai_bot"

concurrency:
  group: monthly-deep-audit-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        axis: [seo, geo, html, per_record, ai_bot]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Install audit deps (PyYAML for sitemap parse)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run ${{ matrix.axis }} audit
        env:
          AUDIT_MONTH: ${{ github.run_started_at }}
        run: |
          set -euo pipefail
          MONTH=$(date -u +%Y-%m)
          python scripts/ops/audit_runner_${{ matrix.axis }}.py \
            --out-md "docs/audit/${{ matrix.axis }}_audit_${MONTH}.md" \
            --out-json "docs/audit/${{ matrix.axis }}_audit_${MONTH}.json"

      - name: Upload axis artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: audit-${{ matrix.axis }}
          path: docs/audit/${{ matrix.axis }}_audit_*.md
          if-no-files-found: error

  open-pr:
    needs: audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download all axis artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: /tmp/audit-artifacts

      - name: Stage reports into docs/audit/
        run: |
          set -euo pipefail
          mkdir -p docs/audit
          find /tmp/audit-artifacts -name '*_audit_*.md' -exec cp -v {} docs/audit/ \;

      - name: Detect regressions vs baseline
        id: regression
        run: |
          set -euo pipefail
          MONTH=$(date -u +%Y-%m)
          python scripts/ops/audit_runner_seo.py --compare-baseline \
            tests/regression/audit_baseline.json \
            --month "$MONTH" \
            --emit-summary /tmp/audit_regression_summary.txt || true
          if [ -s /tmp/audit_regression_summary.txt ]; then
            echo "regressed=true" >> "$GITHUB_OUTPUT"
            {
              echo 'summary<<EOF'
              cat /tmp/audit_regression_summary.txt
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "regressed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open auto-PR with monthly audit bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          MONTH=$(date -u +%Y-%m)
          BRANCH="audit/monthly-${MONTH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/audit/
          if git diff --cached --quiet; then
            echo "No audit deltas; skipping PR."
            exit 0
          fi
          git commit -m "audit: monthly 5-axis deep audit ${MONTH}"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "audit: monthly 5-axis deep audit ${MONTH}" \
            --body "Automated 5-axis audit bundle (SEO / GEO / HTML+a11y / per-record SEO / AI-bot+competitive). Operator review then merge."

      - name: Open regression Issue on score drop
        if: steps.regression.outputs.regressed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          MONTH=$(date -u +%Y-%m)
          gh issue create \
            --title "audit-regression: monthly ${MONTH} score drop" \
            --label "audit-regression" \
            --body "${{ steps.regression.outputs.summary }}"
