name: alliance-opportunity-weekly

on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        required: false
        default: "false"
      max_houjin:
        required: false
        default: "50000"

permissions:
  contents: read

concurrency:
  group: alliance-opportunity-weekly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: run
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          MAX="--max-houjin ${{ inputs.max_houjin || '50000' }}"
          if [ ! -s "$AUTONOMATH_DB_PATH" ]; then
            python scripts/cron/precompute_alliance_opportunity.py --autonomath-db "$AUTONOMATH_DB_PATH" --dry-run --max-houjin 5
            exit 0
          fi
          python scripts/cron/precompute_alliance_opportunity.py --autonomath-db "$AUTONOMATH_DB_PATH" $DRY $MAX
