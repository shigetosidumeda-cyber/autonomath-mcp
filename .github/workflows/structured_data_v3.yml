name: structured_data_v3
on:
  workflow_dispatch: {}


concurrency:
  # Wave 43 noise reduction (2026-05-12): serialize same-ref runs.
  group: structured-data-v3-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Validate JSON-LD blocks
        run: python scripts/validate_jsonld.py
