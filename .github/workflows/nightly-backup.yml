name: nightly-backup

# Runs the online SQLite backup inside the Fly machine, pulls the artifact off
# via flyctl sftp, verifies sha256, then mirrors it to Cloudflare R2 with a
# 14-day rolling window.
#
# Required GitHub repository secrets:
#   FLY_API_TOKEN         Fly.io deploy token with ssh+sftp access to app `autonomath-api`.
#   R2_ENDPOINT           Cloudflare R2 S3 endpoint (e.g. https://<accountid>.r2.cloudflarestorage.com).
#   R2_ACCESS_KEY_ID      Cloudflare R2 access key id.
#   R2_SECRET_ACCESS_KEY  Cloudflare R2 secret access key.
#   R2_BUCKET             Target bucket name (e.g. autonomath-backups).
#
# Fail-closed semantics (2026-05-03 hardening):
#   The off-site upload step FAILS THE WORKFLOW when any R2 secret is missing.
#   Older policy treated missing secrets as ::warning + exit 0; that hid the
#   loss of off-site DR durability behind a green check. Operators MUST set
#   all four R2_* secrets, otherwise nightly-backup fails loudly and the
#   alert lands in Actions / Slack instead of a silent gap.
#
# TODO (operator — manual Fly.io steps required if the Fly app is still named jpintel-mcp):
#   The fly.toml already declares: app = "autonomath-api"
#   If the live Fly app is still named "jpintel-mcp", complete the rename with:
#     fly apps create autonomath-api          # create new app in same org
#     fly deploy --app autonomath-api         # deploy current image to new app
#     fly volumes move <vol-id> autonomath-api  # or re-attach volume
#     fly apps destroy jpintel-mcp           # delete old app (irreversible)
#   Until that is done, revert -a flags below to -a autonomath-api to keep CI green.

on:
  schedule:
    # 18:17 UTC == 03:17 JST. Off-peak vs noon traffic spikes.
    - cron: "17 18 * * *"
  workflow_dispatch: {}

concurrency:
  group: nightly-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run backup on Fly machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/backup.py \
              --db /data/jpintel.db \
              --out /data/backups \
              --keep 14 \
              --gzip"

      - name: Cleanup anon_rate_limit rows older than 3 months
        # Keeps the per-IP quota table small. 2026-04-23 pricing pivot switched
        # the bucket from daily (YYYY-MM-DD) to monthly (YYYY-MM-01 in JST);
        # we need the current month for enforcement and a couple months back
        # for abuse forensics. `date('now', '-90 days')` runs in the SQLite
        # UTC clock which is close enough for a ~3-month rolling trim.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          flyctl ssh console -a autonomath-api -C \
            "sqlite3 /data/jpintel.db \"DELETE FROM anon_rate_limit WHERE date < date('now', '-90 days');\""

      - name: Locate latest backup path on Fly machine
        id: locate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          # `flyctl ssh console -C` is argv-style: it execs the argv directly
          # on the remote machine WITHOUT a shell. Pipes / redirects / && in
          # the quoted string become literal arguments to `ls`, not shell
          # operators, so the previous "ls -1t ... | head -1" form was
          # equivalent to `ls -1t ... '|' 'head' '-1'` — `ls` errored on
          # `head` as a missing path and the pipe never ran. Wrap explicitly
          # in `sh -c '...'` so the remote shell parses the pipeline.
          # Bug discovered 2026-05-07 by R8 backup/restore drill audit
          # (3 nights of RED workflow with the R2 upload step skipped).
          LATEST=$(flyctl ssh console -a autonomath-api -C \
              "sh -c 'ls -1t /data/backups/jpintel-*.db.gz | head -1'" | tr -d '\r\n')
          if [ -z "$LATEST" ]; then
            echo "ERROR: could not locate latest backup on machine" >&2
            exit 1
          fi
          echo "latest_remote=$LATEST" >> "$GITHUB_OUTPUT"
          echo "latest_basename=$(basename "$LATEST")" >> "$GITHUB_OUTPUT"

      - name: Copy backup and checksum off Fly machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          LATEST_REMOTE: ${{ steps.locate.outputs.latest_remote }}
        run: |
          set -euo pipefail
          flyctl ssh sftp get "$LATEST_REMOTE"         -a autonomath-api
          flyctl ssh sftp get "${LATEST_REMOTE}.sha256" -a autonomath-api
          ls -la jpintel-*.db.gz jpintel-*.db.gz.sha256

      - name: Verify sha256
        run: |
          set -euo pipefail
          shasum -a 256 -c jpintel-*.db.gz.sha256

      - name: Build backup manifest (sha + row count + schema migration max)
        id: manifest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          LATEST_BASENAME: ${{ steps.locate.outputs.latest_basename }}
        # Capture the integrity-relevant facts about THIS backup so an
        # auditor can later verify which exact corpus snapshot a given
        # .db.gz on R2 corresponds to. We probe the LIVE Fly volume (not
        # the local gzipped artifact) for row counts because gunzipping
        # 350+ MB on the runner is wasteful when the source numbers are
        # the same. sha256 of the artifact comes from the .sha256
        # sidecar emitted by backup.py.
        run: |
          set -euo pipefail
          ARTIFACT_SHA=$(awk '{print $1}' "${LATEST_BASENAME}.sha256")
          PROGRAMS_COUNT=$(flyctl ssh console -a autonomath-api -q -C \
            "sqlite3 /data/jpintel.db 'SELECT COUNT(*) FROM programs;'" \
            | tr -d '\r\n' | awk '{print $NF}')
          API_KEYS_COUNT=$(flyctl ssh console -a autonomath-api -q -C \
            "sqlite3 /data/jpintel.db 'SELECT COUNT(*) FROM api_keys;'" \
            | tr -d '\r\n' | awk '{print $NF}')
          # schema_migrations.id is filename like "121_subsidy_rate_text_column.sql".
          # max(id) preserves lexical ordering which matches our zero-padded
          # numeric prefix scheme.
          MIGRATION_MAX=$(flyctl ssh console -a autonomath-api -q -C \
            "sqlite3 /data/jpintel.db 'SELECT COALESCE(MAX(id),\"\") FROM schema_migrations;'" \
            | tr -d '\r\n' | awk '{print $NF}')
          QUICK_CHECK=$(flyctl ssh console -a autonomath-api -q -C \
            "sqlite3 /data/jpintel.db 'PRAGMA quick_check;'" \
            | tr -d '\r\n' | awk '{print $NF}')

          # Hard floor — match scripts/schema_guard.py prod gate. A backup
          # of an empty / corrupt prod DB is worse than no backup because
          # it can quietly overwrite a good R2 snapshot via rotation.
          if [ -z "${PROGRAMS_COUNT:-}" ] || [ "${PROGRAMS_COUNT}" -lt 10000 ] 2>/dev/null; then
            echo "::error::backup manifest fails programs floor (got=${PROGRAMS_COUNT:-empty})"
            exit 1
          fi
          if [ "${QUICK_CHECK}" != "ok" ]; then
            echo "::error::backup manifest fails quick_check (got=${QUICK_CHECK})"
            exit 1
          fi

          MANIFEST_PATH="${LATEST_BASENAME}.manifest.json"
          cat > "$MANIFEST_PATH" <<EOF
          {
            "artifact_basename": "${LATEST_BASENAME}",
            "artifact_sha256": "${ARTIFACT_SHA}",
            "source_db": "/data/jpintel.db",
            "programs_count": ${PROGRAMS_COUNT},
            "api_keys_count": ${API_KEYS_COUNT},
            "schema_migration_max": "${MIGRATION_MAX}",
            "quick_check": "${QUICK_CHECK}",
            "captured_at": "$(date -u +%FT%TZ)",
            "workflow_run_id": "${GITHUB_RUN_ID}"
          }
          EOF
          cat "$MANIFEST_PATH"
          echo "manifest_path=${MANIFEST_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload to Cloudflare R2 and rotate (fail-closed if secrets missing)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          LATEST_BASENAME: ${{ steps.locate.outputs.latest_basename }}
          MANIFEST_PATH: ${{ steps.manifest.outputs.manifest_path }}
        run: |
          set -euo pipefail

          # Fail-closed (2026-05-03 hardening). Previously emitted a
          # ::warning and exited 0, which silently lost off-site DR.
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] \
             || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] \
             || [ -z "${R2_ENDPOINT:-}" ] \
             || [ -z "${R2_BUCKET:-}" ]; then
            echo "::error::Missing R2_* GHA repository secrets — failing nightly-backup loudly." \
              "Operator runbook: docs/runbook/ghta_r2_secrets.md (Fly secret store ≠ GHA secret store;" \
              "set R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ENDPOINT / R2_BUCKET via 'gh secret set'" \
              "to restore off-site DR durability)."
            exit 1
          fi

          # aws CLI ships preinstalled on ubuntu-latest.
          PREFIX="autonomath-api"
          aws s3 cp "$LATEST_BASENAME"         "s3://$R2_BUCKET/$PREFIX/" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "${LATEST_BASENAME}.sha256" "s3://$R2_BUCKET/$PREFIX/" --endpoint-url "$R2_ENDPOINT"
          if [ -f "$MANIFEST_PATH" ]; then
            aws s3 cp "$MANIFEST_PATH" "s3://$R2_BUCKET/$PREFIX/" --endpoint-url "$R2_ENDPOINT"
          fi

          # Rotation: keep only the 14 newest jpintel-*.db.gz + their .sha256 siblings.
          # NOTE: backup filenames (jpintel-*.db.gz) are set by scripts/backup.py and
          # are an internal artifact naming convention — leave the glob unchanged until
          # backup.py is also updated to emit autonomath-*.db.gz filenames.
          # ListObjectsV2 sorts lexicographically; our timestamp format YYYYMMDD-HHMMSS
          # makes lex order == chronological order, so tail -n +15 gives us everything
          # beyond the 14 most recent to delete.
          KEEP=14
          mapfile -t ALL < <(aws s3api list-objects-v2 \
              --bucket "$R2_BUCKET" \
              --prefix "$PREFIX/jpintel-" \
              --endpoint-url "$R2_ENDPOINT" \
              --query 'Contents[].Key' \
              --output text | tr '\t' '\n' | grep -E '\.db\.gz$' | sort -r || true)

          if [ "${#ALL[@]}" -gt "$KEEP" ]; then
            for key in "${ALL[@]:$KEEP}"; do
              echo "Pruning: $key (+ .sha256 + .manifest.json)"
              aws s3 rm "s3://$R2_BUCKET/$key"               --endpoint-url "$R2_ENDPOINT" || true
              aws s3 rm "s3://$R2_BUCKET/${key}.sha256"       --endpoint-url "$R2_ENDPOINT" || true
              aws s3 rm "s3://$R2_BUCKET/${key}.manifest.json" --endpoint-url "$R2_ENDPOINT" || true
            done
          else
            echo "No rotation needed (${#ALL[@]} <= $KEEP)."
          fi
