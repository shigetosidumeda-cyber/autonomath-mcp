name: CodeQL

on:
  push:
    branches: [main]
  # pull_request trigger removed 2026-05-11: codeql-action/pr-diff-range.yml
  # restrictAlertsTo("undefined", ...) bug causes `codeql resolve
  # extensions-by-pack` exit 2 across Wave 1-4 PRs. push: main + weekly
  # schedule still cover baseline scans; PRs against main no longer gate on
  # CodeQL until the upstream action ships a fix.
  schedule:
    # Every Monday 03:00 UTC (== 12:00 JST). Weekly baseline scan even if no push.
    - cron: '0 3 * * 1'


concurrency:
  # Wave 43 noise reduction (2026-05-12): serialize same-ref runs.
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5
        with:
          languages: ${{ matrix.language }}
          # Wave 20 B3: repo-local config for query-suite +
          # paths-ignore. Flips to `security-and-quality` (≈+30%
          # queries, -20% noise after filtering site/programs /
          # tests / tools/offline).
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

      - name: Sentry alert on CodeQL failure
        if: failure()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          LANGUAGE: ${{ matrix.language }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "::warning::SENTRY_DSN not set; skipping alert hop."
            exit 0
          fi
          PROJECT_ID="$(echo "$SENTRY_DSN" | sed -E 's#.*/([0-9]+)$#\1#')"
          PUBLIC_KEY="$(echo "$SENTRY_DSN" | sed -E 's#https://([^@]+)@.*#\1#')"
          HOST="$(echo "$SENTRY_DSN" | sed -E 's#https://[^@]+@([^/]+)/.*#\1#')"
          curl -fsS -X POST \
            "https://${HOST}/api/${PROJECT_ID}/store/" \
            -H "Content-Type: application/json" \
            -H "X-Sentry-Auth: Sentry sentry_version=7,sentry_key=${PUBLIC_KEY},sentry_client=codeql/1.0" \
            -d "{\"level\":\"error\",\"logger\":\"github.actions.codeql\",\"platform\":\"other\",\"message\":\"CodeQL analysis failed (lang=${LANGUAGE}). Run ${GITHUB_RUN_ID}.\",\"tags\":{\"workflow\":\"codeql\",\"language\":\"${LANGUAGE}\",\"run_id\":\"${GITHUB_RUN_ID}\"}}" \
            || echo "::warning::Sentry alert POST failed; continuing."
