jobs:
  # PERF-8 (2026-05-16): pytest / ruff / mypy / mkdocs split into independent
  # parallel jobs so the longest pole drives wall time (not the serialized
  # mypy+mkdocs tail behind shard 0). All jobs declare fail-fast: false at the
  # matrix level so a green-light shard never gets cancelled by an unrelated
  # failure (surfaces all failures in one run rather than serial-debug).

  # PERF-42 (2026-05-17): emit the pytest python-version matrix from a tiny
  # builder job so PR runs scope the matrix to 3.12 only (active dev version)
  # while push to main + scheduled runs still exercise the 3.11 floor + 3.13
  # ceiling. Shrinks PR matrix from 12 (3 versions × 4 shards) to 4 jobs
  # (3.12 × 4 shards) = ~67% runner-min reduction per PR.
  pytest-matrix:
    name: build pytest python matrix
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      python-versions: ${{ steps.matrix.outputs.python-versions }}
    steps:
      - name: Build python-version matrix
        id: matrix
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'python-versions=["3.12"]' >> "$GITHUB_OUTPUT"
          else
            echo 'python-versions=["3.13","3.12","3.11"]' >> "$GITHUB_OUTPUT"
          fi

  pytest:
    name: pytest (${{ matrix.python-version }} shard ${{ matrix.shard-index }}/${{ matrix.shard-count }})
    needs: pytest-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # PERF-42 (2026-05-17): python-version axis is event-driven via pytest-matrix.
        # PR runs => ["3.12"]; push/main + scheduled => ["3.13","3.12","3.11"].
        python-version: ${{ fromJSON(needs.pytest-matrix.outputs.python-versions) }}
        shard-index: [0, 1, 2, 3]
        shard-count: [4]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          # Cache pip using pyproject.toml as the key so dependency bumps invalidate cleanly.
          cache: pip
          cache-dependency-path: pyproject.toml

      # PERF-8: cache .pytest_cache so collection + last-failed metadata are
      # reused across runs. Key bumps with pyproject.toml + tests/ tree hash so
      # dependency or test-tree changes invalidate cleanly.
      - name: Cache .pytest_cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .pytest_cache
          key: pytest-cache-${{ runner.os }}-py${{ matrix.python-version }}-shard${{ matrix.shard-index }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pytest-cache-${{ runner.os }}-py${{ matrix.python-version }}-shard${{ matrix.shard-index }}-
            pytest-cache-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Build pytest shard
        env:
          PYTEST_SHARD_INDEX: ${{ matrix.shard-index }}
          PYTEST_SHARD_COUNT: ${{ matrix.shard-count }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          targets = os.environ["PYTEST_TARGETS"].split()
          shard_index = int(os.environ["PYTEST_SHARD_INDEX"])
          shard_count = int(os.environ["PYTEST_SHARD_COUNT"])
          shard = [
              target
              for index, target in enumerate(targets)
              if index % shard_count == shard_index
          ]
          Path("pytest-shard-targets.txt").write_text("\n".join(shard) + "\n", encoding="utf-8")
          print(
              f"selected {len(shard)} of {len(targets)} pytest targets "
              f"for shard {shard_index}/{shard_count}"
          )
          PY

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions TypeScript tooling
        run: npm ci --prefix functions

      - name: Pytest with coverage
        # PERF-1 (2026-05-16): outer dimension = 4-way file shard (matrix.shard-index);
        # inner dimension = xdist `-n auto` process-level parallelism inside each
        # shard (GHA ubuntu-latest = 4 vCPU → ~3-4 workers per shard). Combined
        # speedup vs the pre-xdist single-shard single-process baseline is ~10-15x.
        # `--dist loadscope` keeps every test of the same module on one worker
        # so module-level os.environ setup in tests/conftest.py stays coherent.
        run: |
          mapfile -t TARGETS < pytest-shard-targets.txt
          pytest "${TARGETS[@]}" -q -n auto --dist loadscope

      - name: Upload coverage to Codecov
        # Non-blocking: coverage reporting shouldn't gate PRs.
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}-shard${{ matrix.shard-index }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  ruff:
    # PERF-8 split: ruff lint + format check pulled out of pytest shard 0 so
    # the lint surfaces are not blocked behind the slowest pytest shard. With
    # .ruff_cache, a typical lint run lands in <30s on the free runner.
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache .ruff_cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .ruff_cache
          key: ruff-cache-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ruff-cache-${{ runner.os }}-

      - name: Install ruff only (lint job — no full extras needed)
        run: |
          python -m pip install --upgrade pip
          # Pin via pyproject.toml's declared ruff version; pulling `ruff`
          # alone keeps the lint job sub-30s vs. ~3min for `pip install -e .[dev,site]`.
          pip install $(python -c "import tomllib;p=tomllib.load(open('pyproject.toml','rb'));d=[x for x in p['project']['optional-dependencies']['dev'] if x.startswith('ruff')];print(d[0] if d else 'ruff')")

      - name: Ruff lint
        run: ruff check $RUFF_TARGETS

      - name: Ruff format check
        run: ruff format --check $RUFF_TARGETS

  mypy:
    # PERF-8 split: mypy hoisted to its own job and cached via .mypy_cache.
    # First cold run: ~3-4 min. Warm (cache hit): ~30-60s. Removing this from
    # the pytest shard 0 tail eliminates the longest serialized step.
    name: mypy --strict (src/)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true # Best-effort gate per CLAUDE.md (treat new errors as red, but don't fail PR until stabilized).
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache .mypy_cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .mypy_cache
          # Bust on src/ tree hash so incremental cache stays fresh.
          key: mypy-cache-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'src/**/*.py') }}
          restore-keys: |
            mypy-cache-${{ runner.os }}-

      - name: Install package with dev extras
        # PERF-42 (2026-05-17): the secondary `pip install mypy types-requests
        # pydantic pydantic-settings fastapi` line was redundant — every one
        # of those packages is already pinned in pyproject.toml's [dev,site]
        # extras. Removing the redundant invocation saves the second resolver
        # pass (~30-60s warm, ~2min cold) on every CI mypy run.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: mypy type-check
        run: mypy src/

  pip-audit:
    # PERF-8 split: pip-audit (supply chain CVE scan) decoupled from pytest
    # shard 0. ~30-60s on free runner; allowed to fail (continue-on-error).
    name: pip-audit (supply chain)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install pip-audit + project (need lockstep deps for audit)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"
          pip install pip-audit

      - name: pip-audit --strict
        # --strict fails the build on any unfixed CVE. Add `--ignore-vuln GHSA-...`
        # only when a specific advisory has been triaged as not-applicable.
        run: pip-audit --strict

  mkdocs:
    # PERF-8 split: mkdocs --strict build pulled to its own parallel job.
    # ~1-2min standalone vs. ~3-5min serialized behind the slowest pytest shard.
    name: mkdocs build --strict
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs-requirements.txt

      - name: Install docs dependencies (mkdocs only)
        run: |
          python -m pip install --upgrade pip
          pip install -r docs-requirements.txt

      - name: mkdocs build --strict
        run: mkdocs build --strict

  # PERF-42 (2026-05-17): CI runtime budget gate. Runs after every upstream
  # gate has reported (always(): so a regression in any single job still emits
  # the budget verdict). Pulls each job's started_at / completed_at via the GH
  # REST API and fails if the workflow's wall-clock duration exceeds the
  # JPCITE_CI_BUDGET_MINUTES budget (default 15 min).
  #
  # Wall clock = max(completed_at) - min(started_at) across all upstream jobs
  # (this job is excluded so the gate doesn't fight itself). That captures
  # the longest critical path including queue time, which is what an engineer
  # experiences. Per-job durations are also printed for triage.
  ci-budget:
    name: CI runtime budget gate (<= ${{ env.JPCITE_CI_BUDGET_MINUTES }} min)
    needs: [pytest, ruff, mypy, pip-audit, mkdocs]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      JPCITE_CI_BUDGET_MINUTES: "15"
    steps:
      - name: Checkout (for analyzer script)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run CI runtime budget analyzer
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          JPCITE_CI_BUDGET_MINUTES: ${{ env.JPCITE_CI_BUDGET_MINUTES }}
        run: |
          python scripts/ops/ci_budget_check.py
