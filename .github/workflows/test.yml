name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUFF_TARGETS: >-
    scripts/generate_city_pages.py
    scripts/generate_cross_hub_pages.py
    scripts/generate_geo_program_pages.py
    scripts/generate_industry_hub_pages.py
    scripts/generate_industry_program_pages.py
    scripts/generate_prefecture_pages.py
    scripts/generate_program_pages.py
    scripts/ops/pre_deploy_verify.py
    scripts/ops/perf_smoke.py
    scripts/ops/preflight_production_improvement.py
    scripts/ops/production_deploy_go_gate.py
    scripts/ops/repo_dirty_lane_report.py
    scripts/ops/release_readiness.py
    scripts/regen_llms_full.py
    scripts/regen_llms_full_en.py
    scripts/etl/generate_program_rss_feeds.py
  PYTEST_TARGETS: >-
    tests/test_program_rss_feeds.py
    tests/test_static_public_reachability.py
    tests/test_enforcement.py
    tests/test_rate_limit.py
    tests/test_anon_rate_limit.py
    tests/test_rate_limit_tz.py
    tests/test_source_manifest.py
    tests/test_extract_prefecture.py
    tests/test_no_llm_in_production.py
    tests/test_license_gate.py
    tests/test_license_gate_no_bypass.py
    tests/test_disclaimer_envelope.py
    tests/test_hallucination_guard.py
    tests/test_known_gaps.py
    tests/test_response_sanitizer.py
    tests/test_prompt_injection_sanitizer.py
    tests/test_pii_redactor_response.py
    tests/test_security_headers.py
    tests/test_auth_quota.py
    tests/test_appi_turnstile.py
    tests/test_boot_gate.py
    tests/test_entrypoint_vec0_boot_gate.py
    tests/test_fly_health_check.py
    tests/test_schema_guard.py
    tests/test_d2_placeholder_amount_review.py
    tests/test_citation_verifier.py
    tests/test_evidence_packet_citation_status.py
    tests/test_e1_license_review_queue.py
    tests/test_official_license_label_proposals.py
    tests/test_pre_deploy_verify.py
    tests/test_production_improvement_preflight.py
    tests/test_production_deploy_go_gate.py
    tests/test_ci_workflows.py
    tests/test_perf_smoke.py
    tests/test_release_readiness.py
    tests/test_billing.py
    tests/test_billing_webhook_signature.py
    tests/test_programs_batch.py
    tests/test_usage_billing_idempotency.py
    tests/test_self_cap.py
    tests/test_cost_preview.py
    tests/test_trial_signup.py
    tests/test_device_flow.py

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # 3.13 first so it reports earliest; 3.11 is the floor declared in pyproject.toml.
        python-version: ["3.13", "3.12", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          # Cache pip using pyproject.toml as the key so dependency bumps invalidate cleanly.
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Ruff lint
        run: ruff check $RUFF_TARGETS

      - name: Ruff format check
        run: ruff format --check $RUFF_TARGETS

      - name: Pytest with coverage
        run: pytest $PYTEST_TARGETS -q

      - name: pip-audit (supply chain)
        # Added 2026-04-25 per CI security gating audit (a92f5354dc4848432).
        # --strict fails the build on any unfixed CVE. Add `--ignore-vuln GHSA-...`
        # only when a specific advisory has been triaged as not-applicable.
        continue-on-error: true
        run: pip install pip-audit && pip-audit --strict

      - name: mypy type-check
        # Best-effort: treat new errors as red (CLAUDE.md quality gate).
        # Run only on Python 3.12 to keep matrix runtime down; mypy output
        # is Python-version-independent for this codebase.
        if: matrix.python-version == '3.12'
        continue-on-error: true
        run: |
          pip install mypy types-requests pydantic>=2.9 pydantic-settings>=2.6 fastapi>=0.115
          mypy src/

      - name: Install docs dependencies
        if: matrix.python-version == '3.12'
        run: pip install -r docs-requirements.txt

      - name: mkdocs build --strict
        if: matrix.python-version == '3.12'
        run: mkdocs build --strict

      - name: Upload coverage to Codecov
        # Non-blocking: coverage reporting shouldn't gate PRs.
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
