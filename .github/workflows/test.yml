jobs:
  pytest:
    name: pytest (${{ matrix.python-version }} shard ${{ matrix.shard-index }}/${{ matrix.shard-count }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # 3.13 first so it reports earliest; 3.11 is the floor declared in pyproject.toml.
        python-version: ["3.13", "3.12", "3.11"]
        shard-index: [0, 1, 2, 3]
        shard-count: [4]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          # Cache pip using pyproject.toml as the key so dependency bumps invalidate cleanly.
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Ruff lint
        if: matrix.python-version == '3.12' && matrix.shard-index == 0
        run: ruff check $RUFF_TARGETS

      - name: Ruff format check
        if: matrix.python-version == '3.12' && matrix.shard-index == 0
        run: ruff format --check $RUFF_TARGETS

      - name: Build pytest shard
        env:
          PYTEST_SHARD_INDEX: ${{ matrix.shard-index }}
          PYTEST_SHARD_COUNT: ${{ matrix.shard-count }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          targets = os.environ["PYTEST_TARGETS"].split()
          shard_index = int(os.environ["PYTEST_SHARD_INDEX"])
          shard_count = int(os.environ["PYTEST_SHARD_COUNT"])
          shard = [
              target
              for index, target in enumerate(targets)
              if index % shard_count == shard_index
          ]
          Path("pytest-shard-targets.txt").write_text("\n".join(shard) + "\n", encoding="utf-8")
          print(
              f"selected {len(shard)} of {len(targets)} pytest targets "
              f"for shard {shard_index}/{shard_count}"
          )
          PY

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions TypeScript tooling
        run: npm ci --prefix functions

      - name: Pytest with coverage
        run: |
          mapfile -t TARGETS < pytest-shard-targets.txt
          pytest "${TARGETS[@]}" -q

      - name: pip-audit (supply chain)
        # Added 2026-04-25 per CI security gating audit (a92f5354dc4848432).
        # --strict fails the build on any unfixed CVE. Add `--ignore-vuln GHSA-...`
        # only when a specific advisory has been triaged as not-applicable.
        if: matrix.python-version == '3.12' && matrix.shard-index == 0
        continue-on-error: true
        run: pip install pip-audit && pip-audit --strict

      - name: mypy type-check
        # Best-effort: treat new errors as red (CLAUDE.md quality gate).
        # Run only on Python 3.12 to keep matrix runtime down; mypy output
        # is Python-version-independent for this codebase.
        if: matrix.python-version == '3.12' && matrix.shard-index == 0
        continue-on-error: true
        run: |
          pip install mypy types-requests pydantic>=2.9 pydantic-settings>=2.6 fastapi>=0.115
          mypy src/

      - name: Install docs dependencies
        if: matrix.python-version == '3.12' && matrix.shard-index == 0
        run: pip install -r docs-requirements.txt

      - name: mkdocs build --strict
        if: matrix.python-version == '3.12' && matrix.shard-index == 0
        run: mkdocs build --strict

      - name: Upload coverage to Codecov
        # Non-blocking: coverage reporting shouldn't gate PRs.
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}-shard${{ matrix.shard-index }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
