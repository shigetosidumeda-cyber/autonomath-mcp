name: jpcite-nightly-backup (alias of nightly-backup)

# Wave 46 tick7#7 (2026-05-12) — jpcite-brand alias of `nightly-backup.yml`.
# Per `project_jpcite_internal_autonomath_rename` +
# `feedback_destruction_free_organization`: dispatch-only trampoline, no
# cron (parent retains SOT), no logic duplication.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run the parent workflow on (default: main)."
        required: false
        default: "main"

concurrency:
  group: jpcite-nightly-backup
  cancel-in-progress: false

jobs:
  trampoline:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Re-invoke parent (nightly-backup)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REF="${{ inputs.ref || 'main' }}"
          echo "alias=jpcite-nightly-backup parent=nightly-backup ref=$REF"
          gh workflow run nightly-backup.yml --ref "$REF" \
            -R "${GITHUB_REPOSITORY}"
