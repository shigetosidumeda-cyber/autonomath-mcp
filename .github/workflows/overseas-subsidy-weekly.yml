name: overseas-subsidy-weekly

# Wave 43.1.2 — Foreign FDI cohort weekly ETL (JETRO / METI / JBIC / NEXI).
# NO LLM API call (memory: feedback_no_operator_llm_api).
# Aggregator URLs refused inside fill script (memory: feedback_no_fake_data).
# Schedule: 05:00 UTC every Sunday (= 14:00 JST Sunday). One hour after the
# multilingual-weekly cron so GHA queue concurrency is naturally staggered.

on:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:
    inputs:
      max_rows:
        description: "Row cap per run (default 1100)"
        required: false
        default: "1100"
      dry_run:
        description: "If true, run --dry-run --no-network"
        required: false
        default: "false"

concurrency:
  group: overseas-subsidy-weekly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  fill_overseas:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run fill_programs_jetro_overseas_2x
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_MAX_ROWS: ${{ github.event.inputs.max_rows }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          set -euo pipefail
          MAX="${INPUT_MAX_ROWS:-1100}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then DRY_FLAG="--dry-run --no-network"; fi
          if [ ! -f "${AUTONOMATH_DB_PATH}" ]; then DRY_FLAG="--dry-run --no-network"; fi
          python scripts/etl/fill_programs_jetro_overseas_2x.py --max-rows "${MAX}" ${DRY_FLAG}

  failure_alert:
    needs: [fill_overseas]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `overseas-subsidy-weekly failed ${new Date().toISOString()}`,
              body: `Run: ${runUrl}\n\nLikely causes: JETRO/METI/JBIC/NEXI page schema drift, DNS outage, autonomath.db volume not mounted on CI. See scripts/etl/fill_programs_jetro_overseas_2x.py docstring. NEVER add an LLM fallback — Wave 43.1.2 is offline-template only.`,
              labels: ["ingest-failure", "automation", "overseas", "fdi"],
            });
