# Generates public program/prefecture/llms/sitemap artifacts from the production
# SQLite registry, then deploys the prepared static artifact directly to
# Cloudflare Pages. Generated pages stay gitignored to avoid committing hundreds
# of megabytes of static HTML back to the repo.
#
# Why we generate static HTML instead of generating at request time:
#   - jpcite.com is a static site on Cloudflare Pages; no server runtime.
#   - Per-program pages are the SEO/GEO surface area (≈10k rows). Crawlers
#     need addressable URLs with prerendered JSON-LD, not SPA placeholders.
#   - Idempotent generator (`_write_if_changed`) keeps deploy diffs stable.
#
# Required GitHub repository secrets:
#   FLY_API_TOKEN  Fly.io deploy token with ssh+sftp on app `autonomath-api`.
#                  Already used by nightly-backup / data-integrity workflows.
#                  Used here to pull the live `data/jpintel.db` from the Fly
#                  volume (it is gitignored, so CI cannot read it from the
#                  checkout).
#
# Optional:
#   CF_API_TOKEN          Cloudflare API token with Pages edit scope.
#   CF_ACCOUNT_ID         Cloudflare account ID.
#
# Runtime budget: ≈10k rows × ~50ms render + sitemap ≈ 8-12 minutes wall.
# `timeout-minutes: 30` leaves slack for sftp + direct Pages deploy.

name: pages-regenerate

on:
  schedule:
    # 19:17 UTC == 04:17 JST. Runs *after* nightly-backup (18:17 UTC) and
    # ingest-daily (19:00 UTC) so the DB we pull already reflects the night's
    # ingest + URL refresh activity.
    - cron: "17 19 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "site/_templates/**"
      - "scripts/generate_program_pages.py"
      - "scripts/generate_prefecture_pages.py"
      - "scripts/generate_cross_hub_pages.py"
      - "scripts/generate_geo_program_pages.py"
      - "scripts/generate_industry_hub_pages.py"
      - "scripts/generate_industry_program_pages.py"
      - "scripts/generate_compare_pages.py"
      - "scripts/generate_og_images.py"
      - "scripts/regen_llms_full.py"
      - "scripts/regen_llms_full_en.py"
      - "scripts/sitemap_gen.py"
      - ".github/workflows/pages-regenerate.yml"

concurrency:
  group: pages-regenerate
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Check Fly token
        id: fly-token
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::notice::FLY_API_TOKEN is not configured; skipping GitHub-hosted page regeneration."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.fly-token.outputs.available == 'true'
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install docs and site dependencies
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r docs-requirements.txt
          pip install -e ".[site]"

      - name: Install flyctl
        if: steps.fly-token.outputs.available == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Pull latest jpintel.db off Fly volume
        if: steps.fly-token.outputs.available == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          # Online SQLite backup → /data/jpintel.live.db on the machine, then
          # sftp it down. We avoid copying the live WAL'd file directly.
          flyctl ssh console -a autonomath-api -C \
            "sqlite3 /data/jpintel.db \".backup /data/jpintel.live.db\""
          flyctl ssh sftp get /data/jpintel.live.db -a autonomath-api
          mv jpintel.live.db data/jpintel.db
          ls -la data/jpintel.db

      - name: Regenerate generated public artifacts
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          python scripts/generate_program_pages.py \
            --db data/jpintel.db \
            --out site/programs \
            --domain jpcite.com \
            --sitemap site/sitemap-programs.xml \
            --tiers S,A,B,C \
            --verbose
          python scripts/generate_prefecture_pages.py \
            --db data/jpintel.db \
            --out site/prefectures \
            --domain jpcite.com \
            --sitemap site/sitemap-prefectures.xml
          # Hub generators MUST run before detail generators that share a
          # sitemap namespace. cross_hub owns sitemap-cross.xml (47 URLs);
          # geo_program writes the disjoint sitemap-cross-detail.xml.
          # Same pattern for industries (sitemap-industries.xml hubs vs.
          # sitemap-industries-detail.xml details). See
          # analysis_wave18/research_W2_1_generator_audit_2026-05-04.md §4.
          python scripts/generate_cross_hub_pages.py \
            --db data/jpintel.db \
            --out site/cross \
            --domain jpcite.com \
            --sitemap site/sitemap-cross.xml
          python scripts/generate_geo_program_pages.py \
            --db data/jpintel.db \
            --out site/cross \
            --domain jpcite.com \
            --top 50 \
            --sitemap site/sitemap-cross-detail.xml
          python scripts/generate_industry_hub_pages.py \
            --db data/jpintel.db \
            --out site/industries \
            --domain jpcite.com \
            --sitemap site/sitemap-industries.xml
          python scripts/generate_industry_program_pages.py \
            --db data/jpintel.db \
            --out site/industries \
            --domain jpcite.com \
            --sitemap site/sitemap-industries-detail.xml \
            --sitemap-index site/sitemap-index.xml
          python scripts/generate_compare_pages.py
          python scripts/generate_og_images.py --out-dir site/assets
          python scripts/regen_llms_full.py --db data/jpintel.db --out site/llms-full.txt
          python scripts/regen_llms_full_en.py --db data/jpintel.db --out site/llms-full.en.txt

      - name: Build docs and sitemap
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          mkdocs build --strict
          python scripts/sitemap_gen.py --site-dir site --domain jpcite.com

      - name: Prepare public artifact
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          rm -rf dist/site
          mkdir -p dist
          rsync -a --delete \
            --exclude '_templates/' \
            --exclude '_data/' \
            --exclude 'structured/' \
            --exclude 'sitemap-structured.xml' \
            --exclude '*.src.js' \
            --exclude '*.src.css' \
            --exclude '*.map' \
            --include 'press/*.md' \
            --include 'security/policy.md' \
            --exclude '*.md' \
            site/ dist/site/
          cat > dist/site/sitemap-structured.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"/>
          XML

      - name: Check Cloudflare Pages secrets
        id: cf-secrets
        if: steps.fly-token.outputs.available == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ACCOUNT_ID:-}" ]; then
            echo "::notice::Cloudflare Pages secrets are not configured; skipping scheduled Pages publish."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish regenerated artifact to Cloudflare Pages
        if: steps.cf-secrets.outputs.available == 'true'
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: autonomath
          directory: dist/site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
