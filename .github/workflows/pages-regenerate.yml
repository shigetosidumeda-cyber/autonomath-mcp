# Generates site/programs/{slug}.html (one per indexable row) and
# site/sitemap-programs.xml from the production SQLite registry, then commits
# the regenerated artefacts back to main so Cloudflare Pages picks them up
# on its next deploy.
#
# Why we commit static HTML instead of generating at request time:
#   - jpcite.com is a static site on Cloudflare Pages; no server runtime.
#   - Per-program pages are the SEO/GEO surface area (≈10k rows). Crawlers
#     need addressable URLs with prerendered JSON-LD, not SPA placeholders.
#   - Idempotent generator (`_write_if_changed`) keeps the diff minimal.
#
# Required GitHub repository secrets:
#   FLY_API_TOKEN  Fly.io deploy token with ssh+sftp on app `autonomath-api`.
#                  Already used by nightly-backup / data-integrity workflows.
#                  Used here to pull the live `data/jpintel.db` from the Fly
#                  volume (it is gitignored, so CI cannot read it from the
#                  checkout).
#
# Optional:
#   CF_PAGES_DEPLOY_HOOK  Cloudflare Pages "Deploy hook" URL. If set, we POST
#                         to it after pushing so Pages rebuilds immediately
#                         instead of waiting for its commit-trigger latency.
#                         Configure under Pages project → Settings → Builds &
#                         deployments → Deploy hooks (autonomath-fallback).
#
# Runtime budget: ≈10k rows × ~50ms render + sitemap ≈ 8-12 minutes wall.
# `timeout-minutes: 30` leaves slack for sftp + git push.

name: pages-regenerate

on:
  schedule:
    # 19:17 UTC == 04:17 JST. Runs *after* nightly-backup (18:17 UTC) and
    # ingest-daily (19:00 UTC) so the DB we pull already reflects the night's
    # ingest + URL refresh activity.
    - cron: "17 19 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "site/_templates/**"
      - "scripts/generate_program_pages.py"
      - ".github/workflows/pages-regenerate.yml"

concurrency:
  group: pages-regenerate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Need full history so the commit-back step has a sane HEAD to push.
          fetch-depth: 1
          # Use the default GITHUB_TOKEN to allow `git push` back to main.
          # This token is auto-scoped to the repo and respects branch
          # protection — direct push to main only works because we run
          # from main and the [skip ci] suffix prevents recursive triggers.
          persist-credentials: true

      - name: Check Fly token
        id: fly-token
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::notice::FLY_API_TOKEN is not configured; skipping GitHub-hosted page regeneration."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.fly-token.outputs.available == 'true'
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with site extras
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[site]"

      - name: Install flyctl
        if: steps.fly-token.outputs.available == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Pull latest jpintel.db off Fly volume
        if: steps.fly-token.outputs.available == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          # Online SQLite backup → /data/jpintel.live.db on the machine, then
          # sftp it down. We avoid copying the live WAL'd file directly.
          flyctl ssh console -a autonomath-api -C \
            "sqlite3 /data/jpintel.db \".backup /data/jpintel.live.db\""
          flyctl ssh sftp get /data/jpintel.live.db -a autonomath-api
          mv jpintel.live.db data/jpintel.db
          ls -la data/jpintel.db

      - name: Regenerate program pages and sitemap
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          python scripts/generate_program_pages.py \
            --db data/jpintel.db \
            --out site/programs \
            --domain jpcite.com \
            --sitemap site/sitemap-programs.xml \
            --verbose

      - name: Commit regenerated pages back to main
        if: steps.fly-token.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only stage the regenerated artefacts; never commit the pulled DB.
          git add site/programs/ site/structured/ site/sitemap-programs.xml site/sitemap-programs-*.xml site/sitemap-structured.xml 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit (regeneration was idempotent)."
            exit 0
          fi
          # `[skip ci]` short-circuits the push trigger above so we don't
          # ping-pong workflow runs. Schedule + workflow_dispatch keep flowing.
          git commit -m "Regenerate program pages [skip ci]"
          git push origin HEAD:main

      - name: Trigger Cloudflare Pages deploy hook (optional)
        if: steps.fly-token.outputs.available == 'true'
        env:
          CF_PAGES_DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${CF_PAGES_DEPLOY_HOOK:-}" ]; then
            echo "::notice::CF_PAGES_DEPLOY_HOOK not set; skipping (Pages will pick up the push on its own cadence)."
            exit 0
          fi
          curl -fsSL -X POST "$CF_PAGES_DEPLOY_HOOK" -o /dev/null
          echo "Cloudflare Pages deploy triggered."
