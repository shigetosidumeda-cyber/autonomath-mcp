name: municipality-subsidy-weekly

# DEEP-44: 自治体 1,741 補助金 page weekly diff cron.
#
# Schedule: 18:00 UTC Sunday == 03:00 JST Monday.
# Window choice: 自治体 サーバ は週末未明 idle、 月曜朝 JST に新しい diff
# が landing する形。
#
# 1st pass scope: 47 都道府県 + 20 政令市 = 67 自治体
# (data/municipality_seed_urls.json). 中核市 60 / 特別区 23 / 一般市町村
# 1,591 は subsequent waves で operator manual seed expansion 後に追加。
#
# Constraints
# -----------
#   * LLM call count: 0. Pure regex + httpx + bs4 + pdfplumber + sqlite3.
#   * Aggregator banlist enforced inside the cron script (CLAUDE.md
#     データ衛生規約 — 1次資料 only).
#   * 自治体 = 政府著作物 §13 著作権法 (再配信 OK).
#
# Required secrets:
#   GITHUB_TOKEN  (auto, for issue creation on failure)

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, fetch+parse only, no DB writes"
        required: false
        default: "false"
      seed:
        description: "Seed JSON path override (default: data/municipality_seed_urls.json)"
        required: false
        default: "data/municipality_seed_urls.json"

concurrency:
  group: municipality-subsidy-weekly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 600  # 1st pass 67 seed は ~10 min、 1,741 拡張時は 6-8h
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pdfplumber beautifulsoup4 lxml httpx

      - name: Install Playwright chromium (Wave 36 fallback)
        run: |
          # Wave 36: ETL fetch_with_fallback uses Playwright on 4xx/5xx/timeout
          # against authoritative .lg.jp municipal sites (JS-rendered detail pages).
          python -m playwright install --with-deps chromium

      - name: Run DEEP-44 municipality subsidy weekly ingest
        env:
          JPINTEL_DB_PATH: ${{ github.workspace }}/data/jpintel.db
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_SEED: ${{ github.event.inputs.seed }}
        run: |
          set -euo pipefail
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          SEED_PATH="${INPUT_SEED:-data/municipality_seed_urls.json}"
          python scripts/cron/ingest_municipality_subsidy_weekly.py \
            --seed "${SEED_PATH}" \
            ${DRY_FLAG}

      - name: Open issue on driver failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `municipality-subsidy-weekly failed ${new Date().toISOString()}`,
              body: `Run: ${runUrl}\n\nLikely causes: 自治体 サーバ 5xx, robots.txt rate-limit, pdfplumber install failure, or jpintel.db lock contention. See scripts/cron/ingest_municipality_subsidy_weekly.py docstring + DEEP_44_municipality_subsidy_weekly_diff.md spec.`,
              labels: ["ingest-failure", "automation"],
            });
