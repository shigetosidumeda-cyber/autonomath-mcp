name: egov-pubcomment-daily

# DEEP-45: e-Gov パブコメ 公示 daily ingest cron.
#
# Schedule: 00:00 UTC Mon-Fri == 09:00 JST 営業日.
# Window choice: e-Gov 公示は基本平日朝に出る. 09:00 JST landing means the
# regulatory signal layer is fresh by the start of business in Japan, with
# rolling 7 day catch-up window absorbing weekend gaps.
#
# LLM call count: 0. Pure regex + httpx + sqlite3.
#
# Required secrets:
#   GITHUB_TOKEN          (auto, for issue creation on failure)
#   OPERATOR_EMAIL_TO     (optional, for §6 alert mechanism)
#   POSTMARK_TOKEN        (optional, for §6 alert mechanism)

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      days:
        description: "Days back from MAX(announcement_date) for delta (default: 7)"
        required: false
        default: "7"
      dry_run:
        description: "If true, fetch+parse only, no DB writes"
        required: false
        default: "false"

concurrency:
  group: egov-pubcomment-daily
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run e-Gov pubcomment daily ingest
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          OPERATOR_EMAIL_TO: ${{ secrets.OPERATOR_EMAIL_TO }}
          POSTMARK_TOKEN: ${{ secrets.POSTMARK_TOKEN }}
          INPUT_DAYS: ${{ github.event.inputs.days }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          DAYS="${INPUT_DAYS:-7}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          if [ ! -s "${AUTONOMATH_DB_PATH}" ]; then
            echo "[egov-pubcomment-daily] autonomath.db missing; running parser dry-run against a temporary sqlite shell."
            python - <<'PY'
          import pathlib
          import sqlite3

          db = pathlib.Path("autonomath.db")
          sqlite3.connect(str(db)).close()
          sql = pathlib.Path("scripts/migrations/wave24_192_pubcomment_announcement.sql").read_text(encoding="utf-8")
          with sqlite3.connect(str(db)) as conn:
              conn.executescript(sql)
              conn.commit()
          PY
            DRY_FLAG="--dry-run"
          fi
          python scripts/cron/ingest_egov_pubcomment_daily.py \
            --days "${DAYS}" \
            ${DRY_FLAG}

      - name: Open issue on driver failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `egov-pubcomment-daily failed ${new Date().toISOString()}`,
              body: `Run: ${runUrl}\n\nLikely causes: search.e-gov.go.jp 5xx, DOM/JSON schema change, autonomath.db lock contention. See scripts/cron/ingest_egov_pubcomment_daily.py docstring.`,
              labels: ["ingest-failure", "automation"],
            });
