name: multilingual-weekly

# Wave 35 Axis 5 — weekly multilingual gap-fill ETL.
# 4 fill scripts run in parallel; no LLM API calls (memory:
# feedback_no_operator_llm_api). Aggregator URLs refused inside each
# fill script (memory: feedback_no_fake_data).
# Schedule: 04:00 UTC every Sunday (= 13:00 JST Sunday).

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      max_laws:
        description: "Per-script law cap (default 200)"
        required: false
        default: "200"
      max_programs:
        description: "fill_programs_en cap (default 200)"
        required: false
        default: "200"
      dry_run:
        description: "If true, run --dry-run --no-network everywhere"
        required: false
        default: "false"
      langs:
        description: "Comma-separated subset: en,zh,ko (default all)"
        required: false
        default: "en,zh,ko"

concurrency:
  group: multilingual-weekly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  fill_laws_en:
    if: ${{ contains(github.event.inputs.langs || 'en,zh,ko', 'en') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run fill_laws_en_full
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_MAX_LAWS: ${{ github.event.inputs.max_laws }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          set -euo pipefail
          MAX="${INPUT_MAX_LAWS:-200}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then DRY_FLAG="--dry-run --no-network"; fi
          if [ ! -f "${AUTONOMATH_DB_PATH}" ]; then DRY_FLAG="--dry-run --no-network"; fi
          python scripts/cron/fill_laws_en_full.py --max-laws "${MAX}" --resume ${DRY_FLAG}

  fill_programs_en:
    if: ${{ contains(github.event.inputs.langs || 'en,zh,ko', 'en') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run fill_programs_en
        env:
          JPINTEL_DB_PATH: ${{ github.workspace }}/data/jpintel.db
          INPUT_MAX_PROGRAMS: ${{ github.event.inputs.max_programs }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          set -euo pipefail
          MAX="${INPUT_MAX_PROGRAMS:-200}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then DRY_FLAG="--dry-run --no-network"; fi
          if [ ! -f "${JPINTEL_DB_PATH}" ]; then DRY_FLAG="--dry-run --no-network"; fi
          python scripts/cron/fill_programs_en.py --max-programs "${MAX}" ${DRY_FLAG}

  fill_laws_zh:
    if: ${{ contains(github.event.inputs.langs || 'en,zh,ko', 'zh') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run fill_laws_zh
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_MAX_LAWS: ${{ github.event.inputs.max_laws }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          set -euo pipefail
          MAX="${INPUT_MAX_LAWS:-200}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then DRY_FLAG="--dry-run --no-network"; fi
          if [ ! -f "${AUTONOMATH_DB_PATH}" ]; then DRY_FLAG="--dry-run --no-network"; fi
          python scripts/cron/fill_laws_zh.py --max-laws "${MAX}" ${DRY_FLAG}

  fill_laws_ko:
    if: ${{ contains(github.event.inputs.langs || 'en,zh,ko', 'ko') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run fill_laws_ko
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_MAX_LAWS: ${{ github.event.inputs.max_laws }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          set -euo pipefail
          MAX="${INPUT_MAX_LAWS:-200}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then DRY_FLAG="--dry-run --no-network"; fi
          if [ ! -f "${AUTONOMATH_DB_PATH}" ]; then DRY_FLAG="--dry-run --no-network"; fi
          python scripts/cron/fill_laws_ko.py --max-laws "${MAX}" ${DRY_FLAG}

  failure_alert:
    needs: [fill_laws_en, fill_programs_en, fill_laws_zh, fill_laws_ko]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `multilingual-weekly failed ${new Date().toISOString()}`,
              body: `Run: ${runUrl}\n\nLikely causes: ministry English page schema drift, JLT outage, DB volume not mounted on CI. See scripts/cron/fill_laws_*.py + fill_programs_en.py docstrings. NEVER add LLM API as fallback — Wave 35 Axis 5 is local-inference only.`,
              labels: ["ingest-failure", "automation", "axis5", "multilingual"],
            });
