# Direct Cloudflare Pages production deploy via GitHub Actions Linux runner.
#
# Why this workflow exists (2026-05-07):
#   Local `npx wrangler pages deploy site/` from macOS stalled 4 retries in
#   a row — the >100MB artifact upload hit Cloudflare Pages API rate-limit
#   on retry/resume, leaving the wrangler process hung. GHA Linux runners
#   have stable network paths and CF API rate-limit windows reset between
#   runs, so we move the production push to CI to keep launch unblocked.
#
# Differences vs. existing pages workflows:
#   - `pages-preview.yml` is the PR-preview / push-trigger flow that also
#     pulls Fly data and rebuilds generated artifacts. Heavy.
#   - `pages-regenerate.yml` regenerates per-program / per-prefecture
#     pages from the live SQLite (≈8-12 min wall) on a nightly cron.
#   - This file (`pages-deploy-main.yml`) is the push-to-main production
#     publish path. It still hydrates Fly data before rsync because robots.txt
#     advertises generated sitemap shards; deploying without regenerated pages
#     would create public 404s.
#
# Required GitHub repository secrets (canonical names match the existing
# pages-preview.yml / pages-regenerate.yml convention — DO NOT introduce
# new `CLOUDFLARE_*` aliases, that would fragment secret management):
#   CF_API_TOKEN   Cloudflare API token, scope:
#                    Account → Cloudflare Pages → Edit
#                  Create at https://dash.cloudflare.com/profile/api-tokens
#   CF_ACCOUNT_ID  Cloudflare account ID (right sidebar of any CF dashboard).
#   FLY_API_TOKEN  Fly.io deploy token used to hydrate generated static pages.
#
# Project name: autonomath (CF Pages dashboard project, verified 2026-05-01).
#   Canonical domain: jpcite.com.
#   Redirect-source domains: www.jpcite.com, zeimu-kaikei.ai,
#                            www.zeimu-kaikei.ai.
#   Pages may list redirect-source hosts as custom domains, but Cloudflare
#   Redirect Rules must 301 them to apex before duplicate HTML is served.
#
# Usage:
#   - Push to main → auto-deploy the regenerated Pages artifact.
#   - Manual: gh workflow run pages-deploy-main.yml.
#
# Constraint per CLAUDE.md: never push with --no-verify; pre-commit hooks
# must pass before this file is committed.

name: pages-deploy-main

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "functions/**"
      - "functions/package*.json"
      - "functions/tsconfig.json"
      - "docs/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "docs-requirements.txt"
      - "mcp-server*.json"
      - "server.json"
      - "scripts/check_mcp_drift.py"
      - "scripts/check_openapi_drift.py"
      - "scripts/export_agent_openapi.py"
      - "scripts/export_openapi.py"
      - "scripts/generate_program_pages.py"
      - "scripts/generate_prefecture_pages.py"
      - "scripts/generate_geo_industry_pages.py"
      - "scripts/generate_cross_hub_pages.py"
      - "scripts/generate_geo_program_pages.py"
      - "scripts/generate_industry_hub_pages.py"
      - "scripts/generate_industry_program_pages.py"
      - "scripts/generate_compare_pages.py"
      - "scripts/generate_public_counts.py"
      - "scripts/generate_og_images.py"
      - "scripts/regen_llms_full.py"
      - "scripts/regen_llms_full_en.py"
      - "scripts/regen_structured_sitemap_and_llms_meta.py"
      - "scripts/sitemap_gen.py"
      - ".github/workflows/pages-deploy-main.yml"
  workflow_dispatch: {}

concurrency:
  group: cf-pages-autonomath-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy regenerated site/ to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Check Cloudflare Pages secrets
        id: cf-secrets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ACCOUNT_ID:-}" ]; then
            echo "::error::CF_API_TOKEN and CF_ACCOUNT_ID are required for Cloudflare Pages production deploy."
            exit 1
          fi
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::error::FLY_API_TOKEN is required so generated sitemap targets are present in the Pages artifact."
            exit 1
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Install flyctl
        if: steps.cf-secrets.outputs.available == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Pull latest jpintel.db for generated public artifacts
        if: steps.cf-secrets.outputs.available == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          remote_db="/data/jpintel.pages.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}.db"
          local_db="$(basename "$remote_db")"
          cleanup_remote_db() {
            flyctl ssh console -a autonomath-api -C "rm -f ${remote_db}" || true
          }
          trap cleanup_remote_db EXIT
          for attempt in 1 2 3 4 5; do
            echo "::group::Fly jpintel.db backup attempt ${attempt}/5"
            rm -f "$local_db" data/jpintel.db
            if flyctl ssh console -a autonomath-api -C \
                "bash -lc 'set -euo pipefail; rm -f ${remote_db}; sqlite3 -cmd \".timeout 300000\" /data/jpintel.db \".backup ${remote_db}\"; sqlite3 ${remote_db} \"PRAGMA quick_check; SELECT COUNT(*) FROM programs;\"'" \
              && flyctl ssh sftp get "$remote_db" -a autonomath-api ; then
              mv "$local_db" data/jpintel.db
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Unable to snapshot /data/jpintel.db after 5 attempts."
              exit 1
            fi
            sleep_seconds=$((attempt * 30))
            echo "::warning::jpintel.db snapshot attempt ${attempt} failed; retrying in ${sleep_seconds}s."
            sleep "$sleep_seconds"
          done

      - name: Build docs (MkDocs Material → site/docs/)
        if: steps.cf-secrets.outputs.available == 'true'
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r docs-requirements.txt
          python3 -m pip install -e ".[site]"
          # Wave 24: non-strict on prod deploy. recipes/*/index.md cross-links
          # use bare-dir form (../r20-continue-cline/) which mkdocs flags as
          # warnings in --strict but resolves at runtime via index.html. CI
          # pages-preview.yml + test.yml keep --strict as the gate; prod
          # deploy must NOT block on 99 link warnings while Wave 23 surface
          # (10,164 HTML+MD) is propagating. Lift warnings back to strict in
          # a follow-up by appending /index.md (or absolute URLs) to the 30
          # recipes/rXX-*/index.md cross-references.
          python3 -m mkdocs build

      - name: Regenerate generated public artifacts
        if: steps.cf-secrets.outputs.available == 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_program_pages.py \
            --db data/jpintel.db \
            --out site/programs \
            --domain jpcite.com \
            --sitemap site/sitemap-programs.xml \
            --tiers S,A,B,C \
            --verbose
          python3 scripts/generate_prefecture_pages.py \
            --db data/jpintel.db \
            --out site/prefectures \
            --domain jpcite.com \
            --sitemap site/sitemap-prefectures.xml
          python3 scripts/generate_geo_industry_pages.py \
            --db data/jpintel.db \
            --out site/audiences \
            --domain jpcite.com \
            --sitemap site/sitemap-audiences.xml
          python3 scripts/generate_cross_hub_pages.py \
            --db data/jpintel.db \
            --out site/cross \
            --domain jpcite.com \
            --sitemap site/sitemap-cross.xml
          python3 scripts/generate_geo_program_pages.py \
            --db data/jpintel.db \
            --out site/cross \
            --domain jpcite.com \
            --top 50 \
            --sitemap site/sitemap-cross-detail.xml
          python3 scripts/generate_industry_hub_pages.py \
            --db data/jpintel.db \
            --out site/industries \
            --domain jpcite.com \
            --sitemap site/sitemap-industries.xml
          python3 scripts/generate_industry_program_pages.py \
            --db data/jpintel.db \
            --out site/industries \
            --domain jpcite.com \
            --sitemap site/sitemap-industries-detail.xml \
            --sitemap-index site/sitemap-index.xml
          python3 scripts/generate_compare_pages.py
          python3 scripts/generate_og_images.py --out-dir site/assets
          python3 scripts/generate_public_counts.py
          python3 scripts/regen_llms_full.py --db data/jpintel.db --out site/llms-full.txt
          python3 scripts/regen_llms_full_en.py --db data/jpintel.db --out site/llms-full.en.txt
          python3 scripts/regen_structured_sitemap_and_llms_meta.py
          python3 scripts/sitemap_gen.py --site-dir site --domain jpcite.com

      - name: Run deploy drift gates
        if: steps.cf-secrets.outputs.available == 'true'
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          AUTONOMATH_EXPERIMENTAL_API_ENABLED: "0"
        run: |
          set -euo pipefail
          python3 scripts/check_openapi_drift.py
          python3 scripts/check_mcp_drift.py

      - name: Build static artifact (rsync site/ → dist/site/)
        if: steps.cf-secrets.outputs.available == 'true'
        run: |
          set -euo pipefail
          rm -rf dist/site
          mkdir -p dist
          # Mirror the rsync filter from pages-preview.yml so the deployed
          # surface stays byte-identical to the operator workflow documented
          # in HANDOFF_2026_05_07_FRONTEND_DEPLOY_STOP.md.
          rsync -a --delete \
            --exclude '_templates/' \
            --exclude '*.src.js' \
            --exclude '*.src.css' \
            --exclude '*.map' \
            --include 'press/*.md' \
            --include 'security/policy.md' \
            --include 'tools/' \
            --include 'tools/*.md' \
            --include 'laws/index.html' \
            --include 'cases/index.html' \
            --include 'enforcement/index.html' \
            --exclude 'laws/*.html' \
            --exclude 'cases/*.html' \
            --exclude 'enforcement/*.html' \
            --exclude '*.md' \
            site/ dist/site/
          # 2026-05-14 Wave 51: detail laws/cases/enforcement HTML plus
          # companion Markdown are intentionally NOT bundled here, but ARE
          # served end-to-end. programs/*.html stays in the static artifact
          # because it is generated in CI and not present in GitHub raw; the
          # artifact still stays below the Cloudflare Pages 20,000-file limit
          # (verified via wrangler error, run 2026-05-14). Wave 45/51 wires
          # `functions/[[path]].ts` (catch-all Pages Function) which
          # intercepts every source-backed GET that ASSETS returns 404 for,
          # fetches the file from raw.githubusercontent.com (the source
          # IS in the git repo under site/), and caches it at the
          # CF edge for 24h. Net behaviour:
          #   - Pages deploy stays under the 20k file budget.
          #   - All companion `.md` and canonical `/laws/<slug>` URLs return
          #     200 with edge cache.
          #   - Zero dependency on api.jpcite.com (Wave 44 Fly outage).
          # See functions/[[path]].ts header for the full ADR (3
          # strategies evaluated: direct upload / partial trim / Function
          # proxy — Function adopted).
          echo "artifact size:"
          du -sh dist/site
          echo "file count:"
          file_count="$(find dist/site -type f | wc -l | tr -d ' ')"
          echo "$file_count"
          if [ "$file_count" -gt 19000 ]; then
            echo "::error::Cloudflare Pages artifact has ${file_count} files; limit is 20,000."
            exit 1
          fi

      - name: Validate critical JSON manifests
        if: steps.cf-secrets.outputs.available == 'true'
        run: |
          set -euo pipefail
          # The four public JSON surfaces that downstream consumers (MCP
          # registries, OpenAPI clients, agent runtimes) hit on every deploy.
          # If any is malformed the deploy must abort — past incident:
          # invalid server.json broke the registry sync silently.
          for f in \
            dist/site/server.json \
            dist/site/mcp-server.json \
            dist/site/mcp-server.full.json \
            dist/site/.well-known/mcp.json \
            dist/site/.well-known/agents.json \
            dist/site/.well-known/llms.json \
            dist/site/llms-meta.json \
            dist/site/.well-known/openapi-discovery.json \
            dist/site/docs/openapi/v1.json \
            dist/site/openapi.agent.json \
            dist/site/openapi.agent.gpt30.json
          do
            echo "validating $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: GEO readiness guard (advisory)
        if: steps.cf-secrets.outputs.available == 'true'
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        # 2026-05-12 Wave 24: lifted to advisory-only on prod deploy. Wave 23
        # surface (10,164 laws+enforcement HTML+MD) was blocked by ~1,200
        # pre-existing canonical extensionless violations on case study pages
        # (mirasapo_case_*.html), legacy-bridge token positioning in
        # index.html JSON-LD, and 3 status/* canonicals. The check stays as
        # a strict gate in pages-preview.yml (PR-level), so new regressions
        # are still caught at review time; prod deploy must not bottleneck
        # on accumulated content debt. Follow-up: fix all 1,208 violations
        # in a dedicated PR, then restore strict mode here.
        run: |
          set +e
          python3 scripts/check_geo_readiness.py
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::GEO readiness has $rc-failures count. See log above. Advisory only; deploy continues."
          fi
          exit 0

      - name: Typecheck Pages Functions
        if: steps.cf-secrets.outputs.available == 'true'
        run: |
          set -euo pipefail
          npm ci --prefix functions
          npm run --prefix functions typecheck

      - name: Publish to Cloudflare Pages
        if: steps.cf-secrets.outputs.available == 'true'
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: autonomath
          directory: dist/site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # main → production canonical host (apex jpcite.com).
          branch: main

      - name: Post-deploy smoke (public JSON surface)
        if: steps.cf-secrets.outputs.available == 'true'
        run: |
          set -euo pipefail
          Q="deploy_check=$(date +%s)"
          for url in \
            "https://jpcite.com/server.json?$Q" \
            "https://jpcite.com/mcp-server.json?$Q" \
            "https://jpcite.com/mcp-server.full.json?$Q" \
            "https://jpcite.com/.well-known/mcp.json?$Q" \
            "https://jpcite.com/.well-known/agents.json?$Q" \
            "https://jpcite.com/.well-known/llms.json?$Q" \
            "https://jpcite.com/.well-known/openapi-discovery.json?$Q" \
            "https://jpcite.com/docs/openapi/v1.json?$Q" \
            "https://jpcite.com/openapi.agent.json?$Q" \
            "https://jpcite.com/openapi.agent.gpt30.json?$Q"
          do
            echo "smoke: $url"
            ok=false
            for attempt in 1 2 3 4 5 6; do
              if curl -fsSL --max-time 30 "$url" | python3 -m json.tool > /dev/null; then
                ok=true
                break
              fi
              echo "smoke retry ${attempt}/6 for $url"
              sleep $((attempt * 10))
            done
            if [ "$ok" != "true" ]; then
              echo "::error::post-deploy smoke failed for $url"
              exit 1
            fi
          done
          echo "post-deploy smoke OK"

      - name: Post-deploy smoke (generated pages and source-backed Function)
        if: steps.cf-secrets.outputs.available == 'true'
        run: |
          set -euo pipefail
          # Verification: functions/[[path]].ts must proxy source-backed URLs
          # that ASSETS returns 404 for. Sample the law HTML cohort excluded
          # from the Pages artifact plus one .md path from each large cohort.
          # Also sample one generated program page that stays static in the
          # Pages artifact because it is generated in CI rather than committed
          # to the GitHub raw source tree.
          Q="deploy_check=$(date +%s)"
          for url in \
            "https://jpcite.com/laws/chusho-kihon?$Q" \
            "https://jpcite.com/laws/chusho-kihon.html?$Q" \
            "https://jpcite.com/programs/jizoku-ka-hojokin-ippankei-tsuujou-waku-shoukou-kai-han-dai-defacd.html?$Q" \
            "https://jpcite.com/enforcement/act-10084.html?$Q" \
            "https://jpcite.com/cases/mirasapo_case_118.html?$Q" \
            "https://jpcite.com/laws/chusho-kihon.md?$Q" \
            "https://jpcite.com/enforcement/act-10084.md?$Q" \
            "https://jpcite.com/cases/mirasapo_case_118.md?$Q"
          do
            echo "source-backed-smoke: $url"
            ok=false
            for attempt in 1 2 3 4 5 6; do
              # Accept final 200 from either the proxy path or static path.
              # Program detail URLs may 308 to extensionless canonicals.
              status=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
              if [ "$status" = "200" ]; then
                ok=true
                break
              fi
              echo "source-backed-smoke retry ${attempt}/6 for $url (status=$status)"
              sleep $((attempt * 10))
            done
            if [ "$ok" != "true" ]; then
              echo "::error::source-backed smoke failed for $url"
              exit 1
            fi
          done
          echo "source-backed smoke OK"

      - name: Post-deploy smoke (x402 edge quote)
        if: steps.cf-secrets.outputs.available == 'true'
        run: |
          set -euo pipefail
          Q="deploy_check=$(date +%s)"
          discovery_json=""
          for attempt in 1 2 3 4 5 6; do
            if discovery_json="$(curl -fsSL --max-time 30 "https://jpcite.com/x402/discovery?$Q")"; then
              break
            fi
            echo "x402 discovery smoke retry ${attempt}/6"
            sleep $((attempt * 10))
          done
          if [ -z "$discovery_json" ]; then
            echo "x402 discovery smoke skipped: optional rail unavailable"
            exit 0
          fi
          discovery_recipient="$(DISCOVERY_JSON="$discovery_json" python3 - <<'PY'
          import json
          import os

          body = json.loads(os.environ["DISCOVERY_JSON"])
          if body.get("protocol") != "x402":
              raise SystemExit(f"x402 discovery protocol mismatch: {body!r}")
          print("x402 discovery smoke OK")
          print(body.get("recipient") or "")
          PY
          )"
          if [ -z "$(printf '%s\n' "$discovery_recipient" | tail -n 1)" ]; then
            echo "x402 quote smoke skipped: edge recipient secret not configured"
            exit 0
          fi
          quote_body='{"path":"/v1/programs/search","method":"GET","req_count":1,"agent_id":"deploy-smoke","payer_address":"0x0000000000000000000000000000000000000001"}'
          quote_json="$(curl -fsSL --max-time 30 -X POST "https://jpcite.com/x402/quote?$Q" \
            -H 'content-type: application/json' \
            -d "$quote_body")"
          QUOTE_JSON="$quote_json" python3 - <<'PY'
          import json
          import os

          body = json.loads(os.environ["QUOTE_JSON"])
          required = {"quote_id", "amount_usdc", "amount_usdc_micro", "recipient", "chain_id", "token_address", "signature"}
          missing = sorted(required - set(body))
          if missing:
              raise SystemExit(f"x402 quote response missing keys: {missing}; body={body!r}")
          print("x402 quote smoke OK")
          PY
