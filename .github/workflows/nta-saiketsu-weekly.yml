name: nta-saiketsu-weekly

# AA1-G1 weekly incremental NTA 裁決 ingest from kfs.go.jp.
#
# Why a *separate* weekly cron (vs. the existing daily
# `nta-corpus-incremental-cron.yml`)?
#
# The daily cron caps each target at 20 minutes and round-robins across
# saiketsu / shitsugi / bunsho. The G1 ramp identified the 裁決 backlog
# as the 96% gap (137 / 3,300) and that takes 360+ minute cycles to
# clear at the 1 req / 2-3 sec polite delay. A *weekly* cron with a much
# larger wall-clock cap (180 minutes) is the cleaner way to drain that
# backlog without starving the daily cron of its other 2 targets.
#
# Once the backlog drains to ~ steady-state, this weekly cron continues
# to catch new 裁決 published between the quarterly NTA refresh windows.
#
# Cadence
# -------
# 03:00 JST every Monday = 18:00 UTC Sunday. NTA / KFS are entirely
# idle this window; staggered 1h after the daily cron's 19:05 UTC slot.
#
# Required secrets
#   FLY_API_TOKEN
# Optional
#   SLACK_WEBHOOK_INGEST    notify on driver failure

on:
  schedule:
    # 03:00 JST Monday == 18:00 UTC Sunday
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      vol_from:
        description: "Starting volume number (1..120)"
        required: false
        default: "1"
      vol_to:
        description: "Ending volume number (1..120 inclusive)"
        required: false
        default: "42"
      max_minutes:
        description: "Wall-clock cap for this run (default 180)"
        required: false
        default: "180"
      dry_run:
        description: "If true, heartbeat + cursor read only"
        required: false
        default: "false"

concurrency:
  group: nta-saiketsu-weekly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    # 180 min crawl + flyctl overhead + log copy. 240 min cap = 60 min headroom.
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run weekly saiketsu sweep on Fly machine
        id: run
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          INPUT_VOL_FROM: ${{ github.event.inputs.vol_from }}
          INPUT_VOL_TO: ${{ github.event.inputs.vol_to }}
          INPUT_MAX_MIN: ${{ github.event.inputs.max_minutes }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          VOL_FROM="${INPUT_VOL_FROM:-1}"
          VOL_TO="${INPUT_VOL_TO:-42}"
          MAX_MIN="${INPUT_MAX_MIN:-180}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          # PYTHONPATH=/app required for scripts.lib.* imports under Fly.
          set +e
          flyctl ssh console -a autonomath-api -C \
            "env PYTHONPATH=/app \
              /opt/venv/bin/python /app/scripts/etl/ingest_nta_kfs_saiketsu.py \
              --vol-from ${VOL_FROM} \
              --vol-to ${VOL_TO} \
              --max-minutes ${MAX_MIN} \
              ${DRY_FLAG}" \
            2>&1 | tee saiketsu_weekly.out
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # flyctl ssh collapses inner exit code into 1 on non-zero. The
          # script intentionally exits 2 ("no work" / "saturated" / "dry
          # run completed") which the wrapper surfaces as marker text.
          if [ "$rc" -ne 0 ]; then
            if grep -qE 'Process exited with status 2' saiketsu_weekly.out 2>/dev/null; then
              echo "::notice::saiketsu_weekly exited 2 (no work). Treating as success."
              rc=0
            fi
          fi
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            echo "::error::ingest_nta_kfs_saiketsu.py exited $rc"
            exit 1
          fi

      - name: Pull saiketsu progress JSON off Fly machine
        if: success()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p tools/offline/_inbox/nta_kfs_saiketsu
          flyctl ssh sftp get /app/tools/offline/_inbox/nta_kfs_saiketsu/_progress.json -a autonomath-api \
            || echo "::warning::no _progress.json yet"
          if [ -f _progress.json ]; then
            mv _progress.json tools/offline/_inbox/nta_kfs_saiketsu/_progress.json
            tail -c 500 tools/offline/_inbox/nta_kfs_saiketsu/_progress.json || true
          fi

      - name: Open issue on driver failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY="Loader: \`scripts/etl/ingest_nta_kfs_saiketsu.py\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nSHA: \`${{ github.sha }}\`\n\nLikely causes: kfs.go.jp 5xx after retries, network egress block, or autonomath.db lock contention.\n"
          gh issue create \
            --title "nta-saiketsu-weekly failed on $(date -u +%Y-%m-%d)" \
            --label ingest-failure \
            --label automation \
            --body "$BODY"

      - name: Slack notify on driver failure
        if: failure() && env.SLACK_WEBHOOK_INGEST != ''
        env:
          SLACK_WEBHOOK_INGEST: ${{ secrets.SLACK_WEBHOOK_INGEST }}
        run: |
          set -euo pipefail
          curl -fsS -X POST -H 'content-type: application/json' \
            --data "{\"text\":\":warning: nta-saiketsu-weekly failure — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_INGEST" || true
