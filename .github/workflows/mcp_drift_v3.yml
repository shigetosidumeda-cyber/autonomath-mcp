name: mcp_drift_v3
on:
  workflow_dispatch: {}


concurrency:
  # Wave 43 noise reduction (2026-05-12): serialize same-ref runs.
  group: mcp-drift-v3-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Check MCP tool count vs facts_registry
        run: python scripts/check_mcp_drift.py
