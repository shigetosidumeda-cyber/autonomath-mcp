name: facts_registry_drift_v3
on:
  pull_request:
    branches: [main, "v3/**"]
jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Scan publish surface vs facts_registry
        run: python scripts/scan_publish_surface.py
