name: Chaos engineering (weekly)

# Wave 18 E3 — weekly Toxiproxy-based fault-injection suite that
# validates the jpcite API's resilience to upstream latency, connection
# resets, TCP timeouts, and bandwidth caps.
#
# Cadence: Sat 04:00 UTC (Sat 13:00 JST) — chosen so any regression lands
# before Monday's launch-watch window, with the rest of the weekend
# available to root-cause without blocking new deploys.
#
# Resilience score:
#   - tests/chaos/ implements 5 distinct fault scenarios spread across
#     `test_latency_injection.py` + `test_connection_drop.py`.
#   - Score = passing_scenarios / 5, target ≥ 4.5 (90%).
#   - The job fails if any scenario errors *and* doesn't skip — a clean
#     skip (no Toxiproxy available) does not lower the score because
#     the suite is designed to gate on the workflow path, not on every
#     developer's laptop.
#
# Toxiproxy is started as a service container; the API under test runs
# on the same host via `uvicorn` background. We hit the API through the
# Toxiproxy listener (port 18001) so each test can inject toxics live.
#
# LLM use: NONE. The chaos suite uses only stdlib + httpx +
# toxiproxy-python (test-only dep, NOT in production deps).
on:
  schedule:
    - cron: '0 4 * * 6'      # Sat 04:00 UTC = Sat 13:00 JST
  workflow_dispatch:

jobs:
  chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      toxiproxy:
        image: ghcr.io/shopify/toxiproxy:2.9.0
        ports:
          - 8474:8474
          - 18001:18001
        options: >-
          --health-cmd="wget -q --spider http://localhost:8474/version || exit 1"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=5
    env:
      TOXIPROXY_HOST: '127.0.0.1'
      TOXIPROXY_PORT: '8474'
      TOXIPROXY_API_LISTEN_PORT: '18001'
      CHAOS_UPSTREAM: '127.0.0.1:8080'
      JPINTEL_ENV: 'test'
      # Skip the 9.7 GB autonomath.db boot gate — chaos suite only
      # exercises /healthz and basic-shape endpoints.
      JPCITE_PREFLIGHT_ALLOW_MISSING_DB: '1'
      AUTONOMATH_DB_MIN_PRODUCTION_BYTES: '1024'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Install deps
        run: |
          pip install -e ".[dev]"
          pip install toxiproxy-python
      - name: Start API under test
        run: |
          .venv/bin/uvicorn jpintel_mcp.api.main:app --host 127.0.0.1 --port 8080 &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/healthz && break
            sleep 1
          done
      - name: Run chaos suite
        run: |
          pytest tests/chaos/ -v --maxfail=1 \
            --junit-xml=chaos-results.xml \
            --tb=short
      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: chaos-results
          path: chaos-results.xml
          retention-days: 30
      - name: Compute resilience score
        if: always()
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          import pathlib
          p = pathlib.Path("chaos-results.xml")
          if not p.exists():
              print("resilience_score=0/5 (no junit output)")
              raise SystemExit(0)
          tree = ET.parse(p)
          root = tree.getroot()
          total = int(root.attrib.get("tests", 0))
          fails = int(root.attrib.get("failures", 0)) + int(root.attrib.get("errors", 0))
          skips = int(root.attrib.get("skipped", 0))
          passed = total - fails - skips
          score = passed
          print(f"resilience_score={score}/5 (passed={passed} failed={fails} skipped={skips})")
          if score < 4 and skips < 4:
              print("WARNING: resilience score below target (>=4.5)")
          PY
