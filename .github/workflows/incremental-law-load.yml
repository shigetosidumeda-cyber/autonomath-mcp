name: incremental-law-load

# Weekly incremental e-Gov full-text loader for am_law catalog stubs.
# Lifts full-text coverage 600 laws/run on top of the 154 already loaded.
# At 600 laws/week ≈ 31,200 laws/year, the ~9,955 unloaded eligible stubs
# saturate in ~17 weeks (~4 months). Solo + zero-touch friendly.
#
# Pace history: bumped from 100→300 laws/run on 2026-04-29 (Wave 30+1).
# B4 bumped from 300→600 laws/run on 2026-05-01. e-Gov's published rate
# budget is ~1 req/sec; at 1.0 s polite sleep + ~1.5 s fetch a 600-law
# batch typically finishes around 25 min, with a 90-min workflow timeout
# for safer headroom around slow responses or Fly I/O waits.
#
# Runs ON the Fly production machine via flyctl ssh — same pattern as
# ingest-weekly.yml, so the DB write lands on the Fly volume (which is
# the canonical autonomath.db). The repo's local autonomath.db is a
# dev mirror only; CI does not write to it.
#
# Required secrets:
#   FLY_API_TOKEN
# Optional secrets:
#   SLACK_WEBHOOK_INGEST   notify on driver failure

on:
  schedule:
    # 19:50 UTC Sunday == 04:50 JST Monday. e-Gov is generally idle this
    # window; we run BEFORE ingest-weekly (20:20 UTC) so a fresh law
    # batch is searchable when the Tier 2 program ingest correlates
    # programs against am_law_article. Staggered +20 min vs
    # data-integrity (30 19 *) and news-pipeline-cron (35 19 *) to
    # avoid Fly machine ssh contention on Sundays.
    - cron: "50 19 * * 0"
  workflow_dispatch:
    inputs:
      limit:
        description: "Laws to load this run (default: 600)"
        required: false
        default: "600"
      dry_run:
        description: "If true, fetch+parse only, no DB writes"
        required: false
        default: "false"

concurrency:
  group: incremental-law-load
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # 600 laws × ~1.5s fetch + 1.0s sleep ≈ 25 min, safer headroom
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run incremental loader on Fly machine
        id: run
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          LIMIT="${INPUT_LIMIT:-600}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          set +e
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/cron/incremental_law_fulltext.py \
              --db /data/autonomath.db \
              --limit ${LIMIT} \
              --log-file /data/law_load_log.jsonl \
              ${DRY_FLAG}" \
            | tee law_load.out
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # rc == 2 means "registry saturated" — that is success, not failure.
          # Keep the workflow green so we don't get spurious page alerts the
          # week the loader finishes its multi-year run.
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            echo "::error::incremental_law_fulltext.py exited $rc"
            exit 1
          fi

      - name: Pull law_load_log.jsonl off Fly machine
        if: success()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          flyctl ssh sftp get /data/law_load_log.jsonl -a autonomath-api \
            || echo "::warning::no /data/law_load_log.jsonl yet"
          if [ -f law_load_log.jsonl ]; then
            mv law_load_log.jsonl data/law_load_log.jsonl
          fi

      - name: Detect log diff
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- data/law_load_log.jsonl 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with law_load_log diff
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: "chore(law-load): weekly incremental log $(date -u +%Y-%m-%d)"
          title: "Law load weekly: $(date -u +%Y-%m-%d)"
          body: |
            Auto-generated by `.github/workflows/incremental-law-load.yml`.

            This PR captures the per-run summary line appended to
            `data/law_load_log.jsonl` after the Fly volume's `autonomath.db`
            absorbed another batch of e-Gov full-text laws. The DB itself
            stays on the Fly volume (8.29 GB — never committed).

            Marketing copy (CLAUDE.md "154 full-text + 9,484 catalog stubs")
            should be updated when the cumulative `coverage_after` figure
            in this log crosses a round milestone (e.g. 200, 500, 1000).
          branch: incremental-law-load/${{ github.run_id }}
          base: main
          delete-branch: true
          labels: |
            ingest
            law
            automation
          add-paths: |
            data/law_load_log.jsonl

      - name: Open issue on driver failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY="Loader: \`scripts/cron/incremental_law_fulltext.py\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nSHA: \`${{ github.sha }}\`\n\nLikely causes: e-Gov 5xx after MAX_RETRIES, network egress block, or \`autonomath.db\` lock contention. See \`scripts/cron/incremental_law_fulltext.py\` docstring.\n"
          gh issue create \
            --title "incremental-law-load failed on $(date -u +%Y-%m-%d)" \
            --label ingest-failure \
            --label automation \
            --body "$BODY"

      - name: Slack notify on driver failure
        if: failure() && env.SLACK_WEBHOOK_INGEST != ''
        env:
          SLACK_WEBHOOK_INGEST: ${{ secrets.SLACK_WEBHOOK_INGEST }}
        run: |
          set -euo pipefail
          curl -fsS -X POST -H 'content-type: application/json' \
            --data "{\"text\":\":warning: incremental-law-load driver failure — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_INGEST" || true
