name: deploy-jpcite-api

# Wave 46.B (2026-05-12) — design-only dispatch workflow for the new Fly app
# `jpcite-api`. Per `project_jpcite_internal_autonomath_rename` and
# `feedback_destruction_free_organization`:
#   * The legacy `deploy.yml` (target = autonomath-api) is the SOT for prod
#     traffic and MUST NOT be edited. This file is a parallel pipeline.
#   * Dispatch-only: no `workflow_run`, no `cron`, no `push` trigger. The
#     actual rollover (cutover of api.jpcite.com from autonomath-api →
#     jpcite-api) is gated on explicit user judgment in a later wave.
#   * Operator-ack identical to deploy.yml (PRODUCTION_DEPLOY_OPERATOR_ACK
#     gate). New app does not bypass production safety checks.
#
# Differences vs. deploy.yml:
#   * Target app: `jpcite-api` (new app); -c fly.jpcite.toml.
#   * Skips the sftp hydrate from `autonomath-api`. The new app starts
#     from a fresh Fly volume; first-boot bootstrap pulls jpintel.db
#     via the Dockerfile JPINTEL_DB_R2_URL build-arg (R2 canonical mirror).
#   * Smoke probes hit the same /healthz / deep_health endpoints but via
#     the jpcite-api.fly.dev internal URL until DNS cutover lands.
#   * No cf-purge step (CF Pages cutover is its own wave).

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: "Exact commit SHA to deploy"
        required: true
        type: string
      smoke_base_url:
        description: "Base URL for post-deploy smoke (default: https://jpcite-api.fly.dev). Set to https://api.jpcite.com only AFTER DNS cutover."
        required: false
        type: string
        default: "https://jpcite-api.fly.dev"

concurrency:
  # Serialize deploys for the same branch + target app.
  group: deploy-jpcite-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fly:
    name: Deploy to Fly.io (jpcite-api)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.expected_sha }}

      - name: Resolve and verify deployment SHA
        id: deploy-sha
        run: |
          set -euo pipefail
          DEPLOY_SHA="$(git rev-parse HEAD)"
          EXPECTED_SHA="${{ github.event.inputs.expected_sha }}"
          if [ -z "${EXPECTED_SHA:-}" ]; then
            echo "::error::Unable to resolve expected deployment SHA."
            exit 1
          fi
          if [ "$DEPLOY_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch: expected $EXPECTED_SHA got $DEPLOY_SHA"
            exit 1
          fi
          echo "sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
          echo "short=${DEPLOY_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA $DEPLOY_SHA to jpcite-api"

      - name: Check Fly token
        id: fly-token
        run: |
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::error::FLY_API_TOKEN is not configured; refusing to mark deploy successful."
            exit 1
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Verify fly.jpcite.toml exists and targets jpcite-api
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          if [ ! -f fly.jpcite.toml ]; then
            echo "::error::fly.jpcite.toml missing — refusing to deploy."
            exit 1
          fi
          target_app=$(grep -E '^app\s*=' fly.jpcite.toml | head -1 | sed -E 's/app\s*=\s*"([^"]+)"/\1/')
          if [ "$target_app" != "jpcite-api" ]; then
            echo "::error::fly.jpcite.toml app=$target_app (expected jpcite-api)"
            exit 1
          fi
          echo "fly.jpcite.toml app=$target_app OK"

      - name: Set up Python
        if: steps.fly-token.outputs.available == 'true'
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev + site extras
        if: steps.fly-token.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Prepare production deploy operator ACK
        if: steps.fly-token.outputs.available == 'true'
        id: operator-ack
        env:
          PRODUCTION_DEPLOY_OPERATOR_ACK_YAML: ${{ secrets.PRODUCTION_DEPLOY_OPERATOR_ACK_YAML }}
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_DEPLOY_OPERATOR_ACK_YAML:-}" ]; then
            echo "::error::PRODUCTION_DEPLOY_OPERATOR_ACK_YAML is not configured; refusing deploy."
            exit 1
          fi
          ack_path="${RUNNER_TEMP}/production_deploy_operator_ack.yml"
          printf '%s\n' "$PRODUCTION_DEPLOY_OPERATOR_ACK_YAML" > "$ack_path"
          echo "path=$ack_path" >> "$GITHUB_OUTPUT"

      - name: Run local pre-deploy verification
        if: steps.fly-token.outputs.available == 'true'
        env:
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: python scripts/ops/pre_deploy_verify.py

      - name: Run production deploy GO gate
        if: steps.fly-token.outputs.available == 'true'
        run: python scripts/ops/production_deploy_go_gate.py --operator-ack "${{ steps.operator-ack.outputs.path }}"

      - name: Set up flyctl
        if: steps.fly-token.outputs.available == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Verify jpcite-api app exists on Fly
        if: steps.fly-token.outputs.available == 'true'
        # Soft gate: if the app does not yet exist on Fly the operator must
        # `flyctl apps create jpcite-api` first. We log loudly but do not
        # auto-create here so this dispatch can be a dry-run preview.
        run: |
          set +e
          flyctl apps list --json 2>/dev/null \
            | python3 -c "import json,sys; apps=json.load(sys.stdin); names=[a.get('Name','') for a in apps]; sys.exit(0 if 'jpcite-api' in names else 7)"
          rc=$?
          if [ "$rc" = "7" ]; then
            echo "::error::jpcite-api app not found. Create it first with: flyctl apps create jpcite-api --org bookyou"
            exit 1
          elif [ "$rc" != "0" ]; then
            echo "::warning::flyctl apps list returned rc=$rc; assuming app exists and continuing."
          else
            echo "jpcite-api app present on Fly."
          fi

      - name: Verify live Fly secret names before deploy
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          required=(
            ADMIN_API_KEY
            API_KEY_SALT
            AUTONOMATH_API_HASH_PEPPER
            AUTONOMATH_DB_SHA256
            AUTONOMATH_DB_URL
            INVOICE_FOOTER_JA
            INVOICE_REGISTRATION_NUMBER
            JPCITE_SESSION_SECRET
            JPINTEL_CORS_ORIGINS
            JPINTEL_ENV
            RATE_LIMIT_FREE_PER_DAY
            R2_ACCESS_KEY_ID
            R2_BUCKET
            R2_ENDPOINT
            R2_SECRET_ACCESS_KEY
            STRIPE_BILLING_PORTAL_CONFIG_ID
            STRIPE_PRICE_PER_REQUEST
            STRIPE_SECRET_KEY
            STRIPE_TAX_ENABLED
            STRIPE_WEBHOOK_SECRET
          )
          fly_secret_names="$(
            flyctl secrets list -a jpcite-api \
              | awk -F '│' 'NF >= 3 {gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); if ($1 != "NAME" && $1 != "") print $1}'
          )"
          missing=()
          for name in "${required[@]}"; do
            if ! grep -Fxq "$name" <<< "$fly_secret_names"; then
              missing+=("$name")
            fi
          done
          audit_seal_present=0
          for name in AUDIT_SEAL_SECRET JPINTEL_AUDIT_SEAL_KEYS; do
            if grep -Fxq "$name" <<< "$fly_secret_names"; then
              audit_seal_present=1
            fi
          done
          if [ "$audit_seal_present" = "0" ]; then
            missing+=("one_of(AUDIT_SEAL_SECRET|JPINTEL_AUDIT_SEAL_KEYS)")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required Fly secret names for jpcite-api: ${missing[*]}"
            exit 1
          fi
          echo "Required Fly secret names present for jpcite-api (${#required[@]} required + audit-seal alternative checked; values not read)."

      - name: Prepare seed placeholder (jpcite-api uses R2 build-arg only)
        if: steps.fly-token.outputs.available == 'true'
        # No sftp from autonomath-api: keep the legacy app's volume untouched.
        # jpcite-api hydrates jpintel.db via the Dockerfile JPINTEL_DB_R2_URL
        # build-arg on the Fly remote builder, identical to the Wave 24
        # SKIP_HYDRATE path in deploy.yml.
        run: |
          set -euo pipefail
          mkdir -p data
          printf '\x00' > data/jpintel.db
          echo "placeholder data/jpintel.db = $(wc -c < data/jpintel.db | tr -d ' ') bytes"

      - name: Extract release version from pyproject.toml
        if: steps.fly-token.outputs.available == 'true'
        id: version
        run: |
          set -euo pipefail
          PKG_VER=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          SHORT_SHA="${{ steps.deploy-sha.outputs.short }}"
          RELEASE="jpcite-mcp@${PKG_VER}+${SHORT_SHA}"
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Computed SENTRY_RELEASE=${RELEASE}"

      - name: Deploy (remote builder, fly.jpcite.toml)
        if: steps.fly-token.outputs.available == 'true'
        timeout-minutes: 35
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          jpintel_r2_url=""
          if [ -n "${AWS_ACCESS_KEY_ID:-}" ] \
             && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ] \
             && [ -n "${R2_ENDPOINT:-}" ] \
             && [ -n "${R2_BUCKET:-}" ]; then
            if aws s3api head-object --bucket "$R2_BUCKET" --key "autonomath-api/jpintel.db.gz" --endpoint-url "$R2_ENDPOINT" >/dev/null 2>&1; then
              jpintel_r2_url=$(aws s3 presign "s3://$R2_BUCKET/autonomath-api/jpintel.db.gz" \
                --endpoint-url "$R2_ENDPOINT" --expires-in 3600 || echo "")
            fi
          fi
          flyctl deploy --remote-only \
            -c fly.jpcite.toml \
            -a jpcite-api \
            -e SENTRY_RELEASE=${{ steps.version.outputs.release }} \
            --build-arg "JPINTEL_DB_R2_URL=${jpintel_r2_url}" \
            --label GH_SHA=${{ steps.deploy-sha.outputs.sha }} \
            --label com.bookyou.jpcite.app=jpcite-api \
            --label org.opencontainers.image.revision=${{ steps.deploy-sha.outputs.sha }} \
            --image-label deployment-${{ steps.deploy-sha.outputs.short }}-${{ github.run_id }}

      - name: Post-deploy smoke (hard gate)
        if: steps.fly-token.outputs.available == 'true'
        timeout-minutes: 30
        env:
          BASE_URL: ${{ github.event.inputs.smoke_base_url }}
        run: |
          set -euo pipefail
          echo "== Post-deploy hard gate (target=$BASE_URL) =="

          # 60s propagation sleep — see feedback_post_deploy_smoke_propagation.
          sleep 60

          health_ok=0
          for i in $(seq 1 24); do
            status=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 10 "$BASE_URL/healthz" || echo 000)
            echo "GET /healthz attempt $i -> $status"
            if [ "$status" = "200" ]; then
              health_ok=1
              break
            fi
            sleep 10
          done
          if [ "$health_ok" != "1" ]; then
            echo "::error::POST-DEPLOY FAIL: /healthz did not become 200"
            exit 1
          fi
          echo "Post-deploy /healthz=200 PASS (jpcite-api)"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping notification."
            exit 0
          fi
          payload=$(printf '{"text":"jpcite-api deploy FAILED on %s (commit %s) — %s"}' \
            "${GITHUB_REF_NAME}" "${{ steps.deploy-sha.outputs.short }}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")
          curl -sS -X POST -H 'Content-Type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
