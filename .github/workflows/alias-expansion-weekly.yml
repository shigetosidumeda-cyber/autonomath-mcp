name: alias-expansion-weekly

# Weekly cron: mine empty_search_log for alias candidates -> queue rows
# in `alias_candidates_queue` (mig 112) for operator review.
#
# The cron NEVER writes to `am_alias` directly — operator approval via
# `python -m jpintel_mcp.loops.alias_review --approve <id>` is the only
# write path (Plan §8.7 "production write 必ず review 後").
#
# Cadence: Sunday 03:00 JST (Saturday 18:00 UTC).
#
# LLM use: NONE. Pure pykakasi + difflib.SequenceMatcher + plain SQL.
# Per `feedback_autonomath_no_api_use` — burning Anthropic API tokens
# inside the alias pipeline would break the ¥3/req economics instantly.
#
# Output: per-run JSON to stdout + uploaded as workflow artifact.
# Result also appended to docs/_internal/alias_expansion_log.md.

on:
  schedule:
    # 18:00 UTC Saturday == 03:00 JST Sunday.
    - cron: '0 18 * * 6'
  workflow_dispatch: {}

concurrency:
  group: alias-expansion-weekly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Run alias expansion (dry-run by default)
        env:
          JPINTEL_DB_PATH: ./data/jpintel.db
          AUTONOMATH_DB_PATH: ./autonomath.db
        run: |
          set -e
          mkdir -p analysis/alias_expansion
          python scripts/cron/alias_dict_expansion.py --dry-run \
            > analysis/alias_expansion/run_$(date -u +%Y-%m-%d).json
          cat analysis/alias_expansion/run_$(date -u +%Y-%m-%d).json

      - name: Append summary to docs log
        run: |
          set -e
          mkdir -p docs/_internal
          LOG=docs/_internal/alias_expansion_log.md
          DATE=$(date -u +%Y-%m-%d)
          JSON=analysis/alias_expansion/run_${DATE}.json
          if [ ! -f "$LOG" ]; then
            cat > "$LOG" <<'EOF'
          # Alias expansion weekly log

          Auto-appended by `.github/workflows/alias-expansion-weekly.yml`.
          Each entry is the JSON summary from
          `scripts/cron/alias_dict_expansion.py --dry-run`. Operator review
          via `python -m jpintel_mcp.loops.alias_review --list` (read-only).

          Production write: `python -m jpintel_mcp.loops.alias_review --approve <id>`.
          NEVER auto-promotes (Plan §8.7).

          ---
          EOF
          fi
          {
            echo
            echo "## ${DATE}"
            echo
            echo '```json'
            cat "$JSON"
            echo '```'
          } >> "$LOG"

      - name: Upload run artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: alias-expansion-${{ github.run_id }}
          path: analysis/alias_expansion/
          if-no-files-found: ignore

      - name: Open PR with log diff
        if: github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: "chore(alias): weekly alias-expansion log $(date -u +%Y-%m-%d)"
          title: "Alias expansion weekly: ${{ github.run_id }}"
          body: |
            Auto-generated by `.github/workflows/alias-expansion-weekly.yml`.

            Inspect the appended JSON section of
            `docs/_internal/alias_expansion_log.md`. Promote candidates via:

            ```bash
            python -m jpintel_mcp.loops.alias_review --list
            python -m jpintel_mcp.loops.alias_review --approve <id>
            ```

            Merge after eyeball review. Do **not** auto-merge.
          branch: alias-expansion/$(date -u +%Y-%m-%d)
          base: main
          delete-branch: true
          labels: |
            alias-expansion
            automation
          add-paths: |
            docs/_internal/alias_expansion_log.md
