name: same-day-push-cron

# 同日 push (consultant trigger #3 of the trio).
#
# Polls am_amendment_diff + programs.updated_at for new program rows in
# the last 30 minutes, joins client_profiles, and fans out alerts to
# matched consultants. Same-day delivery, not next-day. ¥3 metered per
# delivery. Idempotency via same_day_push_log so a (program, profile)
# pair fires at most once.
#
# Cadence: every 30 minutes. GitHub Actions schedule jitter is up to 15
# minutes; the in-DB idempotency log absorbs duplicate ticks safely.
#
# Production mutation safety:
#   Manual runs default to --dry-run. Scheduled/manual live mutation requires
#   PROD_DB_MUTATION_OPERATOR_ACK=I_ACK_PROD_DB_MUTATION; otherwise the Fly SSH
#   command forces --dry-run.

on:
  schedule:
    # Offset from high-contention :00/:30 slots and from dispatch/stripe/sweep
    # jobs in this deployment lane.
    - cron: "2,32 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run with --dry-run (no email, no billing)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      window_minutes:
        description: "Lookback window in minutes (default 30)"
        required: false
        default: "30"
        type: string

concurrency:
  group: same-day-push-cron
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 9  # < 30-min interval to prevent overlap
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run same_day_push
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
          WINDOW_MIN_INPUT: ${{ github.event.inputs.window_minutes }}
          PROD_DB_MUTATION_OPERATOR_ACK: ${{ secrets.PROD_DB_MUTATION_OPERATOR_ACK }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::notice::FLY_API_TOKEN is not set; skipping same_day_push."
            exit 0
          fi
          DRY_RUN="${DRY_RUN_INPUT:-false}"
          WINDOW_MIN="${WINDOW_MIN_INPUT:-30}"
          FLAGS="--window-minutes ${WINDOW_MIN}"
          if [ "${DRY_RUN}" = "true" ]; then
            FLAGS="${FLAGS} --dry-run"
          elif [ "${PROD_DB_MUTATION_OPERATOR_ACK:-}" != "I_ACK_PROD_DB_MUTATION" ]; then
            echo "::warning::Production DB mutation requires PROD_DB_MUTATION_OPERATOR_ACK=I_ACK_PROD_DB_MUTATION; forcing --dry-run."
            FLAGS="${FLAGS} --dry-run"
          fi
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/cron/same_day_push.py ${FLAGS}"

      - name: Sentry alert on cron failure
        if: failure()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "::warning::SENTRY_DSN not set; skipping alert hop."
            exit 0
          fi
          PROJECT_ID="$(echo "$SENTRY_DSN" | sed -E 's#.*/([0-9]+)$#\1#')"
          PUBLIC_KEY="$(echo "$SENTRY_DSN" | sed -E 's#https://([^@]+)@.*#\1#')"
          HOST="$(echo "$SENTRY_DSN" | sed -E 's#https://[^@]+@([^/]+)/.*#\1#')"
          curl -fsS -X POST \
            "https://${HOST}/api/${PROJECT_ID}/store/" \
            -H "Content-Type: application/json" \
            -H "X-Sentry-Auth: Sentry sentry_version=7,sentry_key=${PUBLIC_KEY},sentry_client=same-day-push-cron/1.0" \
            -d "{\"level\":\"error\",\"logger\":\"github.actions.same-day-push-cron\",\"platform\":\"other\",\"message\":\"same-day-push-cron failed. Run ${GITHUB_RUN_ID}.\",\"tags\":{\"workflow\":\"same-day-push-cron\",\"run_id\":\"${GITHUB_RUN_ID}\"}}" \
            || echo "::warning::Sentry alert POST failed; continuing."
