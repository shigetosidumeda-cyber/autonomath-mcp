name: Refresh source URLs

# Tiered URL liveness scan for the AutonoMath registry. Tier S/A run nightly
# (daily), Tier B weekly, Tier C monthly. The Tier C pass is the largest
# (~6,400 rows) so we cap concurrency to 5 and run --report-only — DB writes
# stay confined to the daily S/A pass that already lives in production.
#
# All three jobs publish the per-tier freshness summary to
# `data/source_freshness_report.json` via the script's append-mode merger,
# and upload `data/refresh_sources_report.json` as a build artefact.
#
# Wall-clock estimate (Tier C): 6,567 rows / concurrency 5 with HEAD timeout
# 15s ≈ 35-45 min. Comfortably under the 6h GitHub Actions free-tier ceiling.

on:
  schedule:
    # Tier S/A: daily at 03:22 JST (18:22 UTC previous day). Offset +5 min
    # from nightly-backup (18:17 UTC) to avoid runner contention
    # (W14-12 audit follow-up; eval-judgment).
    - cron: '22 18 * * *'
    # Tier B: weekly, Sunday 03:17 JST (Saturday 18:17 UTC).
    - cron: '17 18 * * 6'
    # Tier C: monthly, day-1 03:17 JST (last-day 18:17 UTC of prior month).
    # GitHub schedules cron in UTC; this fires at 18:17 UTC on the 1st of
    # each month, which is 03:17 JST on the 2nd — close enough to a "month
    # start" cadence and avoids the brittle "last-day-of-month" expression.
    - cron: '17 18 1 * *'
  workflow_dispatch:
    inputs:
      tiers:
        description: "Tier filter (e.g. 'S,A' or 'B' or 'C'). Defaults to S,A."
        required: false
        default: 'S,A'
      report_only:
        description: 'If true, --report-only (no DB writes).'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write   # for the tier-C dead-URL alert

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install package
        run: pip install -e .

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Hydrate jpintel.db from Fly volume (gitignored, so absent on runner)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::warning::FLY_API_TOKEN not set; refresh-sources will exit 2 without DB."
            exit 0
          fi
          mkdir -p data
          # The 1.3 MB dev fixture in the checkout would mask the real DB —
          # remove before sftp (mirror of the deploy.yml pattern).
          rm -f data/jpintel.db data/jpintel.live.db
          # Online SQLite backup → /data/jpintel.live.db on the machine, then
          # sftp it down. Avoids copying a WAL'd file mid-write.
          flyctl ssh console -a autonomath-api -C \
            "sqlite3 /data/jpintel.db \".backup /data/jpintel.live.db\""
          flyctl ssh sftp get /data/jpintel.live.db -a autonomath-api
          mv jpintel.live.db data/jpintel.db
          ls -la data/jpintel.db

      - name: Decide tier scope from cron schedule
        id: scope
        env:
          INPUT_TIERS: ${{ github.event.inputs.tiers }}
          INPUT_REPORT_ONLY: ${{ github.event.inputs.report_only }}
          CRON: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          # workflow_dispatch wins; otherwise dispatch by cron expression.
          if [ -n "${INPUT_TIERS:-}" ]; then
            TIERS="$INPUT_TIERS"
            REPORT_ONLY="${INPUT_REPORT_ONLY:-false}"
          else
            case "$CRON" in
              "17 18 * * *")    TIERS="S,A"; REPORT_ONLY="false" ;;
              "17 18 * * 6")    TIERS="B";   REPORT_ONLY="true"  ;;
              "17 18 1 * *")    TIERS="C";   REPORT_ONLY="true"  ;;
              *)                TIERS="S,A"; REPORT_ONLY="false" ;;
            esac
          fi
          echo "tiers=$TIERS"           >> "$GITHUB_OUTPUT"
          echo "report_only=$REPORT_ONLY" >> "$GITHUB_OUTPUT"

      - name: Run liveness scan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ARGS=(--tier "${{ steps.scope.outputs.tiers }}")
          if [ "${{ steps.scope.outputs.report_only }}" = "true" ]; then
            ARGS+=(--report-only)
          fi
          python scripts/refresh_sources.py "${ARGS[@]}"

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: refresh-report-${{ steps.scope.outputs.tiers }}
          path: |
            data/refresh_sources_report.json
            data/source_freshness_report.json

      # DB changes from CI are intentionally NOT persisted — the production
      # DB is the Fly volume. Tier S/A writes here only to prove the script
      # would have written; the Fly nightly cron (scripts/cron/refresh_sources_nightly.sh)
      # is the authoritative writer.

      - name: Sentry alert on cron failure
        if: failure()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "::warning::SENTRY_DSN not set; skipping alert hop."
            exit 0
          fi
          PROJECT_ID="$(echo "$SENTRY_DSN" | sed -E 's#.*/([0-9]+)$#\1#')"
          PUBLIC_KEY="$(echo "$SENTRY_DSN" | sed -E 's#https://([^@]+)@.*#\1#')"
          HOST="$(echo "$SENTRY_DSN" | sed -E 's#https://[^@]+@([^/]+)/.*#\1#')"
          curl -fsS -X POST \
            "https://${HOST}/api/${PROJECT_ID}/store/" \
            -H "Content-Type: application/json" \
            -H "X-Sentry-Auth: Sentry sentry_version=7,sentry_key=${PUBLIC_KEY},sentry_client=refresh-sources/1.0" \
            -d "{\"level\":\"error\",\"logger\":\"github.actions.refresh-sources\",\"platform\":\"other\",\"message\":\"refresh-sources failed (data freshness gap risk). Run ${GITHUB_RUN_ID}.\",\"tags\":{\"workflow\":\"refresh-sources\",\"run_id\":\"${GITHUB_RUN_ID}\"}}" \
            || echo "::warning::Sentry alert POST failed; continuing."
