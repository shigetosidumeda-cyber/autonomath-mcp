name: fence_count_drift_v3
on:
  pull_request:
    branches: [main, "v3/**"]
jobs:
  drift:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Check fence count canonical drift
        run: python scripts/check_fence_count.py
