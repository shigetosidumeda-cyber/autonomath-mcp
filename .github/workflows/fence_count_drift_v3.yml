name: fence_count_drift_v3
on:
  workflow_dispatch: {}


concurrency:
  # Wave 43 noise reduction (2026-05-12): serialize same-ref runs.
  group: fence-count-drift-v3-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  drift:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Check fence count canonical drift
        run: python scripts/check_fence_count.py
