name: outcome-verifier

# Wave 59-H — daily smoke of the top-10 outcome assertion DSL against the
# live S3 packet bucket. The verifier is pure schema / value checks (no LLM)
# so it can run in CI without paying any inference cost.
#
# [lane:solo] marker per CLAUDE.md dual-CLI lane convention.

on:
  schedule:
    # 09:00 JST = 00:00 UTC daily.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      sample_size:
        description: "Packets sampled per outcome"
        required: false
        default: "10"
      fail_on_failures:
        description: "Set to 'true' to exit non-zero on any failure"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

concurrency:
  group: outcome-verifier
  cancel-in-progress: false

jobs:
  verify:
    name: verify outcomes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install boto3
        run: |
          python -m pip install --upgrade pip
          pip install "boto3>=1.34" "botocore>=1.34"

      - name: configure aws credentials (oidc → bookyou-recovery role)
        if: ${{ env.AWS_VERIFIER_ROLE_ARN != '' }}
        env:
          AWS_VERIFIER_ROLE_ARN: ${{ secrets.AWS_VERIFIER_ROLE_ARN }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_VERIFIER_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: run verifier (dry-run when AWS creds absent)
        env:
          SAMPLE_SIZE: ${{ inputs.sample_size || '10' }}
          FAIL_ON_FAILURES: ${{ inputs.fail_on_failures || 'false' }}
        run: |
          mkdir -p out
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] && [ -z "${AWS_ROLE_ARN:-}" ]; then
            echo "AWS credentials absent — running dry-run"
            python scripts/verify_outcomes.py --dry-run --sample-size "$SAMPLE_SIZE"
          else
            EXTRA=""
            if [ "$FAIL_ON_FAILURES" = "true" ]; then EXTRA="--fail-on-failures"; fi
            python scripts/verify_outcomes.py \
              --sample-size "$SAMPLE_SIZE" $EXTRA
          fi

      - name: upload ledger artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outcome-verifier-ledger-${{ github.run_id }}
          path: out/outcome_verifier_ledger_*.jsonl
          if-no-files-found: warn
          retention-days: 30
