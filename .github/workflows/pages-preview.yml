# Cloudflare Pages fallback deploy for site/
#
# Purpose: keep a warm, static mirror of site/ on Cloudflare Pages so that if
# Fly.io (Tokyo) is degraded on launch day we can flip DNS to Pages in <5min
# and serve landing + legal + status.html instead of a generic 503.
#
# Required GitHub repository secrets:
#   CF_API_TOKEN   Cloudflare API token with scope:
#                    Account → Cloudflare Pages → Edit
#                  Create at https://dash.cloudflare.com/profile/api-tokens
#   CF_ACCOUNT_ID  Cloudflare account ID (right sidebar of any CF dashboard page)
#   FLY_API_TOKEN  Fly.io deploy token. Required for production deploys because
#                  program / prefecture / structured / llms-full artifacts are
#                  generated from the live SQLite corpus and are gitignored.
#
# Project name: autonomath
#   This workflow targets the Cloudflare Pages project "autonomath".
#   Must match the Project Name configured in Cloudflare Pages dashboard.
#
# Dashboard reality verified 2026-05-01:
#   Existing project: autonomath
#   Canonical domain: jpcite.com
#   Redirect-source domains: www.jpcite.com, zeimu-kaikei.ai,
#                            www.zeimu-kaikei.ai
#
# Main-branch production publishes are handled by pages-deploy-main.yml.
# This workflow stays available for release/* preview drills and manual runs.

name: pages-preview

on:
  push:
    branches:
      - "release/*"
    paths:
      - "site/**"
      - "docs/**"
      - "scripts/generate_geo_industry_pages.py"
      - "scripts/regen_structured_sitemap_and_llms_meta.py"
      - "mkdocs.yml"
      - "docs-requirements.txt"
      - "overrides/**"
      - ".github/workflows/pages-preview.yml"
  workflow_dispatch: {}

concurrency:
  group: cf-pages-autonomath-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy site/ to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        # fetch-depth: 0 is required by mkdocs-git-revision-date-localized so
        # every page can show its true last-commit timestamp (otherwise it
        # falls back to build date, losing "最終更新" accuracy).
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs-requirements.txt

      - name: Install docs and site dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs-requirements.txt
          pip install -e ".[site]"

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Pull latest jpintel.db for generated public artifacts
        id: generated-data
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::notice::FLY_API_TOKEN is not configured; skipping Pages publish to avoid deleting generated public artifacts."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p data
          remote_db="/data/jpintel.pages.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}.db"
          local_db="$(basename "$remote_db")"
          cleanup_remote_db() {
            flyctl ssh console -a autonomath-api -C "rm -f ${remote_db}" || true
          }
          trap cleanup_remote_db EXIT
          for attempt in 1 2 3 4 5; do
            echo "::group::Fly jpintel.db backup attempt ${attempt}/5"
            rm -f "$local_db" data/jpintel.db
            if flyctl ssh console -a autonomath-api -C \
                "bash -lc 'set -euo pipefail; rm -f ${remote_db}; sqlite3 -cmd \".timeout 300000\" /data/jpintel.db \".backup ${remote_db}\"; sqlite3 ${remote_db} \"PRAGMA quick_check; SELECT COUNT(*) FROM programs;\"'" \
              && flyctl ssh sftp get "$remote_db" -a autonomath-api ; then
              mv "$local_db" data/jpintel.db
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Unable to snapshot /data/jpintel.db after 5 attempts."
              exit 1
            fi
            sleep_seconds=$((attempt * 30))
            echo "::warning::jpintel.db snapshot attempt ${attempt} failed; retrying in ${sleep_seconds}s."
            sleep "$sleep_seconds"
          done
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Build docs (MkDocs Material → site/docs/)
        # strict: fail on broken internal links / missing nav entries.
        # This is the primary quality gate against [text](link.md) drift.
        run: mkdocs build --strict

      - name: Regenerate generated public artifacts
        if: steps.generated-data.outputs.available == 'true'
        run: |
          set -euo pipefail
          python scripts/generate_program_pages.py \
            --db data/jpintel.db \
            --out site/programs \
            --domain jpcite.com \
            --sitemap site/sitemap-programs.xml \
            --tiers S,A,B,C \
            --verbose
          python scripts/generate_prefecture_pages.py \
            --db data/jpintel.db \
            --out site/prefectures \
            --domain jpcite.com \
            --sitemap site/sitemap-prefectures.xml
          python scripts/generate_geo_industry_pages.py \
            --db data/jpintel.db \
            --out site/audiences \
            --domain jpcite.com \
            --sitemap site/sitemap-audiences.xml
          python scripts/regen_llms_full.py --db data/jpintel.db --out site/llms-full.txt
          python scripts/regen_llms_full_en.py --db data/jpintel.db --out site/llms-full.en.txt
          python scripts/generate_public_counts.py
          python scripts/regen_structured_sitemap_and_llms_meta.py
          python scripts/sitemap_gen.py --site-dir site --domain jpcite.com

      - name: GEO readiness guard
        if: steps.generated-data.outputs.available == 'true'
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          python scripts/check_geo_readiness.py

      - name: Prepare public artifact
        if: steps.generated-data.outputs.available == 'true'
        run: |
          rm -rf dist/site
          mkdir -p dist
          # site/structured/ JSON-LD shards retired 2026-05-03; the public
          # sitemap-structured.xml shard is regenerated above for crawler
          # discovery before sitemap-index.xml is assembled.
          # The CF Pages 20k-file limit no longer requires the old
          # site/structured/ --exclude trick.
          rsync -a --delete \
            --exclude '_templates/' \
            --exclude '*.src.js' \
            --exclude '*.src.css' \
            --exclude '*.map' \
            --include 'press/*.md' \
            --include 'security/policy.md' \
            --include 'tools/' \
            --include 'tools/*.md' \
            --include 'laws/index.html' \
            --include 'cases/index.html' \
            --include 'enforcement/index.html' \
            --exclude 'laws/*.html' \
            --exclude 'cases/*.html' \
            --exclude 'enforcement/*.html' \
            --exclude '*.md' \
            site/ dist/site/
          file_count="$(find dist/site -type f | wc -l | tr -d ' ')"
          echo "file count: ${file_count}"
          if [ "$file_count" -gt 19000 ]; then
            echo "::error::Cloudflare Pages artifact has ${file_count} files; limit is 20,000."
            exit 1
          fi

      - name: Check Cloudflare Pages secrets
        id: cf-secrets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GENERATED_DATA_AVAILABLE: ${{ steps.generated-data.outputs.available }}
        run: |
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ACCOUNT_ID:-}" ] || [ "${GENERATED_DATA_AVAILABLE:-false}" != "true" ]; then
            echo "::notice::CF_API_TOKEN, CF_ACCOUNT_ID, or FLY_API_TOKEN is not configured; skipping GitHub-hosted Pages deploy."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Cloudflare Pages
        if: steps.cf-secrets.outputs.available == 'true' && github.ref_name != 'main'
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: autonomath
          directory: dist/site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Branch name drives Pages' preview vs production routing:
          #   main        → production (fallback.<domain>)
          #   release/*   → preview deployments for pre-launch drills
          branch: ${{ github.ref_name }}
