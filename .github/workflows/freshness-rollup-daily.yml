name: freshness-rollup-daily

# Wave 37 — daily cron freshness rollup + SLA breach detect.
#
# Schedule: 01:00 UTC == 10:00 JST. Sits AFTER all Lane A / B / C daily
# crons (latest = 00:00 UTC invoice-diff). Reads gh CLI run history +
# SQLite MAX(last_verified) per cron's target tables, writes the daily
# snapshot to analytics/, then runs the SLA breach detector against the
# fresh snapshot.
#
# LLM call count: 0 (production cron gate forbids it).

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, do not write the snapshot file"
        required: false
        default: "false"

concurrency:
  group: freshness-rollup-daily
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  rollup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps (stdlib only — no runtime install needed)
        run: |
          python --version
          which gh && gh --version || echo "gh CLI not present; rollup will mark gh_unavailable"

      - name: Verify schedule drift (canonical doc vs workflow files)
        run: |
          python scripts/cron/rollup_freshness_daily.py --verify-schedule

      - name: Run freshness rollup
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/cron/rollup_freshness_daily.py --dry-run
          else
            python scripts/cron/rollup_freshness_daily.py
          fi

      - name: Detect SLA breaches
        run: |
          python scripts/cron/detect_freshness_sla_breach.py \
            --snapshot analytics/freshness_rollup_latest.json

      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freshness-rollup-${{ github.run_id }}
          path: |
            analytics/freshness_rollup_*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Commit snapshot (best-effort)
        if: github.event_name == 'schedule'
        run: |
          if [ -f analytics/freshness_rollup_latest.json ]; then
            git config user.name "jpcite-bot"
            git config user.email "info@bookyou.net"
            git add analytics/freshness_rollup_*.json || true
            if git diff --staged --quiet; then
              echo "no snapshot drift"
            else
              git commit -m "chore(freshness): daily rollup snapshot $(date -u +%Y-%m-%d)" \
                -m "Generated by .github/workflows/freshness-rollup-daily.yml"
              git push || echo "push skipped (read-only token)"
            fi
          fi
