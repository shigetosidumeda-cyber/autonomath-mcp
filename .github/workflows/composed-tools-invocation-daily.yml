name: composed-tools-invocation-daily

# Wave 49 G3 — AX Layer 5 cron #3 / Dim P composed_tools.
#
# Daily re-seed of the 4 canonical composed-tool definitions into
# am_composed_tool_catalog (mig 276). Idempotent — re-running on an
# already-seeded catalog is a no-op except for refreshing the
# last_verified_at column. The composed tools wrap atomic-tool
# chains into single metered calls (7 call -> 1 call cost saving).
#
# Invokes: scripts/etl/seed_composed_tools.py (Wave 47).
# Pure stdlib + sqlite3, LLM API 0 (feedback_no_operator_llm_api).

on:
  schedule:
    # 02:40 UTC == 11:40 JST. After session-context-daily (02:25).
    - cron: "40 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, plan only (no DB writes)"
        required: false
        default: "true"

concurrency:
  group: composed-tools-invocation-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Local dry-run probe (no production DB)
        run: |
          set -euo pipefail
          python scripts/etl/seed_composed_tools.py \
            --dry-run \
            --db "$RUNNER_TEMP/wave49-g3-nonprod-missing.db"

      - name: Install flyctl
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run composed-tools re-seed on Fly production DB
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PROD_DB_MUTATION_OPERATOR_ACK: ${{ secrets.PROD_DB_MUTATION_OPERATOR_ACK }}
        run: |
          set -euo pipefail
          FLAGS="--db /data/autonomath.db"
          if [ "${DRY_RUN}" = "true" ]; then
            FLAGS="--dry-run ${FLAGS}"
          elif [ "${PROD_DB_MUTATION_OPERATOR_ACK:-}" != "I_ACK_PROD_DB_MUTATION" ]; then
            echo "::warning::Production DB mutation requires PROD_DB_MUTATION_OPERATOR_ACK=I_ACK_PROD_DB_MUTATION; forcing --dry-run."
            FLAGS="--dry-run ${FLAGS}"
          fi
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/etl/seed_composed_tools.py ${FLAGS}"
