name: houjin-risk-score-daily

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry run only"
        required: false
        default: "false"
      max_houjin:
        description: "cap"
        required: false
        default: "200000"

permissions:
  contents: read

concurrency:
  group: houjin-risk-score-daily
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: run
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          MAX="--max-houjin ${{ inputs.max_houjin || '200000' }}"
          if [ ! -s "$AUTONOMATH_DB_PATH" ]; then
            python scripts/cron/refresh_houjin_risk_score_daily.py --autonomath-db "$AUTONOMATH_DB_PATH" --dry-run --max-houjin 5
            exit 0
          fi
          python scripts/cron/refresh_houjin_risk_score_daily.py --autonomath-db "$AUTONOMATH_DB_PATH" $DRY $MAX
