name: session-context-daily

# Wave 49 G3 — AX Layer 5 cron #2 / Dim L session_context.
#
# Daily TTL purge for the Dim L audit layer
# (am_session_context + am_session_step_log). Marks expired rows,
# deletes rows older than 7 days, drops orphaned step rows. The REST
# surface /v1/session/{open,step,close} is untouched (in-process LRU).
#
# Invokes: scripts/etl/clean_session_context_expired.py (Wave 47).
# Pure stdlib + sqlite3, LLM API 0 (feedback_no_operator_llm_api).

on:
  schedule:
    # 02:25 UTC == 11:25 JST. After predictive-events-daily (02:10).
    - cron: "25 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, plan only (no DB writes)"
        required: false
        default: "true"

concurrency:
  group: session-context-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Local dry-run probe (no production DB)
        run: |
          set -euo pipefail
          python scripts/etl/clean_session_context_expired.py \
            --dry-run \
            --db "$RUNNER_TEMP/wave49-g3-nonprod-missing.db"

      - name: Install flyctl
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run TTL purge on Fly production DB
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PROD_DB_MUTATION_OPERATOR_ACK: ${{ secrets.PROD_DB_MUTATION_OPERATOR_ACK }}
        run: |
          set -euo pipefail
          FLAGS="--db /data/autonomath.db"
          if [ "${DRY_RUN}" = "true" ]; then
            FLAGS="--dry-run ${FLAGS}"
          elif [ "${PROD_DB_MUTATION_OPERATOR_ACK:-}" != "I_ACK_PROD_DB_MUTATION" ]; then
            echo "::warning::Production DB mutation requires PROD_DB_MUTATION_OPERATOR_ACK=I_ACK_PROD_DB_MUTATION; forcing --dry-run."
            FLAGS="--dry-run ${FLAGS}"
          fi
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/etl/clean_session_context_expired.py ${FLAGS}"
