name: kokkai-shingikai-weekly

# DEEP-39: 国会会議録 + 12 council 議事録 weekly ingest cron.
#
# Schedule: 21:00 UTC Sunday == 06:00 JST Monday.
# Window choice: kokkai.ndl.go.jp / 各省 sites are typically idle during
# weekend overnight, and a Monday morning JST landing means the regulatory
# signal layer is fresh by the start of business in Japan.
#
# LLM call count: 0. Pure regex + httpx + pdfplumber + sqlite3.
#
# Required secrets:
#   GITHUB_TOKEN        (auto, for issue creation on failure)

on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:
    inputs:
      weeks:
        description: "Days back from MAX(date) for kokkai delta (default: 1)"
        required: false
        default: "1"
      dry_run:
        description: "If true, fetch+parse only, no DB writes"
        required: false
        default: "false"

concurrency:
  group: kokkai-shingikai-weekly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pdfplumber pyyaml

      - name: Run kokkai weekly ingest
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_WEEKS: ${{ github.event.inputs.weeks }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          WEEKS="${INPUT_WEEKS:-1}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/cron/ingest_kokkai_weekly.py \
            --weeks "${WEEKS}" \
            ${DRY_FLAG}

      - name: Run shingikai weekly ingest
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/cron/ingest_shingikai_weekly.py \
            ${DRY_FLAG}

      - name: Open issue on driver failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `kokkai-shingikai-weekly failed ${new Date().toISOString()}`,
              body: `Run: ${runUrl}\n\nLikely causes: kokkai.ndl.go.jp 5xx, council DOM change, pdfplumber install failure, or autonomath.db lock contention. See scripts/cron/ingest_kokkai_weekly.py + ingest_shingikai_weekly.py docstrings.`,
              labels: ["ingest-failure", "automation"],
            });
