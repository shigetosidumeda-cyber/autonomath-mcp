name: predictive-events-daily

# Wave 49 G3 — AX Layer 5 cron #1 / Dim K predictive_service.
#
# Daily ETL pass that materialises the predictive notification queue
# (am_predictive_alert_log) from am_amendment_diff via the three watch
# types (houjin / program / amendment). 24h TTL purge included in the
# same script.
#
# Invokes: scripts/etl/build_predictive_watch_v2.py (Wave 47 ETL,
# already in main). Stdlib + sqlite3 only, LLM API 0
# (feedback_no_operator_llm_api).

on:
  schedule:
    # 02:10 UTC == 11:10 JST. Tail of Lane A daily window.
    - cron: "10 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, plan only (no DB writes)"
        required: false
        default: "true"

concurrency:
  group: predictive-events-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Local dry-run probe (no production DB)
        run: |
          set -euo pipefail
          python scripts/etl/build_predictive_watch_v2.py \
            --dry-run \
            --db "$RUNNER_TEMP/wave49-g3-nonprod-missing.db"

      - name: Install flyctl
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run predictive watch ETL on Fly production DB
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PROD_DB_MUTATION_OPERATOR_ACK: ${{ secrets.PROD_DB_MUTATION_OPERATOR_ACK }}
        run: |
          set -euo pipefail
          FLAGS="--db /data/autonomath.db"
          if [ "${DRY_RUN}" = "true" ]; then
            FLAGS="--dry-run ${FLAGS}"
          elif [ "${PROD_DB_MUTATION_OPERATOR_ACK:-}" != "I_ACK_PROD_DB_MUTATION" ]; then
            echo "::warning::Production DB mutation requires PROD_DB_MUTATION_OPERATOR_ACK=I_ACK_PROD_DB_MUTATION; forcing --dry-run."
            FLAGS="--dry-run ${FLAGS}"
          fi
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/etl/build_predictive_watch_v2.py ${FLAGS}"
