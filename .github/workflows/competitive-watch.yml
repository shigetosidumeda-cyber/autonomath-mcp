name: competitive-watch

# Daily scan of competitor / adjacent URLs, diff against yesterday's snapshot,
# and open a PR with the appended research/competitive_log_YYYYMM.md when
# diffs are found. Slack notification (HIGH severity only) if
# SLACK_WEBHOOK_COMPETITIVE is set.
#
# Design in docs/competitive_watch.md.
#
# Optional secrets:
#   SLACK_WEBHOOK_COMPETITIVE  Incoming webhook for HIGH alerts.
#   GH_PAT_WATCH               Personal access token (fine-grained, public
#                              repo read) to raise GitHub API rate limits.
#
# All optional. Workflow is fail-open: if a secret is missing or a host is
# down, we still run and attempt to write the log.

on:
  schedule:
    # 09:00 UTC == 18:00 JST. Aligns with the design in docs/competitive_watch.md.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

concurrency:
  group: competitive-watch
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx readability-lxml feedparser

      - name: Restore snapshot cache
        id: cache-snapshots
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: data/competitive_watch
          key: competitive-watch-snapshots-v1-${{ github.run_id }}
          restore-keys: |
            competitive-watch-snapshots-v1-

      - name: Compute log path
        id: logpath
        run: |
          echo "path=research/competitive_log_$(date -u +%Y%m).md" >> "$GITHUB_OUTPUT"
          echo "branch=competitive-watch/$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Run competitive watch
        env:
          SLACK_WEBHOOK_COMPETITIVE: ${{ secrets.SLACK_WEBHOOK_COMPETITIVE }}
          GH_PAT_WATCH: ${{ secrets.GH_PAT_WATCH }}
        run: |
          set +e
          python scripts/competitive_watch.py \
            --out "${{ steps.logpath.outputs.path }}" \
            --snapshots data/competitive_watch \
            -v
          rc=$?
          # fail-open: even a partial failure must not mark the job red.
          if [ "$rc" -ne 0 ]; then
            echo "::warning::competitive_watch.py exited $rc (fail-open)"
          fi
          exit 0

      - name: Save snapshot cache
        if: always()
        uses: actions/cache/save@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: data/competitive_watch
          key: competitive-watch-snapshots-v1-${{ github.run_id }}

      - name: Detect log diff
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- "${{ steps.logpath.outputs.path }}" 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with log diff
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(watch): daily competitive log $(date -u +%Y-%m-%d)"
          title: "Competitive watch: ${{ steps.logpath.outputs.branch }}"
          body: |
            Auto-generated by `.github/workflows/competitive-watch.yml`.

            Review the appended section of `${{ steps.logpath.outputs.path }}`.
            HIGH-severity entries should trigger the Friday weekly-review
            decision step (see `docs/competitive_watch.md` section 4).

            Merge only after human review. Do **not** auto-merge.
          branch: ${{ steps.logpath.outputs.branch }}
          base: main
          delete-branch: true
          labels: |
            competitive-watch
            automation
          add-paths: |
            research/competitive_log_*.md
