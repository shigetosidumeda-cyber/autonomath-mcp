name: stripe-backfill-30min

# Stripe usage_events backfill cron (M1 - Billing/Infra Block).
#
# What this does
# --------------
# Every 30 minutes, runs scripts/cron/stripe_usage_backfill.py against the
# Fly autonomath-api machine. The script scans usage_events for rows whose
# stripe_synced_at IS NULL (typically caused by a SIGTERM during a Fly
# rolling deploy landing between local INSERT and the in-flight Stripe POST)
# and enqueues them onto bg_task_queue with a stable dedup_key. The async
# worker (api/_bg_task_worker.py:_handle_stripe_usage_sync) reposts them
# to Stripe with the original billing_idempotency_key so duplicate-pay is
# impossible.
#
# Why 30 min
# ----------
# A 30-min cadence with --max-events 1000 absorbs 48,000 events/day - 2 OOM
# above realistic post-launch backlog. Tighter cadence increases SQLite
# writer-lock contention with the hot path; wider gives a misroute hours
# of revenue leak before reconcile catches it. See
# scripts/cron/stripe_usage_backfill.py docstring for the full rationale.
#
# Required GitHub repository secret
# ---------------------------------
#   FLY_API_TOKEN   Fly.io deploy token with ssh access to autonomath-api.

on:
  schedule:
    # 5,35 * * * * == every 30 min, offset +5 min from the :00/:30 boundary.
    # Offset from same-day-push-cron (*/30 == :00/:30) to avoid runner
    # contention (W14-12 audit). Still misses :15 (idempotency-sweep)
    # and :05 was reused intentionally — morning-briefing runs daily, not
    # */30, so the runner overlap is once per day rather than every half hour.
    - cron: "5,35 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run with --dry-run (no enqueue, just count)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: stripe-backfill-30min
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run stripe usage backfill on Fly machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::notice::FLY_API_TOKEN unset; skipping stripe-backfill-30min."
            exit 0
          fi
          DRY_RUN="${DRY_RUN_INPUT:-false}"
          FLAGS=""
          if [ "${DRY_RUN}" = "true" ]; then
            FLAGS="${FLAGS} --dry-run"
          fi
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/cron/stripe_usage_backfill.py ${FLAGS}"
