name: sitemap_freshness_v3
on:
  workflow_dispatch: {}

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Check sitemap freshness
        run: python scripts/check_sitemap_freshness.py
