name: sitemap_freshness_v3
on:
  workflow_dispatch: {}


concurrency:
  # Wave 43 noise reduction (2026-05-12): serialize same-ref runs.
  group: sitemap-freshness-v3-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Check sitemap freshness
        run: python scripts/check_sitemap_freshness.py
