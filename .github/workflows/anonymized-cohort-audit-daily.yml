name: anonymized-cohort-audit-daily

# Wave 49 G3 — AX Layer 5 cron #5 / Dim N anonymized_query.
#
# Nightly rebuild of am_aggregated_outcome_view (mig 274) under
# strict k-anonymity floor (k>=5). PII strip: only the cohort
# triple (industry_jsic_major / region_code / size_bucket) survives.
# No houjin_bangou, no company_name, no contact info ever lands
# in the view. The 1M-entity statistics layer is the long-term
# moat (feedback_anonymized_query_pii_redact).
#
# Invokes: scripts/etl/aggregate_anonymized_outcomes.py (Wave 47).
# Pure SQL aggregation + stdlib, LLM API 0
# (feedback_no_operator_llm_api).

on:
  schedule:
    # 03:10 UTC == 12:10 JST. After daily Lane A window.
    - cron: "10 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, report only (no view rebuild)"
        required: false
        default: "true"

concurrency:
  group: anonymized-cohort-audit-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Local dry-run probe (no production DB)
        run: |
          set -euo pipefail
          python scripts/etl/aggregate_anonymized_outcomes.py \
            --dry-run \
            --db "$RUNNER_TEMP/wave49-g3-nonprod-missing.db"

      - name: Install flyctl
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run k>=5 cohort aggregation on Fly production DB
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PROD_DB_MUTATION_OPERATOR_ACK: ${{ secrets.PROD_DB_MUTATION_OPERATOR_ACK }}
        run: |
          set -euo pipefail
          FLAGS="--db /data/autonomath.db"
          if [ "${DRY_RUN}" = "true" ]; then
            FLAGS="--dry-run ${FLAGS}"
          elif [ "${PROD_DB_MUTATION_OPERATOR_ACK:-}" != "I_ACK_PROD_DB_MUTATION" ]; then
            echo "::warning::Production DB mutation requires PROD_DB_MUTATION_OPERATOR_ACK=I_ACK_PROD_DB_MUTATION; forcing --dry-run."
            FLAGS="--dry-run ${FLAGS}"
          fi
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/etl/aggregate_anonymized_outcomes.py ${FLAGS}"
