name: refresh-sources-weekly

# MASTER_PLAN_v1 章 3 §D3:
#   tier B/C weekly verify pass — same HEAD → 200 → GET → SHA256 +
#   source_verified_at bump as the daily S/A job, but on the long tail.
#   B (~4,200 rows) + C (~6,000 rows) ≈ 10,200 rows; per-tier concurrency
#   cap kicks in (B=8, C=5) so wall clock is ~75-100 min.
#
#   Pure SQLite + httpx; no LLM calls (memory `feedback_no_operator_llm_api`).
#
# Cadence: 18:00 UTC every Sunday == 03:00 JST every Monday. Cleanly
# avoids Monday morning org traffic on municipal portals (most public-
# sector hosts auto-publish on Monday at 09:00 JST → we want to be done
# before that).

on:
  schedule:
    # 03:00 JST Monday (18:00 UTC Sunday).
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      tier:
        description: "Tier filter (default 'B,C'; allow 'B' or 'C' for partial reruns)."
        required: false
        default: 'B,C'
      dry_run:
        description: "If true, --dry-run (no DB writes; report only)."
        required: false
        default: 'false'
      max_rows:
        description: "Optional row cap for smoke tests (default unset)."
        required: false
        default: ''

permissions:
  contents: read
  issues: write   # for the tier-C dead-URL alert path inside refresh_sources.py.

concurrency:
  group: refresh-sources-weekly
  cancel-in-progress: false

jobs:
  refresh-bc:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install package
        run: pip install -e .

      - name: Run B/C liveness pass
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TIER: ${{ github.event.inputs.tier }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_MAX_ROWS: ${{ github.event.inputs.max_rows }}
        run: |
          set -euo pipefail
          TIER="${INPUT_TIER:-B,C}"
          ARGS=(--tier "${TIER}")
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "${INPUT_MAX_ROWS:-}" ]; then
            ARGS+=(--max-rows "${INPUT_MAX_ROWS}")
          fi
          python scripts/refresh_sources.py "${ARGS[@]}"

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: refresh-sources-weekly-BC
          path: |
            data/refresh_sources_report.json
            data/source_freshness_report.json

      # Same caveat as the daily workflow: CI writes to the in-repo dev
      # mirror DB; Fly's volume DB is updated separately by
      # `scripts/cron/refresh_sources_nightly.sh` running on-machine.
