name: parquet-export-monthly
# Monthly Parquet corpus export (jpcite-as-data, Wave 16 D5).
#
# Runs export_parquet_corpus.py + sla_breach_refund.py as a single monthly
# job because both depend on the previous-month aggregate window. The
# corpus build pulls autonomath.db (~9.4 GB) and jpintel.db (~352 MB) off
# the Fly machine via `flyctl ssh sftp get`, generates a ~1 GB Parquet,
# uploads it to Cloudflare R2, then runs the SLA breach detector against
# the previous-month aggregate JSON shipped by the RUM aggregator.
#
# License compliance: per-table license metadata is embedded in the
# Parquet schema_metadata + a sidecar `.license.json` manifest. The
# table license vocabulary mirrors `am_source.license` (CC-BY-4.0 / PDL
# v1.0 / gov_standard_v2 / public_domain / individual / mixed). See
# site/data-licensing.html for the human-readable summary.
#
# RPO: monthly export is for downstream distribution, not DR. Daily R2
# backup (weekly-backup-autonomath.yml) is the DR substrate.
#
# Why we run SLA refund here, not in a dedicated workflow:
#   Both need previous-month aggregate, both need Stripe creds, both
#   are zero-touch monthly cadences. Bundling halves the workflow
#   bookkeeping surface without coupling — each step has independent
#   exit codes and the job continues on partial failure.

on:
  schedule:
    # 02:30 UTC on the 1st of every month == 11:30 JST. After the
    # daily 04:00 UTC autonomath.db backup but before business hours,
    # so flyctl ssh contention is minimal.
    - cron: "30 2 1 * *"
  workflow_dispatch:
    inputs:
      period:
        description: "YYYY-MM (default = previous month JST)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run (build but skip R2 upload + Stripe write)"
        required: false
        default: "false"

concurrency:
  group: parquet-export-monthly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (pyarrow + sqlite)
        run: |
          python -m pip install --upgrade pip
          pip install pyarrow stripe

      - name: Install flyctl + rclone
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH
          curl -sSf https://rclone.org/install.sh | sudo bash

      - name: Hydrate autonomath.db + jpintel.db from Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          mkdir -p data
          # Best-effort hydrate. If the volume DB is too large for the
          # runner (autonomath.db ~9.4 GB), gracefully degrade to
          # smaller jpintel-only export rather than failing the job.
          if [ -n "$FLY_API_TOKEN" ]; then
            rm -f data/jpintel.db
            flyctl ssh sftp get /data/jpintel.db data/jpintel.db -a autonomath-api || true
            rm -f autonomath.db
            flyctl ssh sftp get /data/autonomath.db autonomath.db -a autonomath-api || true
          fi
          ls -la data/ autonomath.db 2>/dev/null || true

      - name: Smoke probe (row-limited, no upload)
        env:
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          python scripts/cron/export_parquet_corpus.py --smoke --verbose
          ls -la /tmp/jpcite_parquet_export/

      - name: Build Parquet corpus (full)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          JPINTEL_DB_PATH: ${{ github.workspace }}/data/jpintel.db
          PARQUET_LOCAL_DIR: ${{ github.workspace }}/build/parquet
        run: |
          python scripts/cron/export_parquet_corpus.py \
            --period "${{ github.event.inputs.period }}" \
            --dry-run \
            --verbose

      - name: Upload Parquet corpus to Cloudflare R2
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          JPINTEL_DB_PATH: ${{ github.workspace }}/data/jpintel.db
          PARQUET_LOCAL_DIR: ${{ github.workspace }}/build/parquet
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: autonomath-exports
        run: |
          python scripts/cron/export_parquet_corpus.py \
            --period "${{ github.event.inputs.period }}" \
            --verbose

      - name: SLA breach detection + Stripe credit notes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          JPINTEL_DB_PATH: ${{ github.workspace }}/data/jpintel.db
          SLA_AGGREGATE_DIR: ${{ github.workspace }}/monitoring/sla_aggregates
        run: |
          # Best-effort: aggregate file may not exist on first run.
          python scripts/cron/sla_breach_refund.py --verbose || rc=$?
          if [ "${rc:-0}" = "2" ]; then
            echo "sla_breach_refund.no_aggregate — first-run noop"
            exit 0
          fi
          exit ${rc:-0}

      - name: Upload artifacts on success
        if: ${{ always() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: parquet-export-${{ github.run_id }}
          path: |
            /tmp/jpcite_parquet_export/*.README.md
            /tmp/jpcite_parquet_export/*.license.json
            /tmp/jpcite_parquet_export/*.sha256
          if-no-files-found: warn
          retention-days: 30
