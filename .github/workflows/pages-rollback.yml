name: pages-rollback

# Manual rollback of the Cloudflare Pages release capsule pointer.
#
# Triggering:
#   GitHub UI -> Actions -> pages-rollback -> Run workflow
#   Required input: previous_capsule_id (e.g. rc0-previous-2026-05-14)
#
# This workflow:
#   1. Checks out main.
#   2. Rewrites site/releases/current/runtime_pointer.json via
#      scripts/ops/rollback_capsule.sh (Python json round-trip + atomic mv).
#   3. Opens a PR with the rewritten pointer + an auto-generated body so a
#      human reviewer signs off before Cloudflare Pages picks it up on merge.
#   4. After PR creation, runs scripts/ops/post_deploy_smoke.sh against the
#      live site as a courtesy probe — this surfaces whether the CURRENT
#      production pointer is healthy BEFORE the rollback merges. It does
#      NOT validate the rollback itself (that happens post-merge via the
#      main deploy workflow's own smoke gate).
#
# Safety:
#   - The workflow never force-pushes to main; it always goes through a PR.
#   - Concurrency group is single-flight so two operators cannot race.

on:
  workflow_dispatch:
    inputs:
      previous_capsule_id:
        description: "Capsule id to roll back to (e.g. rc0-previous-2026-05-14)"
        required: true
        type: string
      reason:
        description: "Short human-readable rollback reason (free text)"
        required: false
        type: string
        default: "(no reason provided)"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-rollback
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show requested rollback target
        run: |
          echo "previous_capsule_id: ${{ inputs.previous_capsule_id }}"
          echo "reason: ${{ inputs.reason }}"

      - name: List available capsules (pre-flight)
        run: bash scripts/ops/list_capsules.sh

      - name: Rewrite runtime_pointer.json
        run: bash scripts/ops/rollback_capsule.sh "${{ inputs.previous_capsule_id }}"

      - name: Diff after rewrite
        run: |
          git --no-pager diff -- site/releases/current/runtime_pointer.json || true

      - name: Open rollback PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="ops/rollback-$(date -u +%Y%m%d-%H%M%S)-${{ inputs.previous_capsule_id }}"
          BRANCH="${BRANCH//[^a-zA-Z0-9_./-]/-}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add site/releases/current/runtime_pointer.json
          if git diff --cached --quiet; then
            echo "no pointer changes — nothing to roll back" >&2
            exit 1
          fi
          git commit -m "ops: rollback Pages capsule -> ${{ inputs.previous_capsule_id }}"
          git push -u origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "ops: rollback Pages capsule -> ${{ inputs.previous_capsule_id }}" \
            --body "Manual Cloudflare Pages capsule rollback.\n\n- previous_capsule_id: ${{ inputs.previous_capsule_id }}\n- reason: ${{ inputs.reason }}\n- triggered by: @${{ github.actor }}\n\nMerge this PR to flip the active pointer. The main deploy workflow's post-deploy smoke gate will validate the rollback once Cloudflare Pages picks up the new asset.\n\nGenerated by .github/workflows/pages-rollback.yml"

      - name: Post-rollback courtesy smoke (against current live)
        # This probes the current live site before merge so the operator can
        # see whether prod is responding at all. It does NOT gate the PR.
        continue-on-error: true
        run: bash scripts/ops/post_deploy_smoke.sh https://jpcite.com
