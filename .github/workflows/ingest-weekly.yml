name: ingest-weekly

# Weekly ingest of Tier 2 authorities (MAFF / METI main / JFC / noukaweb
# rehost). Runs ON the Fly production machine — see docs/ingest_automation.md.
#
# Required secrets: FLY_API_TOKEN
# Optional secrets: SLACK_WEBHOOK_INGEST

on:
  schedule:
    # 20:20 UTC Sunday == 05:20 JST Monday. Light-traffic morning.
    # Staggered +20 min vs billing-health-cron (0 20 *) which also
    # ssh-es into Fly daily — picks up Sunday's intersection.
    - cron: "20 20 * * 0"
  workflow_dispatch:
    inputs:
      authority:
        description: "Run only this authority (blank = all Tier-2)"
        required: false
        default: ""
      dry_run:
        description: "dry-run (no DB writes)"
        required: false
        default: "false"

concurrency:
  group: ingest-weekly
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TIER: weekly
      SENTRY_RELEASE: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "latest"

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run ingest on Fly machine
        id: run
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          INPUT_AUTHORITY: ${{ github.event.inputs.authority }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail

          ARGS="$TIER"
          if [ -n "${INPUT_AUTHORITY:-}" ]; then
            ARGS="$ARGS --authority $INPUT_AUTHORITY"
          fi
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          set +e
          flyctl ssh console -a autonomath-api -C \
            "env SENTRY_RELEASE=${SENTRY_RELEASE} \
              /opt/venv/bin/python /app/scripts/ingest_tier.py $ARGS" \
            | tee ingest.out
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            echo "::error::ingest_tier.py exited $rc"
            exit 1
          fi

      - name: Pull ingest_log.jsonl diff off Fly machine
        if: success()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          flyctl ssh sftp get /data/ingest_log.jsonl -a autonomath-api \
            || echo "::warning::no /data/ingest_log.jsonl yet"
          if [ -f ingest_log.jsonl ]; then
            mv ingest_log.jsonl data/ingest_log.jsonl
          fi

      - name: Detect log diff
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- data/ingest_log.jsonl 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with ingest_log diff
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: "chore(ingest): weekly log $(date -u +%Y-%m-%d)"
          title: "Ingest weekly log: $(date -u +%Y-%m-%d)"
          body: |
            Auto-generated by `.github/workflows/ingest-weekly.yml`.

            Review `data/ingest_log.jsonl` diff. DB itself lives on the Fly
            volume only.
          branch: ingest-weekly/${{ github.run_id }}
          base: main
          delete-branch: true
          labels: |
            ingest
            automation
          add-paths: |
            data/ingest_log.jsonl

      - name: Open issue on driver failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY="Tier: \`weekly\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nSHA: \`${{ github.sha }}\`\n\nCheck \`docs/incident_runbook.md\` Section I.\n"
          gh issue create \
            --title "ingest-weekly failed on $(date -u +%Y-%m-%d)" \
            --label ingest-failure \
            --label automation \
            --body "$BODY"

      - name: Slack notify on driver failure
        if: failure() && env.SLACK_WEBHOOK_INGEST != ''
        env:
          SLACK_WEBHOOK_INGEST: ${{ secrets.SLACK_WEBHOOK_INGEST }}
        run: |
          set -euo pipefail
          curl -fsS -X POST -H 'content-type: application/json' \
            --data "{\"text\":\":warning: ingest-weekly driver failure — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_INGEST" || true
