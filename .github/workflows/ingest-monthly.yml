name: ingest-monthly

# Monthly ingest of Tier 3 authorities (47 都道府県 + sampled 市区町村 +
# g-reiki). Monthly slot rotation (month_slot = run_number % 4) spreads the
# 3,333 municipalities across 4 months so each job stays inside the 4-hour
# GHA budget. See docs/ingest_automation.md.
#
# Required secrets: FLY_API_TOKEN
# Optional secrets: SLACK_WEBHOOK_INGEST

on:
  schedule:
    # 21:20 UTC 1st of month == 06:20 JST 1st of month. Staggered +20 min
    # vs kpi-digest-cron (0 21 *) and saved-searches-cron (10 21 *) which
    # also ssh into Fly daily.
    - cron: "20 21 1 * *"
  workflow_dispatch:
    inputs:
      authority:
        description: "Run only this authority (blank = all Tier-3)"
        required: false
        default: ""
      month_slot:
        description: "Override municipality rotation slot (0..3)"
        required: false
        default: ""
      dry_run:
        description: "dry-run (no DB writes)"
        required: false
        default: "false"

concurrency:
  group: ingest-monthly
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    # 4h upper bound per the plan. Monthly has to cover ~500 netlocs so this
    # is the only tier that actually needs the ceiling.
    timeout-minutes: 240
    env:
      TIER: monthly
      SENTRY_RELEASE: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "latest"

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Compute month slot
        id: slot
        env:
          INPUT_SLOT: ${{ github.event.inputs.month_slot }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_SLOT:-}" ]; then
            SLOT="$INPUT_SLOT"
          else
            # run_number monotonically increases; modulo 4 gives stable rotation.
            SLOT=$(( ${{ github.run_number }} % 4 ))
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"

      - name: Run ingest on Fly machine
        id: run
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          INPUT_AUTHORITY: ${{ github.event.inputs.authority }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          MONTH_SLOT: ${{ steps.slot.outputs.slot }}
        run: |
          set -euo pipefail

          ARGS="$TIER --month-slot $MONTH_SLOT"
          if [ -n "${INPUT_AUTHORITY:-}" ]; then
            ARGS="$ARGS --authority $INPUT_AUTHORITY"
          fi
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          set +e
          flyctl ssh console -a autonomath-api -C \
            "env SENTRY_RELEASE=${SENTRY_RELEASE} \
              /opt/venv/bin/python /app/scripts/ingest_tier.py $ARGS" \
            | tee ingest.out
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            echo "::error::ingest_tier.py exited $rc"
            exit 1
          fi

      - name: Pull ingest_log.jsonl diff off Fly machine
        if: success()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          flyctl ssh sftp get /data/ingest_log.jsonl -a autonomath-api \
            || echo "::warning::no /data/ingest_log.jsonl yet"
          if [ -f ingest_log.jsonl ]; then
            mv ingest_log.jsonl data/ingest_log.jsonl
          fi

      - name: Detect log diff
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- data/ingest_log.jsonl 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with ingest_log diff
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(ingest): monthly log $(date -u +%Y-%m-%d) slot=${{ steps.slot.outputs.slot }}"
          title: "Ingest monthly log: $(date -u +%Y-%m-%d) (slot ${{ steps.slot.outputs.slot }})"
          body: |
            Auto-generated by `.github/workflows/ingest-monthly.yml`.

            Slot: `${{ steps.slot.outputs.slot }}` (municipality rotation).

            Review `data/ingest_log.jsonl` diff. DB writes landed on the
            Fly volume only.
          branch: ingest-monthly/${{ github.run_id }}
          base: main
          delete-branch: true
          labels: |
            ingest
            automation
          add-paths: |
            data/ingest_log.jsonl

      - name: Open issue on driver failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY="Tier: \`monthly\` (slot ${{ steps.slot.outputs.slot }})\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nSHA: \`${{ github.sha }}\`\n\nCheck \`docs/incident_runbook.md\` Section I.\n"
          gh issue create \
            --title "ingest-monthly failed on $(date -u +%Y-%m-%d)" \
            --label ingest-failure \
            --label automation \
            --body "$BODY"

      - name: Slack notify on driver failure
        if: failure() && env.SLACK_WEBHOOK_INGEST != ''
        env:
          SLACK_WEBHOOK_INGEST: ${{ secrets.SLACK_WEBHOOK_INGEST }}
        run: |
          set -euo pipefail
          curl -fsS -X POST -H 'content-type: application/json' \
            --data "{\"text\":\":warning: ingest-monthly driver failure — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_INGEST" || true
