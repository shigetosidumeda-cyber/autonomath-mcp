name: jpo-patents-daily

# Wave 31 Axis 1b.
#
# Daily JPO 特許/実用新案 ingest cron.
#
# Schedule: 23:00 UTC = 08:00 JST.
# J-PlatPat 公開・登録公報の更新は AM 中に完了するので、
# 朝 08:00 JST に前日分を取りに行く。
#
# LLM call count: 0. Pure lxml + httpx + sqlite3.

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Days back (default 1)."
        required: false
        default: "1"
      limit:
        description: "Max rows per run (default 500)."
        required: false
        default: "500"
      target:
        description: "patents | utility_models | both"
        required: false
        default: "both"
      dry_run:
        description: "If true, fetch+parse only, no DB writes."
        required: false
        default: "false"

concurrency:
  group: jpo-patents-daily
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply migration 226 (idempotent)
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
        run: |
          set -euo pipefail
          python - <<'PY'
          import sqlite3, pathlib
          db = pathlib.Path("autonomath.db")
          if not db.exists():
              sqlite3.connect(str(db)).close()
          sql = pathlib.Path("scripts/migrations/226_jpo_patents.sql").read_text()
          with sqlite3.connect(str(db)) as conn:
              conn.executescript(sql)
              conn.commit()
          PY

      - name: Run JPO patents ingest
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_DAYS: ${{ github.event.inputs.days }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
          INPUT_TARGET: ${{ github.event.inputs.target }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          DAYS="${INPUT_DAYS:-1}"
          LIMIT="${INPUT_LIMIT:-500}"
          TARGET="${INPUT_TARGET:-both}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/etl/ingest_jpo_patents.py \
            --days "${DAYS}" \
            --limit "${LIMIT}" \
            --target "${TARGET}" \
            ${DRY_FLAG}

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `jpo-patents-daily failed ${new Date().toISOString()}`,
              body: `Run: ${runUrl}\n\nLikely causes: J-PlatPat 5xx, DOM/JSON schema change, autonomath.db lock contention. See scripts/etl/ingest_jpo_patents.py docstring.`,
              labels: ["ingest-failure", "automation"],
            });
