name: jpcite-extended-corpus-weekly (alias of extended-corpus-weekly)

# Wave 46 tick7#7 (2026-05-12) — jpcite-brand alias of
# `extended-corpus-weekly.yml`.
# Per `project_jpcite_internal_autonomath_rename` +
# `feedback_destruction_free_organization`: dispatch-only trampoline, no
# cron (parent retains SOT), no logic duplication.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run the parent workflow on (default: main)."
        required: false
        default: "main"

concurrency:
  group: jpcite-extended-corpus-weekly
  cancel-in-progress: false

jobs:
  trampoline:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Re-invoke parent (extended-corpus-weekly)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REF="${{ inputs.ref || 'main' }}"
          echo "alias=jpcite-extended-corpus-weekly parent=extended-corpus-weekly ref=$REF"
          gh workflow run extended-corpus-weekly.yml --ref "$REF" \
            -R "${GITHUB_REPOSITORY}"
