name: SOT doc auto-regen (weekly)

# Wave 16 H7 — Weekly auto-regen of `docs/_internal/CURRENT_SOT_{YYYY-MM-DD}.md`
# so a new session needs to read exactly ONE file to be productive (≤5 min
# handoff cost target).
#
# Cadence: Mon 04:00 JST (Sun 19:00 UTC) — runs before the Mon 09:30 JST
# self-improve weekly, so the SOT doc is fresh when the operator opens
# the inbox for the week.
#
# LLM use: NONE (per `feedback_autonomath_no_api_use`). Script reads from
# CLAUDE.md / distribution_manifest.yml / audit baseline / flyctl status /
# gh pr list — no LLM API calls.

on:
  schedule:
    - cron: '0 19 * * 0'   # Sun 19:00 UTC = Mon 04:00 JST
  workflow_dispatch:


concurrency:
  # Wave 43 noise reduction (2026-05-12): serialize same-ref runs.
  group: sot-regen-weekly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - name: Install flyctl (optional, used for status pull)
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH
        continue-on-error: true
      - name: Smoke-test the regen script
        run: python scripts/cron/regen_sot_doc.py --smoke
      - name: Run regen (real, write to docs/_internal/)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: python scripts/cron/regen_sot_doc.py
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: current-sot-md
          path: docs/_internal/CURRENT_SOT_*.md
          if-no-files-found: ignore
      - name: Commit + open PR with new SOT doc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          if git diff --quiet docs/_internal/; then
            echo "[sot-regen] no changes; skipping PR"
            exit 0
          fi
          git config user.name "sot-regen-bot"
          git config user.email "sot-regen-bot@bookyou.net"
          BR="sot-regen/${DATE}"
          git checkout -b "$BR"
          git add docs/_internal/CURRENT_SOT_*.md
          git commit -m "docs(_internal): auto-regen CURRENT_SOT ${DATE}" || exit 0
          git push -u origin "$BR"
          gh pr create --title "docs(_internal): auto-regen CURRENT_SOT ${DATE}" \
            --body "Auto-regen of weekly knowledge-handoff SOT doc. Generated by \`scripts/cron/regen_sot_doc.py\` (Wave 16 H7). NO LLM API calls." || true
