name: deploy

# Gate production deployments on a green CI run for the same commit.
# workflow_run fires when the "test" workflow completes on main; the
# `if:` guard below ensures we only deploy when it passed.
# workflow_dispatch lets an operator trigger a manual re-deploy of the
# already-green HEAD without waiting for another CI cycle (the same
# conclusion guard is not applied there — the operator is asserting the
# commit is good).
on:
  workflow_run:
    workflows: ["test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      expected_sha:
        description: "Exact commit SHA to deploy"
        required: true
        type: string
      skip_hydrate:
        description: "Wave 24 escape hatch: skip the sftp/R2 hydrate step entirely (Dockerfile baked seed + JPINTEL_DB_R2_URL build-arg take over). Set to 'true' when sftp/SSH tunnel is unhealthy (e.g. old machine c3ac6f4 hung at integrity_check) and the hydrate step is consistently timing out at 20min."
        required: false
        type: boolean
        default: false

concurrency:
  # Serialize deploys: only one rollout at a time for the same branch.
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # For workflow_run events: only deploy when the triggering CI run passed.
    # workflow_dispatch bypasses this guard (operator-initiated re-deploy of a
    # commit already known to be green).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # For workflow_run events the triggering commit's SHA is in
          # workflow_run.head_sha; manual dispatch must pin the exact SHA.
          ref: ${{ github.event.inputs.expected_sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve and verify deployment SHA
        id: deploy-sha
        run: |
          set -euo pipefail
          DEPLOY_SHA="$(git rev-parse HEAD)"
          EXPECTED_SHA="${{ github.event.inputs.expected_sha || github.event.workflow_run.head_sha || github.sha }}"
          if [ -z "${EXPECTED_SHA:-}" ]; then
            echo "::error::Unable to resolve expected deployment SHA."
            exit 1
          fi
          if [ "$DEPLOY_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Checkout SHA mismatch: expected $EXPECTED_SHA got $DEPLOY_SHA"
            exit 1
          fi
          echo "sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
          echo "short=${DEPLOY_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA $DEPLOY_SHA"

      - name: Check Fly token
        id: fly-token
        run: |
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::error::FLY_API_TOKEN is not configured; refusing to mark deploy successful."
            exit 1
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.fly-token.outputs.available == 'true'
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev + site extras
        if: steps.fly-token.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Prepare production deploy operator ACK
        if: steps.fly-token.outputs.available == 'true'
        id: operator-ack
        env:
          PRODUCTION_DEPLOY_OPERATOR_ACK_YAML: ${{ secrets.PRODUCTION_DEPLOY_OPERATOR_ACK_YAML }}
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_DEPLOY_OPERATOR_ACK_YAML:-}" ]; then
            echo "::error::PRODUCTION_DEPLOY_OPERATOR_ACK_YAML is not configured; refusing deploy."
            exit 1
          fi
          ack_path="${RUNNER_TEMP}/production_deploy_operator_ack.yml"
          printf '%s\n' "$PRODUCTION_DEPLOY_OPERATOR_ACK_YAML" > "$ack_path"
          echo "path=$ack_path" >> "$GITHUB_OUTPUT"

      - name: Run local pre-deploy verification
        if: steps.fly-token.outputs.available == 'true'
        # The 9.7 GB autonomath.db lives on Fly volumes and is hydrated later in
        # this job (see "Hydrate jpintel seed DB for Docker build"); it is never
        # present on a fresh GHA runner checkout. JPCITE_PREFLIGHT_ALLOW_MISSING_DB=1
        # tells preflight_production_improvement.py to treat that expected
        # absence as a `skipped:missing_db_in_ci` marker rather than a hard
        # `database:missing` issue. Production boot does not export this env-var,
        # so the production path is unchanged.
        #
        # 2026-05-11 note: AUTONOMATH_DB_SHA256 is still mirrored to Fly secrets
        # (legacy DR path / health_drill.py probe), but entrypoint.sh §2 no
        # longer hard-gates boot on it — the size-based gate (>= 5 GB) trusts
        # the cron-mutated volume DB as-is. Set BOOT_ENFORCE_DB_SHA=1 on the
        # Fly app to re-enable strict verification (DR snapshot restore only).
        env:
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: python scripts/ops/pre_deploy_verify.py

      - name: Run production deploy GO gate
        if: steps.fly-token.outputs.available == 'true'
        run: python scripts/ops/production_deploy_go_gate.py --operator-ack "${{ steps.operator-ack.outputs.path }}"

      - name: Set up flyctl
        if: steps.fly-token.outputs.available == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Verify live Fly secret names before deploy
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          required=(
            ADMIN_API_KEY
            API_KEY_SALT
            AUTONOMATH_API_HASH_PEPPER
            AUTONOMATH_DB_SHA256
            AUTONOMATH_DB_URL
            INVOICE_FOOTER_JA
            INVOICE_REGISTRATION_NUMBER
            JPCITE_EDGE_AUTH_SECRET
            JPCITE_SESSION_SECRET
            JPINTEL_CORS_ORIGINS
            JPINTEL_ENV
            RATE_LIMIT_FREE_PER_DAY
            R2_ACCESS_KEY_ID
            R2_BUCKET
            R2_ENDPOINT
            R2_SECRET_ACCESS_KEY
            STRIPE_BILLING_PORTAL_CONFIG_ID
            STRIPE_PRICE_PER_REQUEST
            STRIPE_SECRET_KEY
            STRIPE_TAX_ENABLED
            STRIPE_WEBHOOK_SECRET
          )
          fly_secret_names="$(
            flyctl secrets list -a autonomath-api \
              | awk -F '│' 'NF >= 3 {gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); if ($1 != "NAME" && $1 != "") print $1}'
          )"
          missing=()
          for name in "${required[@]}"; do
            if ! grep -Fxq "$name" <<< "$fly_secret_names"; then
              missing+=("$name")
            fi
          done
          audit_seal_present=0
          for name in AUDIT_SEAL_SECRET JPINTEL_AUDIT_SEAL_KEYS; do
            if grep -Fxq "$name" <<< "$fly_secret_names"; then
              audit_seal_present=1
            fi
          done
          if [ "$audit_seal_present" = "0" ]; then
            missing+=("one_of(AUDIT_SEAL_SECRET|JPINTEL_AUDIT_SEAL_KEYS)")
          fi
          x402_names=(JPCITE_X402_ADDRESS JPCITE_X402_ORIGIN_SECRET JPCITE_X402_QUOTE_SECRET)
          x402_present=()
          x402_missing=()
          for name in "${x402_names[@]}"; do
            if grep -Fxq "$name" <<< "$fly_secret_names"; then
              x402_present+=("$name")
            else
              x402_missing+=("$name")
            fi
          done
          if [ "${#x402_present[@]}" -gt 0 ] && [ "${#x402_missing[@]}" -gt 0 ]; then
            echo "::error::Partial x402 Fly secret configuration. Set all or none: missing ${x402_missing[*]}"
            exit 1
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required Fly secret names for autonomath-api: ${missing[*]}"
            exit 1
          fi
          if [ "${#x402_present[@]}" -eq 0 ]; then
            echo "::notice::x402 Fly origin bridge secrets are not configured; Stripe/API key rails remain deployable and x402 stays unavailable."
          else
            echo "x402 Fly origin bridge secret names present; values not read."
          fi
          echo "Required Fly secret names present for autonomath-api (${#required[@]} required + audit-seal alternative checked; values not read)."

      - name: SKIP_HYDRATE notice (Wave 24 escape hatch)
        if: steps.fly-token.outputs.available == 'true' && github.event.inputs.skip_hydrate == 'true'
        # Wave 24 (2026-05-12): explicit skip path so the deploy log carries
        # an audit trail when the hydrate step is intentionally bypassed. The
        # Dockerfile seed-stager will pull JPINTEL_DB_R2_URL on the remote
        # builder (much more reliable than GHA-side sftp through the unhealthy
        # old machine). Without this annotation the next operator has to
        # reverse-engineer the `if:` condition from the job graph.
        run: |
          echo "::warning::Wave 24 SKIP_HYDRATE=true engaged. Hydrate step skipped."
          echo "  ↳ Dockerfile seed-stager will fetch JPINTEL_DB_R2_URL on the remote builder."
          echo "  ↳ Use this only when GHA-side sftp/SSH tunnel to autonomath-api is unhealthy."
          echo "  ↳ Required: canonical R2 key or a fresh timestamped autonomath-api/jpintel-*.db.gz backup must exist."
          mkdir -p data
          # Leave a 1-byte placeholder so the Dockerfile COPY data/jpintel.db
          # step still succeeds (size-gate then falls over to JPINTEL_DB_R2_URL).
          printf '\x00' > data/jpintel.db
          echo "placeholder data/jpintel.db = $(wc -c < data/jpintel.db | tr -d ' ') bytes"

      - name: Hydrate jpintel seed DB for Docker build (optional, bake-in fallback)
        if: steps.fly-token.outputs.available == 'true' && github.event.inputs.skip_hydrate != 'true'
        timeout-minutes: 35
        # Wave 22 (2026-05-11): hydrate is now OPTIONAL.
        # ----------------------------------------------------
        # The Dockerfile `seed-stager` stage bakes /seed/jpintel.db into the
        # image at build time. Two paths can populate it:
        #
        #   1. THIS STEP — sftp the freshest live snapshot from the running
        #      Fly machine into data/jpintel.db so the build context carries
        #      a 352+ MB seed. Preferred when sftp is healthy.
        #
        #   2. BUILD-ARG `JPINTEL_DB_R2_URL` — the Dockerfile seed-stager
        #      curls the canonical R2 mirror
        #      (`autonomath-api/jpintel.db.gz`, refreshed 04:00 JST by
        #      r2-upload-jpintel-daily.yml) when this step left only the
        #      1.3 MB dev fixture in the build context.
        #
        # Wave 20 retried sftp 3× then R2-pulled from the GHA runner; Wave
        # 22 lifts the R2 path into the Dockerfile so the remote Fly builder
        # network (much more reliable than GHA runner-to-R2) does the
        # download, and the 60min sftp tunnel hang during build can never
        # block the deploy again. If sftp fails here we keep going.
        #
        # Wave 20 retry mechanics remain inside this step. Wave 22 only adds
        # the "continue on failure" path + reduces timeout 60min → 20min.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          mkdir -p data
          # A repo-checkout copy of data/jpintel.db is a 1.3 MB dev fixture that
          # gets generated by editable install side effects on the runner. The
          # production seed is 350+ MB. We must therefore size-guard the skip:
          # only treat data/jpintel.db as already-hydrated when it is already
          # at production scale (>= 100 MB). Smaller files are treated as
          # absent so the SFTP path overwrites them with the live snapshot.
          existing_bytes=0
          if [ -s data/jpintel.db ]; then
            existing_bytes="$(wc -c < data/jpintel.db | tr -d ' ')"
          fi
          if [ "$existing_bytes" -ge 100000000 ]; then
            echo "data/jpintel.db already production-sized (${existing_bytes} bytes); skipping hydrate."
          else
            echo "Hydrating the Docker seed DB from a verified production volume snapshot."
            echo "(existing dev fixture: ${existing_bytes} bytes; below 100MB threshold)"
            # `flyctl ssh sftp get` refuses to overwrite an existing local target,
            # so any small dev fixture must be removed before the fetch.
            rm -f data/jpintel.db
            remote_seed="/tmp/jpintel-ci-seed.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}.db"
            cleanup_remote_seed() {
              flyctl ssh console -a autonomath-api -q -C "rm -f ${remote_seed}" || true
            }
            trap cleanup_remote_seed EXIT

            # Strategy A — 3× sftp retry. Each attempt re-issues a fresh online
            # .backup so we never resume from a possibly-corrupt partial file.
            sftp_ok=0
            # Wave 23 (2026-05-11) — wrap each sftp attempt in a 5-min timeout.
            # The full step has a 20-min cap; without per-attempt timeout a
            # single hung tunnel consumed all 20 min and the bake-in fallback
            # never fired (deploy 25676000704 evidence). Per-attempt cap
            # forces graceful drop into Strategy B (R2) and ultimately
            # Strategy C (Dockerfile build-arg + baked seed).
            for attempt in 1 2 3; do
              echo "::group::sftp attempt ${attempt}/3 (fresh online .backup, 5min cap)"
              rm -f data/jpintel.db
              if timeout 300 flyctl ssh console -a autonomath-api -q -C \
                  "bash -lc 'set -euo pipefail; rm -f ${remote_seed}; sqlite3 -cmd \".timeout 300000\" /data/jpintel.db \".backup ${remote_seed}\"; sqlite3 ${remote_seed} \"PRAGMA quick_check; SELECT COUNT(*) FROM programs;\"'" \
                && timeout 300 flyctl ssh sftp get -a autonomath-api -q "${remote_seed}" data/jpintel.db ; then
                sftp_bytes="$(wc -c < data/jpintel.db | tr -d ' ' 2>/dev/null || echo 0)"
                if [ "$sftp_bytes" -ge 100000000 ]; then
                  echo "sftp attempt ${attempt} succeeded (${sftp_bytes} bytes)"
                  sftp_ok=1
                  echo "::endgroup::"
                  break
                fi
                echo "sftp attempt ${attempt} produced too-small file (${sftp_bytes} bytes)"
              else
                echo "sftp attempt ${attempt} failed (likely transient SSH tunnel loss)"
              fi
              echo "::endgroup::"
              sleep 15
            done

            # Strategy B — R2 fallback. Pull the canonical
            # `autonomath-api/jpintel.db.gz` key first (refreshed every 04:00
            # JST by `r2-upload-jpintel-daily.yml`); fall back to the latest
            # timestamped `autonomath-api/jpintel-YYYYMMDD-HHMMSS.db.gz` key
            # if the canonical one is missing. sha-verify the gzip artifact,
            # then gunzip into place. PRAGMA quick_check below gates the
            # decompressed result.
            #
            # Wave 22 (2026-05-11): if R2 secrets are also missing OR the R2
            # pull fails, do NOT hard-fail. The Dockerfile seed-stager
            # carries a second R2 download path on the Fly remote builder
            # (build-arg JPINTEL_DB_R2_URL) — and even if neither GHA path
            # nor build-arg fires, the build only fails if the resulting
            # /seed/jpintel.db is below the size threshold. Letting the
            # build proceed lets the remote builder take over the network
            # responsibility.
            if [ "$sftp_ok" != "1" ]; then
              if [ -z "${AWS_ACCESS_KEY_ID:-}" ] \
                 || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] \
                 || [ -z "${R2_ENDPOINT:-}" ] \
                 || [ -z "${R2_BUCKET:-}" ]; then
                echo "::warning::sftp failed 3× and R2 fallback secrets missing — proceeding with build-context seed (Dockerfile JPINTEL_DB_R2_URL build-arg will take over if set)."
                rm -f data/jpintel.db
                # Drop a 1-byte placeholder so COPY data/jpintel.db in the
                # seed-stager stage still succeeds (size-gate will then fail
                # over to JPINTEL_DB_R2_URL).
                printf '\x00' > data/jpintel.db
                cleanup_remote_seed
                trap - EXIT
                exit 0
              fi
              echo "::group::R2 fallback — sftp failed 3×, pulling latest mirror"
              rm -f data/jpintel.db /tmp/jpintel.db.gz /tmp/jpintel.db.gz.sha256
              R2_KEY=""
              if aws s3api head-object --bucket "$R2_BUCKET" --key "autonomath-api/jpintel.db.gz" --endpoint-url "$R2_ENDPOINT" >/dev/null 2>&1; then
                R2_KEY="autonomath-api/jpintel.db.gz"
                echo "using canonical key: ${R2_KEY}"
              else
                echo "canonical key not yet uploaded — falling back to latest timestamped nightly-backup key"
                R2_KEY=$(aws s3api list-objects-v2 \
                  --bucket "$R2_BUCKET" \
                  --prefix "autonomath-api/jpintel-" \
                  --endpoint-url "$R2_ENDPOINT" \
                  --query 'Contents[].Key' \
                  --output text 2>/dev/null \
                  | tr '\t' '\n' \
                  | grep -E '\.db\.gz$' \
                  | sort -r \
                  | head -1 \
                  || true)
              fi
              if [ -z "${R2_KEY:-}" ]; then
                echo "::warning::No jpintel-*.db.gz objects under s3://$R2_BUCKET/autonomath-api/ — leaving placeholder so Dockerfile JPINTEL_DB_R2_URL can take over."
                printf '\x00' > data/jpintel.db
                cleanup_remote_seed
                trap - EXIT
                exit 0
              fi
              aws s3 cp "s3://$R2_BUCKET/${R2_KEY}" /tmp/jpintel.db.gz --endpoint-url "$R2_ENDPOINT"
              if aws s3 cp "s3://$R2_BUCKET/${R2_KEY}.sha256" /tmp/jpintel.db.gz.sha256 --endpoint-url "$R2_ENDPOINT" 2>/dev/null; then
                # Sidecars from backup_jpintel.py and r2_upload_jpintel.sh
                # both store `<sha>  <basename>`; rename the local file to
                # match before `shasum -c`.
                cp /tmp/jpintel.db.gz "/tmp/$(awk '{print $2}' /tmp/jpintel.db.gz.sha256)"
                ( cd /tmp && shasum -a 256 -c jpintel.db.gz.sha256 )
                echo "R2 artifact sha256 verified"
              else
                echo "::warning::no .sha256 sidecar — relying on PRAGMA quick_check below"
              fi
              gunzip -c /tmp/jpintel.db.gz > data/jpintel.db
              echo "R2 fallback hydrated $(wc -c < data/jpintel.db | tr -d ' ') bytes from ${R2_KEY}"
              echo "::endgroup::"
            fi
            cleanup_remote_seed
            trap - EXIT
          fi

          bytes="$(wc -c < data/jpintel.db | tr -d ' ')"
          if [ "$bytes" -lt 100000000 ]; then
            # Wave 22 (2026-05-11): too-small data/jpintel.db is no longer a
            # hard fail. The Dockerfile seed-stager will pick up the R2
            # mirror via build-arg JPINTEL_DB_R2_URL. Leave a 1-byte
            # placeholder so the COPY step does not error.
            echo "::warning::data/jpintel.db is small (${bytes} bytes); Dockerfile JPINTEL_DB_R2_URL build-arg will hydrate at build time."
            printf '\x00' > data/jpintel.db
            exit 0
          fi

          python3 - <<'PY'
          import sqlite3
          from pathlib import Path

          db = Path("data/jpintel.db")
          conn = sqlite3.connect(db)
          try:
              result = conn.execute("PRAGMA quick_check").fetchone()
              if not result or result[0] != "ok":
                  raise SystemExit(f"quick_check failed: {result!r}")
              def table_count(name: str) -> int:
                  exists = conn.execute(
                      "SELECT 1 FROM sqlite_master WHERE type='table' AND name=?",
                      (name,),
                  ).fetchone()
                  if not exists:
                      return 0
                  return conn.execute(f"SELECT COUNT(*) FROM {name}").fetchone()[0]

              programs = table_count("programs")
              jpi_programs = table_count("jpi_programs")
              catalog_count = max(programs, jpi_programs)
              if catalog_count < 10_000:
                  raise SystemExit(
                      "program catalog unexpectedly small: "
                      f"programs={programs} jpi_programs={jpi_programs} "
                      f"catalog_count={catalog_count}"
                  )
          finally:
              conn.close()
          print(
              f"seed DB verified: {db} ({db.stat().st_size} bytes) "
              f"programs={programs} jpi_programs={jpi_programs} "
              f"catalog_count={catalog_count}"
          )
          PY

      - name: Extract release version from pyproject.toml
        if: steps.fly-token.outputs.available == 'true'
        id: version
        # Pin SENTRY_RELEASE to the package version + commit sha so a hotfix
        # redeploy at the same version still groups distinctly in Sentry.
        # Format: "autonomath-mcp@<pyproject_version>+<short_sha>".
        run: |
          set -euo pipefail
          PKG_VER=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          SHORT_SHA="${{ steps.deploy-sha.outputs.short }}"
          RELEASE="autonomath-mcp@${PKG_VER}+${SHORT_SHA}"
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Computed SENTRY_RELEASE=${RELEASE}"

      - name: Deploy (remote builder)
        if: steps.fly-token.outputs.available == 'true'
        timeout-minutes: 35
        # --remote-only pushes the build to Fly's builder VM so local runner doesn't need docker.
        # -e SENTRY_RELEASE=... sets the env on the machine at deploy time;
        # complements the SENTRY_ENVIRONMENT already pinned in fly.toml.
        #
        # Wave 22 (2026-05-11) — JPINTEL_DB_R2_URL build-arg.
        # ----------------------------------------------------
        # Passes a pre-signed R2 URL into the Dockerfile `seed-stager`
        # stage. The seed-stager curls this URL only when the build-context
        # data/jpintel.db is sub-threshold (i.e. CI hydrate step failed or
        # was skipped). The signed URL is generated fresh here so it cannot
        # leak via image labels — Fly's remote builder consumes it then
        # discards. Falls back to empty string if R2 secrets are missing;
        # the seed-stager then errors loudly instead of silently baking a
        # tiny fixture.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          jpintel_r2_url=""
          if [ -n "${AWS_ACCESS_KEY_ID:-}" ] \
             && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ] \
             && [ -n "${R2_ENDPOINT:-}" ] \
             && [ -n "${R2_BUCKET:-}" ]; then
            jpintel_r2_key=""
            if aws s3api head-object --bucket "$R2_BUCKET" --key "autonomath-api/jpintel.db.gz" --endpoint-url "$R2_ENDPOINT" >/dev/null 2>&1; then
              jpintel_r2_key="autonomath-api/jpintel.db.gz"
              echo "Using canonical R2 seed: ${jpintel_r2_key}"
            else
              echo "::warning::Canonical R2 key autonomath-api/jpintel.db.gz missing; falling back to latest timestamped jpintel backup."
              jpintel_r2_key="$(
                aws s3api list-objects-v2 \
                  --bucket "$R2_BUCKET" \
                  --prefix "autonomath-api/jpintel-" \
                  --endpoint-url "$R2_ENDPOINT" \
                  --query 'Contents[].Key' \
                  --output text 2>/dev/null \
                | tr '\t' '\n' \
                | grep -E '\.db\.gz$' \
                | sort -r \
                | head -1 \
                || true
              )"
              if [ -n "${jpintel_r2_key:-}" ]; then
                echo "Using latest timestamped R2 seed: ${jpintel_r2_key}"
              fi
            fi
            if [ -n "${jpintel_r2_key:-}" ]; then
              r2_meta="$(
                aws s3api head-object \
                  --bucket "$R2_BUCKET" \
                  --key "$jpintel_r2_key" \
                  --endpoint-url "$R2_ENDPOINT" \
                  --query '{LastModified: LastModified, ContentLength: ContentLength}' \
                  --output json
              )"
              export R2_META="$r2_meta"
              export JPINTEL_R2_SEED_MAX_AGE_SECONDS="${JPINTEL_R2_SEED_MAX_AGE_SECONDS:-108000}"
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import sys

          meta = json.loads(os.environ["R2_META"])
          size = int(meta.get("ContentLength") or 0)
          if size < 100_000_000:
              print(f"::error::R2 seed too small: {size} bytes")
              sys.exit(1)
          raw_last_modified = str(meta.get("LastModified") or "")
          try:
              last_modified = dt.datetime.fromisoformat(
                  raw_last_modified.replace("Z", "+00:00")
              )
          except ValueError:
              print(f"::error::cannot parse R2 seed LastModified: {raw_last_modified!r}")
              sys.exit(1)
          now = dt.datetime.now(dt.timezone.utc)
          age_seconds = (now - last_modified).total_seconds()
          max_age = int(os.environ["JPINTEL_R2_SEED_MAX_AGE_SECONDS"])
          if age_seconds > max_age:
              print(
                  "::error::R2 seed is stale: "
                  f"last_modified={raw_last_modified} age_seconds={int(age_seconds)} "
                  f"max_age_seconds={max_age}"
              )
              sys.exit(1)
          print(
              "R2 seed freshness OK: "
              f"last_modified={raw_last_modified} age_seconds={int(age_seconds)} "
              f"size={size}"
          )
          PY
              jpintel_r2_url=$(aws s3 presign "s3://$R2_BUCKET/${jpintel_r2_key}" \
                --endpoint-url "$R2_ENDPOINT" --expires-in 3600 || echo "")
              if [ -n "${jpintel_r2_url:-}" ]; then
                echo "::group::JPINTEL_DB_R2_URL build-arg"
                echo "Generated 1h pre-signed URL for ${jpintel_r2_key} (length=${#jpintel_r2_url})"
                echo "::endgroup::"
              fi
            else
              echo "::warning::No R2 seed key found; build-arg JPINTEL_DB_R2_URL will be empty (seed-stager will rely on build-context seed)."
            fi
          fi
          flyctl deploy --remote-only \
            -e SENTRY_RELEASE=${{ steps.version.outputs.release }} \
            --build-arg "JPINTEL_DB_R2_URL=${jpintel_r2_url}" \
            --label GH_SHA=${{ steps.deploy-sha.outputs.sha }} \
            --label org.opencontainers.image.revision=${{ steps.deploy-sha.outputs.sha }} \
            --image-label deployment-${{ steps.deploy-sha.outputs.short }}-${{ github.run_id }}

      - name: Verify Fly machine state pre-probe
        if: steps.fly-token.outputs.available == 'true'
        timeout-minutes: 5
        # Wait for machine state=started before reading image, then verify
        # Fly machine is running the SHA we just deployed. Race condition
        # (run 25481404553, 2026-05-07): pre-probe ran while machine was
        # state=replacing, so flyctl image show returned the OLD running image
        # label. Fix: poll up to 6×10s for state=started, then check; if SHA
        # still mismatches treat as soft warn (not hard fail) — post-deploy
        # smoke is the authoritative gate.
        run: |
          set -euo pipefail
          echo "== flyctl status (pre-probe machine state) =="
          for i in 1 2 3 4 5 6; do
            STATUS_JSON=$(flyctl status -a autonomath-api --json 2>/dev/null || echo '{}')
            STATE=$(echo "$STATUS_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); m=(d.get('Machines') or [{}])[0]; print(m.get('state',''))" 2>/dev/null || echo "")
            echo "attempt $i: machine state=$STATE"
            if [ "$STATE" = "started" ]; then break; fi
            sleep 10
          done
          flyctl status -a autonomath-api || true
          flyctl image show -a autonomath-api --json > /tmp/fly_image.json
          export DEPLOY_SHA="${{ steps.deploy-sha.outputs.sha }}"
          python3 - <<'PY'
          import json
          import os

          expected = os.environ["DEPLOY_SHA"]
          payload = json.load(open("/tmp/fly_image.json", encoding="utf-8"))
          image = payload[0] if isinstance(payload, list) and payload else payload
          labels = image.get("Labels") or image.get("labels") or {}
          if isinstance(labels, str):
              labels = json.loads(labels)
          actual = labels.get("GH_SHA") or labels.get("org.opencontainers.image.revision")
          print(f"fly image GH_SHA={actual}")
          if actual != expected:
              print(
                  f"::warning::Fly image SHA mismatch (pre-probe race): expected {expected} got {actual}; post-deploy smoke will gate the actual outcome.",
              )
          PY

      - name: Post-deploy smoke (hard gate)
        if: steps.fly-token.outputs.available == 'true'
        timeout-minutes: 30
        # Hard gate AFTER flyctl deploy completes. We re-run the same probes
        # operators run manually (scripts/smoke_test.sh) but treat any
        # "WARN" (deep_health.status != "ok", programs total <= 0) as a HARD
        # FAIL so a green deploy with degraded data never silently ships.
        # Poll after flyctl deploy completes because machine replacement and
        # deep data hydration can finish at different times. A fixed sleep was
        # too fragile for large corpus deploys.
        #
        # Cache-propagation gate — see memory `feedback_post_deploy_smoke_propagation`
        # and the deploy.yml 4-fix pattern. Fly proxy + CF edge + DNS TTL cache
        # windows take ~60s to drain; the pre-probe "Verify Fly machine state"
        # step only covers the rolling-restart window, not the edge cache. We
        # therefore (a) sleep 60s before the first /healthz curl so the first
        # probe lands on the new image, and (b) use --max-time 30 on individual
        # curls so a single slow edge hop (Fly Tokyo p99 swap ≥ 25s, R4 P1-1
        # evidence) does not produce a false negative.
        env:
          BASE_URL: https://api.jpcite.com
        run: |
          set -euo pipefail
          echo "== Post-deploy hard gate =="

          # 60s propagation sleep — see feedback_post_deploy_smoke_propagation
          # + deploy.yml 4-fix pattern. Fly p99 machine swap + CF edge cache
          # together exceed 25s; 60s gives headroom for the first /healthz hit
          # to land on the new image instead of the previous-deploy cache.
          echo "Cache-propagation wait: sleep 60 (Fly proxy + CF edge + DNS TTL)"
          sleep 60

          # Probe 1: /healthz must become HTTP 200.
          # --max-time 30: Fly Tokyo p99 swap ≥ 25s leaves no headroom under
          # 30s. See feedback_post_deploy_smoke_propagation.
          health_ok=0
          for i in $(seq 1 24); do
            status=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 30 "$BASE_URL/healthz" || echo 000)
            echo "GET /healthz attempt $i -> $status"
            if [ "$status" = "200" ]; then
              health_ok=1
              break
            fi
            sleep 10
          done
          if [ "$health_ok" != "1" ]; then
            echo "::error::POST-DEPLOY FAIL: /healthz did not become 200"
            exit 1
          fi

          # Probe 2: /v1/am/health/deep?fail_on_unhealthy=true must return status='ok'.
          # Anything else (degraded / unhealthy / 5xx body) is a hard fail.
          # deep_health is the structural integrity probe (not a propagation
          # probe), so --max-time 10 is retained intentionally; it touches the
          # already-warm app instance.
          deep_ok=0
          for i in $(seq 1 60); do
            if curl -fsS --max-time 10 -o /tmp/deep_health.json \
              "$BASE_URL/v1/am/health/deep?fail_on_unhealthy=true"; then
              deep_status=$(python3 -c "import json; print(json.load(open('/tmp/deep_health.json')).get('status',''))")
              echo "deep_health attempt $i status=$deep_status"
              if [ "$deep_status" = "ok" ]; then
                deep_ok=1
                break
              fi
            else
              echo "deep_health attempt $i returned non-2xx"
              cat /tmp/deep_health.json 2>/dev/null || true
            fi
            sleep 15
          done
          if [ "$deep_ok" != "1" ]; then
            echo "::error::POST-DEPLOY FAIL: deep_health.status did not become 'ok'"
            cat /tmp/deep_health.json 2>/dev/null || true
            exit 1
          fi
          deep_status=$(python3 -c "import json,sys; print(json.load(open('/tmp/deep_health.json')).get('status',''))")
          echo "deep_health.status=$deep_status"

          # Probe 3: /v1/programs/search must return total>0 for the canonical
          # 補助金 query. total<=0 means the search corpus is empty / FTS index
          # missing — historically the failure mode for an empty seed.
          # --max-time 30: FTS5 cold-start on the 11k-program corpus can take
          # >20s after a machine swap; see feedback_post_deploy_smoke_propagation.
          status=$(curl -fsS -o /tmp/smoke_search.json -w '%{http_code}' --max-time 30 \
            "$BASE_URL/v1/programs/search?q=%E8%A3%9C%E5%8A%A9%E9%87%91&limit=1" || echo 000)
          echo "GET /v1/programs/search -> $status"
          if [ "$status" != "200" ]; then
            echo "::error::POST-DEPLOY FAIL: programs/search returned $status (expected 200)"
            cat /tmp/smoke_search.json 2>/dev/null || true
            exit 1
          fi
          total=$(python3 -c "import json; print(json.load(open('/tmp/smoke_search.json')).get('total', -1))")
          echo "programs.total=$total"
          if [ "$total" -le 0 ] 2>/dev/null; then
            echo "::error::POST-DEPLOY FAIL: programs.total=$total (must be > 0)"
            cat /tmp/smoke_search.json
            exit 1
          fi

          echo "Post-deploy hard gate PASS (healthz=200 deep_health=ok programs.total=$total)"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        # Stub: only fires if webhook secret is set; silently no-ops otherwise so absence
        # of the secret doesn't itself fail the job.
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping notification."
            exit 0
          fi
          payload=$(printf '{"text":"autonomath-api deploy FAILED on %s (commit %s) — %s"}' \
            "${GITHUB_REF_NAME}" "${{ steps.deploy-sha.outputs.short }}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")
          curl -sS -X POST -H 'Content-Type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
