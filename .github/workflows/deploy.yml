name: deploy

# Gate production deployments on a green CI run for the same commit.
# workflow_run fires when the "test" workflow completes on main; the
# `if:` guard below ensures we only deploy when it passed.
# workflow_dispatch lets an operator trigger a manual re-deploy of the
# already-green HEAD without waiting for another CI cycle (the same
# conclusion guard is not applied there — the operator is asserting the
# commit is good).
on:
  workflow_run:
    workflows: ["test"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  # Serialize deploys: only one rollout at a time for the same branch.
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # For workflow_run events: only deploy when the triggering CI run passed.
    # workflow_dispatch bypasses this guard (operator-initiated re-deploy of a
    # commit already known to be green).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # For workflow_run events the triggering commit's SHA is in
          # workflow_run.head_sha; for workflow_dispatch it is just GITHUB_SHA.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check Fly token
        id: fly-token
        run: |
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::error::FLY_API_TOKEN is not configured; refusing to mark deploy successful."
            exit 1
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.fly-token.outputs.available == 'true'
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev + site extras
        if: steps.fly-token.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Prepare production deploy operator ACK
        if: steps.fly-token.outputs.available == 'true'
        id: operator-ack
        env:
          PRODUCTION_DEPLOY_OPERATOR_ACK_YAML: ${{ secrets.PRODUCTION_DEPLOY_OPERATOR_ACK_YAML }}
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_DEPLOY_OPERATOR_ACK_YAML:-}" ]; then
            echo "::error::PRODUCTION_DEPLOY_OPERATOR_ACK_YAML is not configured; refusing deploy."
            exit 1
          fi
          ack_path="${RUNNER_TEMP}/production_deploy_operator_ack.yml"
          printf '%s\n' "$PRODUCTION_DEPLOY_OPERATOR_ACK_YAML" > "$ack_path"
          echo "path=$ack_path" >> "$GITHUB_OUTPUT"

      - name: Run local pre-deploy verification
        if: steps.fly-token.outputs.available == 'true'
        # The 9.7 GB autonomath.db lives on Fly volumes and is hydrated later in
        # this job (see "Hydrate jpintel seed DB for Docker build"); it is never
        # present on a fresh GHA runner checkout. JPCITE_PREFLIGHT_ALLOW_MISSING_DB=1
        # tells preflight_production_improvement.py to treat that expected
        # absence as a `skipped:missing_db_in_ci` marker rather than a hard
        # `database:missing` issue. Production boot does not export this env-var,
        # so the production path is unchanged.
        env:
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: python scripts/ops/pre_deploy_verify.py

      - name: Run production deploy GO gate
        if: steps.fly-token.outputs.available == 'true'
        run: python scripts/ops/production_deploy_go_gate.py --operator-ack "${{ steps.operator-ack.outputs.path }}"

      - name: Set up flyctl
        if: steps.fly-token.outputs.available == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Hydrate jpintel seed DB for Docker build
        if: steps.fly-token.outputs.available == 'true'
        run: |
          set -euo pipefail
          mkdir -p data
          # A repo-checkout copy of data/jpintel.db is a 1.3 MB dev fixture that
          # gets generated by editable install side effects on the runner. The
          # production seed is 350+ MB. We must therefore size-guard the skip:
          # only treat data/jpintel.db as already-hydrated when it is already
          # at production scale (>= 100 MB). Smaller files are treated as
          # absent so the SFTP path overwrites them with the live snapshot.
          existing_bytes=0
          if [ -s data/jpintel.db ]; then
            existing_bytes="$(wc -c < data/jpintel.db | tr -d ' ')"
          fi
          if [ "$existing_bytes" -ge 100000000 ]; then
            echo "data/jpintel.db already production-sized (${existing_bytes} bytes); skipping hydrate."
          else
            echo "Hydrating the Docker seed DB from a verified production volume snapshot."
            echo "(existing dev fixture: ${existing_bytes} bytes; below 100MB threshold)"
            remote_seed="/tmp/jpintel-ci-seed.db"
            flyctl ssh console -a autonomath-api -q -C \
              "bash -lc 'set -euo pipefail; rm -f ${remote_seed}; sqlite3 /data/jpintel.db \".backup ${remote_seed}\"; sqlite3 ${remote_seed} \"PRAGMA quick_check; SELECT COUNT(*) FROM programs;\"'"
            flyctl ssh sftp get -a autonomath-api -q "${remote_seed}" data/jpintel.db
            flyctl ssh console -a autonomath-api -q -C "rm -f ${remote_seed}" || true
          fi

          bytes="$(wc -c < data/jpintel.db | tr -d ' ')"
          if [ "$bytes" -lt 100000000 ]; then
            echo "data/jpintel.db is too small for a production seed: ${bytes} bytes" >&2
            exit 1
          fi

          python3 - <<'PY'
          import sqlite3
          from pathlib import Path

          db = Path("data/jpintel.db")
          conn = sqlite3.connect(db)
          try:
              result = conn.execute("PRAGMA quick_check").fetchone()
              if not result or result[0] != "ok":
                  raise SystemExit(f"quick_check failed: {result!r}")
              def table_count(name: str) -> int:
                  exists = conn.execute(
                      "SELECT 1 FROM sqlite_master WHERE type='table' AND name=?",
                      (name,),
                  ).fetchone()
                  if not exists:
                      return 0
                  return conn.execute(f"SELECT COUNT(*) FROM {name}").fetchone()[0]

              programs = table_count("programs")
              jpi_programs = table_count("jpi_programs")
              catalog_count = max(programs, jpi_programs)
              if catalog_count < 10_000:
                  raise SystemExit(
                      "program catalog unexpectedly small: "
                      f"programs={programs} jpi_programs={jpi_programs} "
                      f"catalog_count={catalog_count}"
                  )
          finally:
              conn.close()
          print(
              f"seed DB verified: {db} ({db.stat().st_size} bytes) "
              f"programs={programs} jpi_programs={jpi_programs} "
              f"catalog_count={catalog_count}"
          )
          PY

      - name: Extract release version from pyproject.toml
        if: steps.fly-token.outputs.available == 'true'
        id: version
        # Pin SENTRY_RELEASE to the package version + commit sha so a hotfix
        # redeploy at the same version still groups distinctly in Sentry.
        # Format: "autonomath-mcp@<pyproject_version>+<short_sha>".
        run: |
          set -euo pipefail
          PKG_VER=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE="autonomath-mcp@${PKG_VER}+${SHORT_SHA}"
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Computed SENTRY_RELEASE=${RELEASE}"

      - name: Deploy (remote builder)
        if: steps.fly-token.outputs.available == 'true'
        # --remote-only pushes the build to Fly's builder VM so local runner doesn't need docker.
        # -e SENTRY_RELEASE=... sets the env on the machine at deploy time;
        # complements the SENTRY_ENVIRONMENT already pinned in fly.toml.
        run: flyctl deploy --remote-only -e SENTRY_RELEASE=${{ steps.version.outputs.release }}

      - name: Verify Fly machine state pre-probe
        if: steps.fly-token.outputs.available == 'true'
        # Double-check after flyctl deploy returns: list the app's machines and
        # surface their state so we have a deterministic record of which
        # release/version was live when the smoke probes ran. This is purely
        # observational — flyctl deploy itself already gates on machine health,
        # but the post-deploy probe race (run 25474923802 false-positive on
        # 2026-05-07) showed that surfacing the state up-front makes the cause
        # of any subsequent probe failure unambiguous in the GHA log.
        run: |
          set -euo pipefail
          echo "== flyctl status (pre-probe machine state) =="
          flyctl status -a autonomath-api || {
            echo "::warning::flyctl status returned non-zero; continuing to smoke probes."
          }

      - name: Post-deploy smoke (hard gate)
        if: steps.fly-token.outputs.available == 'true'
        # Hard gate AFTER flyctl deploy completes. We re-run the same probes
        # operators run manually (scripts/smoke_test.sh) but treat any
        # "WARN" (deep_health.status != "ok", programs total <= 0) as a HARD
        # FAIL so a green deploy with degraded data never silently ships.
        # The sleep gives Fly's machine up to ~60s to swap traffic to the new
        # release machine before we probe — observed Fly p99 machine swap is in
        # the 60–90s range, so 25s caused a race-condition false-positive on
        # run 25474923802 (2026-05-07). 60s clears p99 with margin while still
        # well under the 20-minute job timeout.
        env:
          BASE_URL: https://api.jpcite.com
        run: |
          set -euo pipefail
          sleep 60

          echo "== Post-deploy hard gate =="

          # Probe 1: /healthz must be HTTP 200.
          status=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 30 "$BASE_URL/healthz" || echo 000)
          echo "GET /healthz -> $status"
          if [ "$status" != "200" ]; then
            echo "::error::POST-DEPLOY FAIL: /healthz expected 200 got $status"
            exit 1
          fi

          # Probe 2: /v1/am/health/deep?fail_on_unhealthy=true must return status='ok'.
          # Anything else (degraded / unhealthy / 5xx body) is a hard fail.
          curl -fsS --max-time 20 -o /tmp/deep_health.json \
            "$BASE_URL/v1/am/health/deep?fail_on_unhealthy=true" || {
            echo "::error::POST-DEPLOY FAIL: deep health endpoint did not return 2xx"
            cat /tmp/deep_health.json 2>/dev/null || true
            exit 1
          }
          deep_status=$(python3 -c "import json,sys; print(json.load(open('/tmp/deep_health.json')).get('status',''))")
          echo "deep_health.status=$deep_status"
          if [ "$deep_status" != "ok" ]; then
            echo "::error::POST-DEPLOY FAIL: deep_health.status=$deep_status (must be 'ok')"
            cat /tmp/deep_health.json
            exit 1
          fi

          # Probe 3: /v1/programs/search must return total>0 for the canonical
          # 補助金 query. total<=0 means the search corpus is empty / FTS index
          # missing — historically the failure mode for an empty seed.
          status=$(curl -fsS -o /tmp/smoke_search.json -w '%{http_code}' --max-time 20 \
            "$BASE_URL/v1/programs/search?q=%E8%A3%9C%E5%8A%A9%E9%87%91&limit=1" || echo 000)
          echo "GET /v1/programs/search -> $status"
          if [ "$status" != "200" ]; then
            echo "::error::POST-DEPLOY FAIL: programs/search returned $status (expected 200)"
            cat /tmp/smoke_search.json 2>/dev/null || true
            exit 1
          fi
          total=$(python3 -c "import json; print(json.load(open('/tmp/smoke_search.json')).get('total', -1))")
          echo "programs.total=$total"
          if [ "$total" -le 0 ] 2>/dev/null; then
            echo "::error::POST-DEPLOY FAIL: programs.total=$total (must be > 0)"
            cat /tmp/smoke_search.json
            exit 1
          fi

          echo "Post-deploy hard gate PASS (healthz=200 deep_health=ok programs.total=$total)"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        # Stub: only fires if webhook secret is set; silently no-ops otherwise so absence
        # of the secret doesn't itself fail the job.
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping notification."
            exit 0
          fi
          payload=$(printf '{"text":"autonomath-api deploy FAILED on %s (commit %s) — %s"}' \
            "${GITHUB_REF_NAME}" "${GITHUB_SHA::7}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")
          curl -sS -X POST -H 'Content-Type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
