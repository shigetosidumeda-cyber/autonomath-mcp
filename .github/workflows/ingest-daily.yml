name: ingest-daily

# Daily ingest of Tier 1 authorities (Jグランツ / 中小企業庁 / 大型補助金).
# Runs ON the Fly production machine via `flyctl ssh console` so writes
# land on the attached volume (NOT a CI checkout). See docs/ingest_automation.md.
#
# Required GitHub repository secrets:
#   FLY_API_TOKEN             Fly.io deploy token with ssh access to `autonomath-api`.
#   PROD_DB_MUTATION_OPERATOR_ACK
#                             Must equal I_ACK_PROD_DB_MUTATION to allow
#                             production DB writes. Otherwise Fly SSH ingest
#                             forces --dry-run.
#
# Optional secrets:
#   SLACK_WEBHOOK_INGEST      Slack incoming webhook for 3-consecutive-failure alerts.
#
# Fail-open strategy: a single authority 404/500 does not red the whole run —
# scripts/ingest_tier.py reports per-authority status and the run only fails
# if the driver itself crashes.

on:
  schedule:
    # 19:23 UTC == 04:23 JST. Offset from eligibility-history-daily
    # (19:00 UTC) and idempotency-sweep-hourly (:15) to avoid runner
    # contention (W14-12 audit). Still after
    # nightly-backup (03:17 JST) and before pricing/webhook hours (09:00 JST).
    - cron: "23 19 * * *"
  workflow_dispatch:
    inputs:
      authority:
        description: "Run only this authority (blank = all Tier-1)"
        required: false
        default: ""
      dry_run:
        description: "dry-run (no DB writes)"
        required: false
        default: "true"

concurrency:
  group: ingest-daily
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TIER: daily
      SENTRY_RELEASE: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "latest"

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run ingest on Fly machine
        id: run
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          INPUT_AUTHORITY: ${{ github.event.inputs.authority }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          PROD_DB_MUTATION_OPERATOR_ACK: ${{ secrets.PROD_DB_MUTATION_OPERATOR_ACK }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::notice::FLY_API_TOKEN unset; skipping ingest-daily."
            exit 0
          fi

          ARGS="$TIER"
          if [ -n "${INPUT_AUTHORITY:-}" ]; then
            ARGS="$ARGS --authority $INPUT_AUTHORITY"
          fi
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          elif [ "${PROD_DB_MUTATION_OPERATOR_ACK:-}" != "I_ACK_PROD_DB_MUTATION" ]; then
            echo "::warning::Production DB mutation requires PROD_DB_MUTATION_OPERATOR_ACK=I_ACK_PROD_DB_MUTATION; forcing --dry-run."
            ARGS="$ARGS --dry-run"
          fi

          # Pass SENTRY_RELEASE through so ingest-side breadcrumbs link
          # back to this commit. PYTHONPATH=/app is required so the script's
          # `from scripts.lib.http import HttpClient` resolves — the Dockerfile
          # copies scripts/ to /app/scripts/ but does not turn it into an
          # installable package, and python's sys.path[0] on direct-script
          # invocation is /app/scripts/, not /app/.
          set +e
          flyctl ssh console -a autonomath-api -C \
            "env SENTRY_RELEASE=${SENTRY_RELEASE} PYTHONPATH=/app \
              /opt/venv/bin/python /app/scripts/ingest_tier.py $ARGS" \
            | tee ingest.out
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Driver crash only (per-authority failures are reported as
          # rows in ingest_log.jsonl with authorities_fail>0).
          if [ "$rc" -ne 0 ]; then
            echo "::error::ingest_tier.py exited $rc"
            exit 1
          fi

      - name: Pull ingest_log.jsonl diff off Fly machine
        if: success()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          flyctl ssh sftp get /data/ingest_log.jsonl -a autonomath-api \
            || echo "::warning::no /data/ingest_log.jsonl yet"
          if [ -f ingest_log.jsonl ]; then
            mv ingest_log.jsonl data/ingest_log.jsonl
          fi

      - name: Detect log diff
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- data/ingest_log.jsonl 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with ingest_log diff
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: "chore(ingest): daily log $(date -u +%Y-%m-%d)"
          title: "Ingest daily log: $(date -u +%Y-%m-%d)"
          body: |
            Auto-generated by `.github/workflows/ingest-daily.yml`.

            Review `data/ingest_log.jsonl` diff. The DB file itself is NOT
            committed — writes landed on the Fly volume via `ingest_tier.py`.

            Merge unless `authorities_fail > 0` on any row (then follow
            `docs/incident_runbook.md` Section I — ingest failure).
          branch: ingest-daily/${{ github.run_id }}
          base: main
          delete-branch: true
          labels: |
            ingest
            automation
          add-paths: |
            data/ingest_log.jsonl

      - name: Open issue on driver failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY="Tier: \`daily\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nSHA: \`${{ github.sha }}\`\n\nCheck \`docs/incident_runbook.md\` Section I.\n"
          gh issue create \
            --title "ingest-daily failed on $(date -u +%Y-%m-%d)" \
            --label ingest-failure \
            --label automation \
            --body "$BODY"

      - name: Slack notify on driver failure
        if: failure() && env.SLACK_WEBHOOK_INGEST != ''
        env:
          SLACK_WEBHOOK_INGEST: ${{ secrets.SLACK_WEBHOOK_INGEST }}
        run: |
          set -euo pipefail
          curl -fsS -X POST -H 'content-type: application/json' \
            --data "{\"text\":\":warning: ingest-daily driver failure — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_INGEST" || true
