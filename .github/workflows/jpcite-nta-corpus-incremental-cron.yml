name: jpcite-nta-corpus-incremental-cron (alias of nta-corpus-incremental-cron)

# Wave 46 tick7#7 (2026-05-12) — jpcite-brand alias of
# `nta-corpus-incremental-cron.yml`.
# Per `project_jpcite_internal_autonomath_rename` +
# `feedback_destruction_free_organization`: dispatch-only trampoline, no
# cron (parent retains SOT), no logic duplication.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run the parent workflow on (default: main)."
        required: false
        default: "main"

concurrency:
  group: jpcite-nta-corpus-incremental-cron
  cancel-in-progress: false

jobs:
  trampoline:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Re-invoke parent (nta-corpus-incremental-cron)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REF="${{ inputs.ref || 'main' }}"
          echo "alias=jpcite-nta-corpus-incremental-cron parent=nta-corpus-incremental-cron ref=$REF"
          gh workflow run nta-corpus-incremental-cron.yml --ref "$REF" \
            -R "${GITHUB_REPOSITORY}"
