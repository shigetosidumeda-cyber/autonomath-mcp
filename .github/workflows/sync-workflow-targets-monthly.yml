# DEEP-57: Monthly workflow-target sync (cross-repo PR automation)
#
# Once a month — 1st day, 03:00 JST (= UTC 18:00 of the prior day) —
# rebuilds the desired RUFF_TARGETS / PYTEST_TARGETS env lists from
# git-tracked sources and rewrites .github/workflows/test.yml +
# .github/workflows/release.yml in place via DEEP-49's --apply mode.
# If any diff lands, peter-evans/create-pull-request opens a PR titled
# `[automated] sync workflow targets ...` against main.
#
# Pairs with check-workflow-target-sync.yml (PR-side guard, --check mode).
# A green PR check guarantees this monthly cron is a no-op, which is
# the desired steady state.
#
# Constraints (CLAUDE.md):
#   - Zero LLM API calls. Pure Python stdlib + pinned-SHA actions.
#   - Cross-repo PAT only used for PR creation (`CROSS_REPO_PAT`,
#     scope=repo). No write access elsewhere.
#   - No paid plan. ubuntu-latest free runner only.
#   - Solo + zero-touch: PR review is the operator's only manual step.
#
# Session-A draft, NOT yet copied into .github/workflows/.

name: sync-workflow-targets-monthly

on:
  schedule:
    # 1st of each month, 18:00 UTC = 03:00 JST of the 1st (next day).
    # Confirmed: GitHub cron uses UTC, so '0 18 1 * *' fires 03:00 JST
    # on the 1st when the month starts. The README documents this
    # offset because daylight-savings-free Asia/Tokyo never drifts.
    - cron: "0 18 1 * *"
  # Allow manual replay (e.g., right after merging a script that adds
  # a new lint surface). Same job body, so behaviour is identical.
  workflow_dispatch: {}

permissions:
  # peter-evans/create-pull-request needs write to push the branch +
  # open the PR. The PAT below is what actually authenticates the call;
  # workflow-level permissions stay minimal so an accidental run on a
  # fork cannot escalate.
  contents: write
  pull-requests: write

concurrency:
  group: sync-workflow-targets-monthly
  cancel-in-progress: false

jobs:
  monthly-sync:
    name: Apply DEEP-49 sync and open PR if drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history for ls-files + branch creation)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          # Use the cross-repo PAT here too so the subsequent push by
          # create-pull-request inherits a remote URL bearing PAT auth.
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Step 1 — apply DEEP-49 rewriter in place. Idempotent — if the
      # PR check has been keeping the tree green, this is a no-op and
      # the next step finds nothing to commit.
      - name: DEEP-49 sync_workflow_targets --apply
        run: |
          python scripts/ops/sync_workflow_targets.py --apply

      # Step 2 — DEEP-57 verifier post-apply sanity. Should be clean
      # immediately after --apply; failing here means the rewriter and
      # the verifier disagree on the canonical format, which is a bug
      # we want to surface BEFORE opening a PR.
      - name: DEEP-57 verifier (post-apply check)
        run: |
          python scripts/ops/sync_workflow_targets_verify.py --check

      # Step 3 — capture drift summary for the PR body. The script
      # emits a short markdown blurb on stdout when run with --report,
      # which we feed into the PR create step.
      - name: Generate diff report for PR body
        id: report
        run: |
          python scripts/ops/sync_workflow_targets_verify.py --report > /tmp/sync_report.md || true
          echo "report_path=/tmp/sync_report.md" >> "$GITHUB_OUTPUT"

      # Step 4 — open PR if (and only if) the working tree changed.
      # peter-evans/create-pull-request handles the no-op case
      # automatically (skips PR creation if no diff), so we always run
      # this step.
      - name: Create pull request on drift
        id: cpr
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a5c18a1cc84ffff1f # v6.1.0
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          commit-message: |
            [automated] sync workflow targets

            Monthly DEEP-49 + DEEP-57 sync.
            Generated by .github/workflows/sync-workflow-targets-monthly.yml.
          branch: automated/sync-workflow-targets
          delete-branch: true
          title: "[automated] sync workflow targets"
          body-path: ${{ steps.report.outputs.report_path }}
          labels: |
            automated
            release-readiness-ci
            DEEP-49
            DEEP-57
          add-paths: |
            .github/workflows/test.yml
            .github/workflows/release.yml
          draft: false

      - name: Report PR result
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Opened PR #${{ steps.cpr.outputs.pull-request-number }}: ${{ steps.cpr.outputs.pull-request-url }}"
