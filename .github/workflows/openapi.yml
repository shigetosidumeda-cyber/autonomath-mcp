name: openapi

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  dump:
    name: Dump OpenAPI schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Dump /openapi.json
        # Import the FastAPI app in-process; no uvicorn boot needed for schema generation.
        run: |
          mkdir -p docs/openapi
          python - <<'PY'
          import json
          from pathlib import Path
          from jpintel_mcp.api.main import app
          schema = app.openapi()
          Path("docs/openapi/v1.json").write_text(
              json.dumps(schema, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Open PR if schema changed
        # peter-evans/create-pull-request is a no-op when the working tree is clean.
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: "docs(openapi): refresh v1.json"
          title: "docs(openapi): refresh v1.json"
          body: |
            Automated OpenAPI schema refresh from `main`.

            Source: `jpintel_mcp.api.main:app.openapi()`
          branch: bot/openapi-refresh
          delete-branch: true
          add-paths: |
            docs/openapi/v1.json
