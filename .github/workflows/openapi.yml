name: openapi

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  dump:
    name: Dump OpenAPI schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Dump /openapi.json
        # Use the stable exporter so ordering matches the committed schema.
        run: |
          mkdir -p docs/openapi site/docs/openapi
          python scripts/export_openapi.py --out docs/openapi/v1.json --site-out site/docs/openapi/v1.json
          python scripts/export_agent_openapi.py

      - name: Verify committed schema is current
        run: |
          git diff --exit-code docs/openapi/v1.json site/docs/openapi/v1.json docs/openapi/agent.json site/openapi.agent.json site/docs/openapi/agent.json
