name: openapi

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  dump:
    name: Dump OpenAPI schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Dump /openapi.json
        # Use the stable exporter so ordering matches the committed schema.
        run: |
          mkdir -p docs/openapi
          python scripts/export_openapi.py --out docs/openapi/v1.json

      - name: Verify committed schema is current
        run: |
          git diff --exit-code docs/openapi/v1.json
