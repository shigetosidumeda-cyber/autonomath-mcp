name: openapi

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}


concurrency:
  # Wave 43 noise reduction (2026-05-12): serialize same-ref runs.
  group: openapi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write

jobs:
  dump:
    name: Dump OpenAPI schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,site]"

      - name: Dump /openapi.json
        # Use the stable exporter so ordering matches the committed schema.
        run: |
          mkdir -p docs/openapi site/docs/openapi
          python scripts/export_openapi.py --out docs/openapi/v1.json --site-out site/docs/openapi/v1.json
          python scripts/export_agent_openapi.py
          python scripts/export_openapi.py --profile gpt30 --out site/openapi.agent.gpt30.json

      - name: Verify committed schema is current
        run: |
          git diff --exit-code docs/openapi/v1.json site/docs/openapi/v1.json docs/openapi/agent.json site/openapi.agent.json site/docs/openapi/agent.json site/openapi.agent.gpt30.json

      - name: Run OpenAPI drift gate
        run: python scripts/check_openapi_drift.py
