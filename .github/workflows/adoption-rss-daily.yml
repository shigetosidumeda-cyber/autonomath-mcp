name: adoption-rss-daily

# Axis 3a — 採択 RSS daily poll across mirasapo / j-grants / prefecture feeds.
#
# Schedule: 20:00 UTC == 05:00 JST. RSS-mirror update windows tend to land
# before the 業務開始 hour; reading at 05:00 JST gives downstream surfaces a
# 4 h head start before 09:00 JST traffic.
#
# LLM call count: 0. Pure regex + httpx + sqlite3.

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Days back from today for the catch-up window (default 7)"
        required: false
        default: "7"
      dry_run:
        description: "If true, fetch+parse only, no DB writes"
        required: false
        default: "false"

concurrency:
  group: adoption-rss-daily
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright chromium (Wave 36 fallback)
        run: |
          # Wave 36: ETL fetch_with_fallback uses Playwright on 4xx/5xx/timeout
          # against authoritative .go.jp / .lg.jp sources.
          python -m playwright install --with-deps chromium

      - name: Run adoption RSS daily poll
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_DAYS: ${{ github.event.inputs.days }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          set -euo pipefail
          DAYS="${INPUT_DAYS:-7}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          # CI runner cannot host the 9.7 GB autonomath.db; we run with --dry-run
          # when no db is present. Production cron runs against the volume DB
          # on the Fly machine via the Fly Machines API trigger (out of scope
          # for this lightweight scheduler).
          if [ ! -f "${AUTONOMATH_DB_PATH}" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/cron/poll_adoption_rss_daily.py \
            --days "${DAYS}" \
            ${DRY_FLAG}

      - name: Open issue on driver failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `adoption-rss-daily failed ${new Date().toISOString()}`,
              body: `Run: ${runUrl}\n\nLikely causes: mirasapo/j-grants 5xx, prefecture RSS DOM drift, banned aggregator host detected. See scripts/cron/poll_adoption_rss_daily.py docstring.`,
              labels: ["ingest-failure", "automation", "axis3"],
            });
