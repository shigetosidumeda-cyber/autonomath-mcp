name: post-award-monitor-cron

# 採択後 monitoring (consultant trigger #2 of the trio).
#
# Joins customer_intentions (status='awarded') × program_post_award_calendar
# (migration 098) and fires alerts to consultants whose 顧問先 has a
# milestone deadline within 14 / 7 / 3 / 1 days. ¥3 metered per delivery.
#
# Cadence: daily at 22:00 UTC == 07:00 JST (consultants check email
# first thing in the morning Japan time). Idempotency log
# (post_award_alert_log) ensures a re-run inside the same window is a
# no-op.

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run with --dry-run (no email, no billing)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: post-award-monitor-cron
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run post_award_monitor
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          FLAGS=""
          if [ "${DRY_RUN}" = "true" ]; then FLAGS="--dry-run"; fi
          flyctl ssh console -a autonomath-api -C \
            "/app/.venv/bin/python /app/scripts/cron/post_award_monitor.py ${FLAGS}"

      - name: Sentry alert on cron failure
        if: failure()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "::warning::SENTRY_DSN not set; skipping alert hop."
            exit 0
          fi
          PROJECT_ID="$(echo "$SENTRY_DSN" | sed -E 's#.*/([0-9]+)$#\1#')"
          PUBLIC_KEY="$(echo "$SENTRY_DSN" | sed -E 's#https://([^@]+)@.*#\1#')"
          HOST="$(echo "$SENTRY_DSN" | sed -E 's#https://[^@]+@([^/]+)/.*#\1#')"
          curl -fsS -X POST \
            "https://${HOST}/api/${PROJECT_ID}/store/" \
            -H "Content-Type: application/json" \
            -H "X-Sentry-Auth: Sentry sentry_version=7,sentry_key=${PUBLIC_KEY},sentry_client=post-award-monitor-cron/1.0" \
            -d "{\"level\":\"error\",\"logger\":\"github.actions.post-award-monitor-cron\",\"platform\":\"other\",\"message\":\"post-award-monitor-cron failed. Run ${GITHUB_RUN_ID}.\",\"tags\":{\"workflow\":\"post-award-monitor-cron\",\"run_id\":\"${GITHUB_RUN_ID}\"}}" \
            || echo "::warning::Sentry alert POST failed; continuing."
