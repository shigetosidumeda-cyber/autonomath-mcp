name: weekly-backup-autonomath
# Weekly online backup of the 8.29 GB autonomath.db. Runs the same
# scripts/backup.py inside the Fly machine, pulls the gzipped artifact off
# via flyctl sftp, verifies sha256, then mirrors to Cloudflare R2 with a
# 28-day rolling window (4 weekly snapshots).
#
# Why weekly (not nightly):
#   autonomath.db is 8.3 GB. Daily would push ~60 GB/week of R2 PUT traffic
#   plus SFTP egress from Fly Tokyo. Weekly gives RPO = 7 days for the
#   slow-changing entity-fact corpus, which is acceptable: write traffic
#   into autonomath.db is bulk-ingest only (not request-path), so we can
#   replay ingest to recover anything newer than the snapshot.
#
# RPO note: Fly machine cron is the canonical real-time path; this GHA
# workflow exists because the Fly cron does NOT survive redeploys (see
# docs/_internal/dr_backup_runbook.md scenario 2). This is the durable
# backup-of-backup.
#
# Required GitHub repository secrets (same set as nightly-backup.yml):
#   FLY_API_TOKEN         Fly.io deploy token with ssh+sftp access to autonomath-api.
#   R2_ENDPOINT           Cloudflare R2 S3 endpoint.
#   R2_ACCESS_KEY_ID      Cloudflare R2 access key id.
#   R2_SECRET_ACCESS_KEY  Cloudflare R2 secret access key.
#   R2_BUCKET             Target bucket name.
#
# If any R2 secret is missing the off-site upload step logs a warning and
# exits success — the on-machine backup still ran.

on:
  schedule:
    # 19:45 UTC Sunday == 04:45 JST Monday. Off-peak; well clear of the
    # 18:17 UTC nightly jpintel.db backup. Pushed to :45 (was :00) to
    # avoid Fly machine ssh contention with the daily Sunday cluster
    # (ingest-daily 19:00 / nta-corpus-incremental 19:05 /
    # trial-expire 19:10 / data-integrity 19:30 / news-pipeline 19:35).
    - cron: "45 19 * * 0"
  workflow_dispatch: {}

concurrency:
  group: weekly-backup-autonomath
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run backup on Fly machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          # Distinct --out directory from /data/backups (which the nightly
          # jpintel.db backup uses with --keep 14). backup.py:_prune_old
          # deletes any `jpintel-*` file in --out older than --keep days,
          # and the artifact prefix is hard-coded to "jpintel-" regardless
          # of source DB. Sharing /data/backups would let the nightly job
          # delete week-old autonomath snapshots before this weekly job
          # has a chance to capture the next one. Keep them isolated.
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/backup.py \
              --db /data/autonomath.db \
              --out /data/backups-autonomath \
              --keep 28 \
              --gzip"

      - name: Locate latest backup path on Fly machine
        id: locate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          # NOTE: backup.py emits files prefixed `jpintel-` regardless of
          # source DB (the prefix is hard-coded in run_backup() / _prune_old()).
          # We disambiguate the autonomath snapshot by living in a separate
          # /data/backups-autonomath directory; the R2 prefix below also
          # differs from the nightly job's prefix.
          # If backup.py is later updated to emit `autonomath-*.db.gz`
          # filenames, switch this glob and the SFTP get / R2 prefix below.
          LATEST=$(flyctl ssh console -a autonomath-api -C \
              "ls -1t /data/backups-autonomath/jpintel-*.db.gz | head -1" | tr -d '\r\n')
          if [ -z "$LATEST" ]; then
            echo "ERROR: could not locate latest backup on machine" >&2
            exit 1
          fi
          echo "latest_remote=$LATEST" >> "$GITHUB_OUTPUT"
          echo "latest_basename=$(basename "$LATEST")" >> "$GITHUB_OUTPUT"

      - name: Copy backup and checksum off Fly machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          LATEST_REMOTE: ${{ steps.locate.outputs.latest_remote }}
        timeout-minutes: 60
        run: |
          set -euo pipefail
          # 8.3 GB raw → ~3-5 GB gzipped at compresslevel=6. SFTP from
          # Fly Tokyo to GitHub-hosted runners ranges 5-15 MB/s in practice,
          # so allow up to 60 minutes for the pull.
          flyctl ssh sftp get "$LATEST_REMOTE"         -a autonomath-api
          flyctl ssh sftp get "${LATEST_REMOTE}.sha256" -a autonomath-api
          ls -la jpintel-*.db.gz jpintel-*.db.gz.sha256

      - name: Verify sha256
        run: |
          set -euo pipefail
          shasum -a 256 -c jpintel-*.db.gz.sha256

      - name: Upload to Cloudflare R2 and rotate (fail-open if secrets missing)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          LATEST_BASENAME: ${{ steps.locate.outputs.latest_basename }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] \
             || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] \
             || [ -z "${R2_ENDPOINT:-}" ] \
             || [ -z "${R2_BUCKET:-}" ]; then
            echo "::warning::R2 secrets not fully configured; skipping off-site upload." \
              "Set R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ENDPOINT / R2_BUCKET to enable."
            exit 0
          fi

          # Distinct prefix from nightly-backup.yml so the two retention
          # windows don't fight each other on rotation.
          PREFIX="autonomath-api/autonomath-db"
          aws s3 cp "$LATEST_BASENAME"         "s3://$R2_BUCKET/$PREFIX/" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "${LATEST_BASENAME}.sha256" "s3://$R2_BUCKET/$PREFIX/" --endpoint-url "$R2_ENDPOINT"

          # Rotation: keep only the 4 newest jpintel-*.db.gz + their .sha256.
          # 4 weekly snapshots == 28 days RPO ceiling for autonomath.db.
          # Lex order == chronological (timestamp YYYYMMDD-HHMMSS).
          KEEP=4
          mapfile -t ALL < <(aws s3api list-objects-v2 \
              --bucket "$R2_BUCKET" \
              --prefix "$PREFIX/jpintel-" \
              --endpoint-url "$R2_ENDPOINT" \
              --query 'Contents[].Key' \
              --output text | tr '\t' '\n' | grep -E '\.db\.gz$' | sort -r || true)

          if [ "${#ALL[@]}" -gt "$KEEP" ]; then
            for key in "${ALL[@]:$KEEP}"; do
              echo "Pruning: $key (+ .sha256)"
              aws s3 rm "s3://$R2_BUCKET/$key"         --endpoint-url "$R2_ENDPOINT" || true
              aws s3 rm "s3://$R2_BUCKET/${key}.sha256" --endpoint-url "$R2_ENDPOINT" || true
            done
          else
            echo "No rotation needed (${#ALL[@]} <= $KEEP)."
          fi
