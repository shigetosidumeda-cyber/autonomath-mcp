name: time-machine-snapshot-monthly

# Wave 49 G3 — AX Layer 5 cron #4 / Dim Q time_machine.
#
# Monthly batch that fingerprints the current snapshot of each
# time-machine spine table (sha256 + row_count) into
# am_monthly_snapshot_log (mig 277). Lets an operator prove that
# the snapshot for a given as_of_date has not drifted. Retention
# = 60 monthly rows (5 years rolling, --gc).
#
# Invokes: scripts/etl/build_monthly_snapshot.py (Wave 47).
# Pure stdlib + sqlite3, LLM API 0 (feedback_no_operator_llm_api).

on:
  schedule:
    # 1st of month, 03:05 UTC == 12:05 JST.
    - cron: "5 3 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, plan only (no DB writes)"
        required: false
        default: "true"

concurrency:
  group: time-machine-snapshot-monthly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Local dry-run probe (no production DB)
        run: |
          set -euo pipefail
          python scripts/etl/build_monthly_snapshot.py \
            --dry-run \
            --db "$RUNNER_TEMP/wave49-g3-nonprod-missing.db"

      - name: Install flyctl
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Run monthly snapshot fingerprint + 5y retention gc on Fly production DB
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'true' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PROD_DB_MUTATION_OPERATOR_ACK: ${{ secrets.PROD_DB_MUTATION_OPERATOR_ACK }}
        run: |
          set -euo pipefail
          FLAGS="--db /data/autonomath.db --gc"
          if [ "${DRY_RUN}" = "true" ]; then
            FLAGS="--dry-run ${FLAGS}"
          elif [ "${PROD_DB_MUTATION_OPERATOR_ACK:-}" != "I_ACK_PROD_DB_MUTATION" ]; then
            echo "::warning::Production DB mutation requires PROD_DB_MUTATION_OPERATOR_ACK=I_ACK_PROD_DB_MUTATION; forcing --dry-run."
            FLAGS="--dry-run ${FLAGS}"
          fi
          flyctl ssh console -a autonomath-api -C \
            "/opt/venv/bin/python /app/scripts/etl/build_monthly_snapshot.py ${FLAGS}"
