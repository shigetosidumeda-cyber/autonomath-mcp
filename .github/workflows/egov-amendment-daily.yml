name: egov-amendment-daily

# Axis 3b — e-Gov 法改正 diff daily poll.
#
# Schedule: 21:00 UTC == 06:00 JST.
#
# LLM call count: 0. Pure regex + httpx + sqlite3.

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Days back from today (default 14)"
        required: false
        default: "14"
      dry_run:
        description: "If true, fetch+parse only"
        required: false
        default: "false"

concurrency:
  group: egov-amendment-daily
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run e-Gov amendment daily poll
        env:
          AUTONOMATH_DB_PATH: ${{ github.workspace }}/autonomath.db
          INPUT_DAYS: ${{ github.event.inputs.days }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          JPCITE_PREFLIGHT_ALLOW_MISSING_DB: "1"
        run: |
          set -euo pipefail
          DAYS="${INPUT_DAYS:-14}"
          DRY_FLAG=""
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          if [ ! -f "${AUTONOMATH_DB_PATH}" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/cron/poll_egov_amendment_daily.py \
            --days "${DAYS}" \
            ${DRY_FLAG}

      - name: Open issue on driver failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `egov-amendment-daily failed ${new Date().toISOString()}`,
              body: `Run: ${runUrl}\n\nLikely causes: elaws.e-gov.go.jp 5xx, RSS DOM drift. See scripts/cron/poll_egov_amendment_daily.py docstring.`,
              labels: ["ingest-failure", "automation", "axis3"],
            });
