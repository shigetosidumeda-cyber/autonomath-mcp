version: 2
updates:
  # Python (pip) dependencies declared in pyproject.toml.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
      include: scope

  # TypeScript SDK (npm) — sdk/typescript/package.json.
  - package-ecosystem: npm
    directory: "/sdk/typescript"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "deps"
      include: scope

  # GitHub Actions pinned in .github/workflows/*.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope

  # Base image referenced in Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "deps"
      include: scope
