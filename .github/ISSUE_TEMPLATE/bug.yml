name: Bug report
description: Something is broken or behaving unexpectedly
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill out as much as you can — the `request_id` and curl reproduction are the most useful.

  - type: input
    id: name
    attributes:
      label: Name (optional)
      description: How we address you in a reply. Anonymous is fine.
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: endpoint
    attributes:
      label: Endpoint
      description: "e.g. `/v1/programs/search`, `/meta`, `/v1/billing/checkout`"
      placeholder: /v1/programs/search
    validations:
      required: true

  - type: input
    id: request_id
    attributes:
      label: Request ID (x-request-id header from response)
      description: Every response includes an `x-request-id` header. Paste it here — it lets us find your request in logs.
      placeholder: 01HX4K...
    validations:
      required: false

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual
      description: |
        - Expected: ...
        - Actual: ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction (curl)
      description: A curl command that reproduces the issue. Redact your API key — the first 8 chars are enough.
      render: bash
      placeholder: |
        curl -H "x-api-key: sk_live_abc12345..." \
          "https://<DOMAIN_PLACEHOLDER>/v1/programs/search?q=農業"
    validations:
      required: true

  - type: input
    id: api_key_prefix
    attributes:
      label: API key prefix (first 8 chars only)
      description: "e.g. `sk_live_` or `sk_live_abc12345`. **Never paste the full key.**"
      placeholder: sk_live_abc12345
    validations:
      required: false

  - type: input
    id: env
    attributes:
      label: OS / client
      description: "e.g. macOS 14 / curl 8.7, Windows 11 / Python 3.12, Claude Desktop 0.9"
    validations:
      required: true
