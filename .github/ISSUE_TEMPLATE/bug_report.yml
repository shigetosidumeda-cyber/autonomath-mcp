name: Bug report
description: Something is broken or behaving unexpectedly
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in as much as you can — the
        `x-request-id` and a curl reproduction are the most useful pieces.

  - type: input
    id: name
    attributes:
      label: Name (optional)
      description: How we address you in a reply. Anonymous is fine.
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment (OS / client / version)
      description: "e.g. macOS 14 / curl 8.7, Windows 11 / Python 3.12, Claude Desktop 0.9, Cursor 0.42"
      placeholder: macOS 14.5 / curl 8.7 / autonomath-mcp 0.3.0
    validations:
      required: true

  - type: input
    id: endpoint
    attributes:
      label: Endpoint or MCP tool
      description: "e.g. `/v1/programs/search`, `/v1/billing/checkout`, MCP tool `search_programs`"
      placeholder: /v1/programs/search
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps. The shorter the better.
      placeholder: |
        1. Send `GET /v1/programs/search?q=農業&prefecture=tokyo`
        2. Inspect response
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include status codes / error messages.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction (curl or MCP tool call)
      description: A copy-pasteable command that reproduces the issue. Redact your API key — the first 8 chars are enough for triage.
      render: bash
      placeholder: |
        curl -H "x-api-key: sk_live_abc12345..." \
          "https://<DOMAIN_PLACEHOLDER>/v1/programs/search?q=農業"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / response body
      description: Paste the response body or any log lines. Redact secrets.
      render: text
    validations:
      required: false

  - type: input
    id: request_id
    attributes:
      label: x-request-id from the failing response
      description: Every API response includes an `x-request-id` header. Pasting it lets us find your request in our server logs.
      placeholder: 01HX4K...
    validations:
      required: false

  - type: input
    id: api_key_prefix
    attributes:
      label: API key prefix (first 8 chars only)
      description: "e.g. `sk_live_` or `sk_live_abc12345`. **Never paste the full key.** Leave blank if anonymous."
      placeholder: sk_live_abc12345
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have redacted secrets (API keys, tokens, personal data)
          required: true
