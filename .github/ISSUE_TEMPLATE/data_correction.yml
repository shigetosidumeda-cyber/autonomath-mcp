name: 制度情報の誤り報告 (Data correction)
description: 制度情報 (補助金 / 融資 / 税制 / 認定 / 行政処分 / 法令) に誤りがあった場合の報告
title: "[data] "
labels: ["data-correction"]
body:
  - type: markdown
    attributes:
      value: |
        AutonoMath は一次資料 (政府サイト / 自治体 / 公的機関) のみを参照しています。
        誤りを発見された場合は以下を埋めて投稿してください。`info@bookyou.net` への直接連絡も可。

  - type: input
    id: program_id
    attributes:
      label: 制度 ID (unified_id / canonical_id)
      placeholder: "UNI-194743d166 など"
      description: site/programs/<id>.html の URL or API response の id
    validations:
      required: true

  - type: dropdown
    id: error_type
    attributes:
      label: 誤りの種類
      options:
        - 制度名・名称の誤り
        - 金額・補助率の誤り
        - 期間・締切の誤り
        - 対象業種・要件の誤り
        - 法的根拠 (法令名・条文) の誤り
        - 排他・前提ルールの誤り
        - 既に廃止されている
        - その他
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: 誤りの詳細
      description: 何が間違っていて、正しくはどうか
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: 一次資料 URL (政府/自治体/公的機関)
      description: 訂正の根拠となる一次 URL。aggregator (noukaweb / hojyokin-portal / nikkei.com / wikipedia / prtimes など) は不可
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 追記
      description: 任意
