# CodeQL configuration for jpcite
# ---
# Wave 20 B3 — config strengthening pass.
#
# Why this file exists
# --------------------
# The default GitHub CodeQL action runs the `code-scanning` query suite
# against everything checked into the repo. That sweep:
#
#   1. Burns the 30-min job budget on cruft we never ship — generated
#      static site, ad-hoc migration data, ETL one-shots, vendored docs.
#   2. Surfaces low-signal alerts on test fixtures (hard-coded secrets
#      that are deliberately fake) and migration SQL files that the
#      ETL pipeline regenerates.
#   3. Misses the high-signal queries gated behind `security-and-quality`
#      (e.g. weak-randomness in token mints, SQL injection on dynamic
#      table names, path traversal on operator scripts).
#
# This config flips the suite to `security-and-quality` (≈30% more
# queries than `code-scanning`, ≈20% noise reduction after filtering),
# and excludes the obvious cruft via `paths-ignore`.
#
# Dual-language scan (`python` + `javascript-typescript`) stays in the
# workflow matrix; this config applies to both arms.
#
# How to extend
# -------------
# - To add a path exclusion, append to `paths-ignore`. Prefer narrowing
#   to a sub-tree rather than wholesale ignoring a top-level directory
#   (e.g. `tools/offline/_inbox/` instead of `tools/`).
# - To enable an additional query pack, append to `packs`. Stick to
#   official `codeql/python-queries` and `codeql/javascript-queries`
#   variants; third-party packs require security review.
# - Custom queries live in `.github/codeql/queries/` (not present today)
#   and are picked up automatically by the `queries:` block.
#
# Verification
# ------------
# After editing, run a manual workflow_dispatch on `.github/workflows/
# codeql.yml` and confirm the run's "Initialize CodeQL" step prints
# "Loading config from .github/codeql/codeql-config.yml".

name: "jpcite CodeQL config"

# Query suite — security-and-quality is the strict superset of
# code-scanning. Picks up additional code-quality smells alongside
# security alerts. Acceptable runtime impact (≈+8 min for the 9 GB
# corpus on `ubuntu-latest`).
queries:
  - uses: security-and-quality

# Default-language query packs. Pinned by major version so a breaking
# upstream update does not silently flip alert volume overnight.
packs:
  python:
    - codeql/python-queries
  javascript:
    - codeql/javascript-queries

# Path exclusions
# ---------------
# Excluded from BOTH python and javascript scans. CodeQL applies these
# at the database-build stage, so excluded files do not consume DB rows
# or query CPU.
paths-ignore:
  # Generated / vendored static site. 10,000+ HTML pages + companion
  # `.md` chunks regenerated by `scripts/generate_*_pages.py`.
  - "site/programs/**"
  - "site/cases/**"
  - "site/laws/**"
  - "site/enforcement/**"
  - "site/audiences/**"
  - "site/loans/**"
  - "site/tax/**"
  - "site/bids/**"
  - "site/invoice/**"
  - "site/prefectures/**"
  - "site/industries/**"
  - "site/recipes/**"
  - "site/companies/**"
  - "site/_archive/**"

  # Companion .md chunks (Wave 17/19 SEO surface, 10,259 files).
  - "site/**/*.md"

  # mkdocs build output.
  - "docs/_build/**"
  - "docs/openapi/**"

  # Test corpora & fixtures. Tests use deliberately fake secrets, dummy
  # JWT bytes, and synthesized SQLite blobs that trip generic-secret
  # heuristics without operator value.
  - "tests/**"
  - "evals/**"
  - "loadtest/**"

  # Migration SQL + companion rollbacks. Schema is the contract; CodeQL
  # SQL queries here are noise — schema_guard.py is the real check.
  - "scripts/migrations/**"

  # Operator-only offline tools. LLM SDK imports here are intentional
  # and the production CI guard `tests/test_no_llm_in_production.py`
  # already constrains the boundary.
  - "tools/offline/**"

  # Vendored / third-party static assets.
  - "site/static/**"
  - "site/assets/**"
  - "site/critical.css"
  - "site/styles.css"
  - "**/*.min.js"
  - "**/*.min.css"

  # Backup / artifact directories that should never have been in git
  # but slipped through historically.
  - "dist.bak/**"
  - "dist.bak2/**"
  - "dist.bak3/**"
  - "pyproject.toml.bak"

  # Generated launch artifacts.
  - "mcp-server.composition.json"
  - "mcp-server.core.json"
  - "mcp-server.full.json"

  # Wave 18 analysis dumps (one-shot ETL outputs, not source).
  - "analysis_value/**"
  - "analysis_wave18/**"
  - "research/**"

  # Local virtualenvs (should be .gitignored but guard double-down).
  - ".venv/**"
  - ".venv312/**"
  - ".wrangler/**"

# Paths to INCLUDE explicitly. Empty = include everything not in paths-ignore.
# Keeping this empty so a new top-level subdirectory (e.g. `src/jpcite_v2/`)
# is automatically picked up rather than silently skipped.
# paths:
#   - "src/"
#   - "scripts/"
